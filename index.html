function selectRecipeSlot(recId, slotIdx, el) {
  var rec = PROCESSING_RECIPES.find(function(r){ return r.id===recId; });
  if (!rec) return;
  var inp = rec.inputs[slotIdx];
  // Build candidate list from warehouse matching type
  var candidates = [];
  for (var i=0;i<warehouseSlots.length;i++) {
    var s = warehouseSlots[i];
    if (inp.itemId!=='*' && s.itemId!==inp.itemId) continue;
    if (inp.itemId==='*' && s.type!==inp.type) continue;
    if (s.count <= 0) continue;
    candidates.push(s);
  }
  if (candidates.length===0) { showToast('❌ 仓库中没有符合条件的材料'); return; }
  // Simple: pick first candidate
  var key = recId+'_'+slotIdx;
  processingSelectedSlots[key] = candidates[0];
  el.textContent = candidates[0].name;
  el.className = 'recipe-slot-display text-xs text-green-700 font-bold';
  updateRecipePreview(recId);
}
function updateRecipePreview(recId) {
  var rec = PROCESSING_RECIPES.find(function(r){ return r.id===recId; });
  if (!rec) return;
  var slots = [];
  for (var i=0;i<rec.inputs.length;i++) {
    var key = recId+'_'+i;
    slots.push(processingSelectedSlots[key] || null);
  }
  var allSelected = slots.every(function(s){ return !!s; });
  var previewEls = document.querySelectorAll('.recipe-preview[data-rec-id="'+recId+'"]');
  var craftBtns = document.querySelectorAll('.recipe-craft-btn[data-rec-id="'+recId+'"]');
  if (!allSelected) {
    for (var p=0;p<previewEls.length;p++) previewEls[p].textContent = '选择材料后预览...';
    for (var c=0;c<craftBtns.length;c++) { craftBtns[c].disabled = true; craftBtns[c].className = 'w-full py-2 rounded-lg text-sm font-extrabold text-white/50 border-2 bg-earth/30 border-soildark/20 cursor-default'; }
    return;
  }
  var result = calcRecipeOutput(rec, slots);
  for (var j=0;j<previewEls.length;j++) previewEls[j].textContent = '预计产出：'+result.name+' · 售价 '+result.price+' 金币';
  for (var k=0;k<craftBtns.length;k++) { craftBtns[k].disabled = false; craftBtns[k].className = 'w-full py-2 rounded-lg text-sm font-extrabold text-white hover:opacity-90 transition-colors border-2'; craftBtns[k].style.cssText = 'background:#6b8c3e;border-color:#6b8c3e'; }
}
function craftRecipe(recId) {
  var rec = PROCESSING_RECIPES.find(function(r){ return r.id===recId; });
  if (!rec) return;
  var slots = [];
  for (var i=0;i<rec.inputs.length;i++) {
    var key = recId+'_'+i;
    var sl = processingSelectedSlots[key];
    if (!sl) { showToast('❌ 请先选择所有材料'); return; }
    // Verify still in warehouse
    var found = null;
    for (var w=0;w<warehouseSlots.length;w++) {
      if (warehouseSlots[w].stackKey===sl.stackKey && warehouseSlots[w].count>=rec.inputs[i].count) { found=warehouseSlots[w]; break; }
    }
    if (!found) { showToast('❌ 材料不足或被消耗'); processingSelectedSlots[key]=null; renderAll(); return; }
    slots.push(found);
  }
  // Consume materials
  for (var j=0;j<slots.length;j++) {
    var need = rec.inputs[j].count;
    removeFromWarehouse(slots[j].itemId, need, slots[j].quality);
    var key2 = recId+'_'+j;
    delete processingSelectedSlots[key2];
  }
  var result = calcRecipeOutput(rec, slots);
  addToWarehouse(rec.outputName, result.name, rec.outputIcon, 1, rec.outputType, rec.outputTasteTags||[], result.price, [], 1, result.quality);
  playerSkillXP.cooking = (playerSkillXP.cooking||0) + 10;
  var xpNeed = playerSkillLevels.cooking*100;
  if (playerSkillXP.cooking>=xpNeed) { playerSkillXP.cooking-=xpNeed; playerSkillLevels.cooking=Math.min(99,playerSkillLevels.cooking+1); showToast('⭐ 烹饪技能升级！Lv.'+playerSkillLevels.cooking); }
  showToast('🔨 加工完成：'+result.name+' · 价值 '+result.price+' 金币');
  renderAll();
}

//  22. 地块渲染 & 事件绑定
// ============================================================
function getVisiblePlots() { return plots.filter(function(p){return p.subTab===currentSubTab && !p.isTree;}); }
function getVisibleTrees() { return plots.filter(function(p){return p.subTab===currentSubTab && p.isTree;}); }
function featureBadges(feat) { if (!feat||!feat.length) return''; var m={'极速成熟':'<span class="feature-badge ft-fast">⚡极速</span>','多倍产出':'<span class="feature-badge ft-multi">📦多倍</span>','循环收割':'<span class="feature-badge ft-cycle">🔄循环</span>','高价暴利':'<span class="feature-badge ft-value">💰暴利</span>'}; return feat.map(function(f){return m[f]||'';}).join(''); }

function plotCard(p) {
  var isCross = p.status==='GROWING' && p.startedSeason && p.startedSeason!==currentSeason;
  var isActive = currentActiveAction && currentActiveAction.plotId===p.id;
  var qIdx=-1; for (var qi=0;qi<globalActionQueue.length;qi++){if(globalActionQueue[qi].plotId===p.id){qIdx=qi;break;}}
  var isQueued = qIdx>=0 && !isActive;
  var fb = featureBadges(p.features);

  // ---- 各段内容 ----

  // 图标
  var iconStr='', nameStr='', style='', inlineStyle='';
  // 基因行 (h-6)
  var featRow = fb ? '<div class="flex gap-1 justify-center items-center">'+fb+'</div>' : '<div class="opacity-0"><span class="text-[10px]">.</span></div>';
  // 状态行 (h-6)
  var statusRow = '';
  // 进度条区 (h-3)
  var progRow = '<div class="w-full h-2"></div>';
  // 种植行动中：显示实时进度条
  if (isActive && currentActiveAction && currentActiveAction.type!=='NODE') {
    var farmPct = Math.round((1-currentActiveAction.remainingS/currentActiveAction.totalS)*100);
    progRow = '<div class="w-full bg-green-200 rounded-full overflow-hidden h-2"><div class="progress-fill h-full bg-green-500 rounded-full" style="transition:width 1s linear;width:'+farmPct+'%"></div></div>';
  }
  // 底部文字 (h-5)
  var bottomRow = '<div class="h-4"></div>';

  var queueBadge = '';
  if (isQueued) queueBadge='<div class="absolute -top-2 -right-2 z-10 bg-amber-300 border-2 border-amber-500 rounded-full w-9 h-9 flex items-center justify-center text-base shadow-md" title="等待队列（第'+(qIdx+1)+'位）">⏳</div>';

  switch(p.status) {
    case'LOCKED':
      var plotNum, nextLockedNum, unlockCost, lockLabel;
      if (p.id.indexOf('herb-')===0) {
        plotNum = parseInt(p.id.replace('herb-',''));
        unlockCost = 5000 + Math.floor(450 * Math.pow(plotNum - 4, 2.2));
        lockLabel = '药田';
        nextLockedNum = null;
        for (var li=0;li<plots.length;li++) {
          if (plots[li].subTab==='药田' && plots[li].status==='LOCKED') {
            var ln = parseInt(plots[li].id.replace('herb-',''));
            if (nextLockedNum===null || ln<nextLockedNum) nextLockedNum = ln;
          }
        }
      } else if (p.id.indexOf('gh-')===0) {
        plotNum = parseInt(p.id.replace('gh-',''));
        unlockCost = 15000 + Math.floor(1800 * Math.pow(plotNum - 4, 2.1));
        lockLabel = '温室';
        nextLockedNum = null;
        for (var li=0;li<plots.length;li++) {
          if (plots[li].subTab==='温室' && !plots[li].isTree && plots[li].status==='LOCKED') {
            var ln = parseInt(plots[li].id.replace('gh-',''));
            if (nextLockedNum===null || ln<nextLockedNum) nextLockedNum = ln;
          }
        }
      } else if (p.id.indexOf('tree-')===0) {
        plotNum = parseInt(p.id.replace('tree-',''));
        unlockCost = 50000 + Math.floor(35000 * Math.pow(plotNum - 1, 1.8));
        lockLabel = '果树';
        nextLockedNum = null;
        for (var li=0;li<plots.length;li++) {
          if (plots[li].subTab==='温室' && plots[li].isTree && plots[li].status==='LOCKED') {
            var ln = parseInt(plots[li].id.replace('tree-',''));
            if (nextLockedNum===null || ln<nextLockedNum) nextLockedNum = ln;
          }
        }
      } else {
        plotNum = parseInt(p.id.replace('farm-',''));
        unlockCost = 100 + Math.floor(40 * Math.pow(plotNum - 4, 2.4));
        lockLabel = '农田';
        nextLockedNum = null;
        for (var li=0;li<plots.length;li++) {
          if (plots[li].subTab==='农田' && plots[li].status==='LOCKED') {
            var ln = parseInt(plots[li].id.replace('farm-',''));
            if (nextLockedNum===null || ln<nextLockedNum) nextLockedNum = ln;
          }
        }
      }
      var isNext = plotNum===nextLockedNum;
      if (isNext) {
        style='border-2 border-dashed border-amber-400/60 bg-amber-50/40 cursor-pointer hover:shadow-md';
        iconStr='<span class="text-3xl">🔒</span>';
        nameStr='<span class="text-xs text-soildark font-extrabold">第'+plotNum+'块 · '+lockLabel+'未开垦</span>';
        statusRow='<span class="text-xs text-amber-700 font-extrabold">💰 '+unlockCost.toLocaleString()+' 金币解锁</span>';
      } else {
        style='border-2 border-dashed border-earth/20 bg-earth/5 opacity-60';
        iconStr='<span class="text-3xl text-earth/25">🔒</span>';
        nameStr='<span class="text-xs text-earth/45 font-bold">第'+plotNum+'块 · '+lockLabel+'锁定</span>';
        statusRow='<span class="text-xs text-earth/40 font-bold">需先解锁前序地块</span>';
      }
      featRow='<div class="opacity-0"><span class="text-[10px]">.</span></div>';
      break;

    case'EMPTY':
      if (p.isPreTilled) {
        style='border-2 border-dashed border-soildark/45 bg-amber-50/60';
        iconStr='<span class="text-2xl text-earth/60">🪵</span>';
        nameStr='<span class="text-xs text-earth/80 font-bold">已松土</span>';
        statusRow='<span class="text-xs text-soildark font-extrabold">点击播种</span>';
      } else {
        style='border-2 border-dashed border-soildark/30 bg-page/80';
        iconStr='<span class="text-3xl text-earth/40">+</span>';
        nameStr='<span class="text-xs text-earth/70 font-bold">空地</span>';
        statusRow='<span class="text-xs text-earth/70 font-bold">点击选种</span>';
      }
      break;

    case'PREPARING':
      if (isActive) {
        var step=ACTION_STEPS[currentActiveAction.stepIndex], pct=Math.round((1-currentActiveAction.remainingS/currentActiveAction.totalS)*100);
        style='border-2 border-amber-400/60 bg-amber-100/40';
        iconStr='<span class="text-2xl">'+step.icon+'</span>';
        nameStr='<span class="text-sm font-extrabold text-soildark">'+p.cropName+'</span>';
        statusRow='<span class="text-xs text-amber-700 font-bold">'+step.label+'中</span>';
        progRow='<div class="w-full h-2 bg-amber-200 rounded-full overflow-hidden"><div class="progress-fill h-full bg-amber-600 rounded-full" style="width:'+pct+'%;transition:width 1s linear"></div></div>';
        bottomRow='<span class="text-xs text-amber-600 tabular-nums font-extrabold">'+currentActiveAction.remainingS+'s</span>';
      } else if (isQueued) {
        style='border-2 border-dashed border-slate-300/60 bg-slate-100/40';
        iconStr='<span class="text-2xl opacity-60">'+(p.icon||'🌱')+'</span>';
        nameStr='<span class="text-sm font-extrabold text-soildark/60">'+p.cropName+'</span>';
        statusRow='<span class="text-xs text-earth/70 font-bold">等待队列（第'+(qIdx+1)+'位）</span>';
      } else {
        style='border-2 border-dashed border-soildark/30 bg-page/80';
        iconStr='<span class="text-2xl">'+p.icon+'</span>';
        nameStr='<span class="text-sm font-extrabold text-soildark">'+p.cropName+'</span>';
        statusRow='<span class="text-xs text-earth/70 font-bold">准备中...</span>';
      }
      break;

    case'TILLED':
      if (p.cropId && p.wiltTimer!==null && p.wiltTimer>0) {
        var wp=Math.round((1-p.wiltTimer/600)*100);
        style='border-2 border-red-300/50 bg-red-50/30 wilt-warn';
        iconStr='<span class="text-2xl opacity-70">'+p.icon+'</span>';
        nameStr='<span class="text-sm font-extrabold text-soildark">'+p.cropName+'</span>';
        statusRow='<span class="text-xs text-red-600 font-extrabold">💧 需浇水 · 💀 枯萎倒计时</span>';
        progRow='<div class="w-full h-2 bg-red-200 rounded-full overflow-hidden"><div class="progress-fill h-full bg-red-500 rounded-full" style="width:'+wp+'%;transition:width 1s linear"></div></div>';
        bottomRow='<span class="text-xs text-red-500 tabular-nums font-extrabold">'+formatTime(p.wiltTimer)+'</span>';
      } else if (p.cropId && p.resumeFrom==='WATERING') {
        style='border-2 border-blue-300/50 bg-blue-50/40';
        iconStr='<span class="text-2xl">'+p.icon+'</span>';
        nameStr='<span class="text-sm font-extrabold text-soildark">'+p.cropName+'</span>';
        statusRow='<span class="text-xs text-blue-600 font-extrabold">💧 待洒水</span>';
        bottomRow='<span class="text-xs text-blue-600 font-bold">点击继续</span>';
      } else if (p.isPreTilled && !p.cropId) {
        style='border-2 border-dashed border-soildark/45 bg-amber-50/60';
        iconStr='<span class="text-xl text-earth/60">🪵</span>';
        nameStr='<span class="text-xs text-earth/80 font-bold">已松土</span>';
        statusRow='<span class="text-xs text-soildark font-extrabold">点击播种</span>';
      } else {
        style='border-2 border-soildark/35 bg-page';
        iconStr='<span class="text-2xl text-earth/70">🪵</span>';
        nameStr='<span class="text-xs text-earth/70 font-bold">已松土</span>';
      }
      break;

    case'GROWING':{
      var bc=isCross?'bg-orange-500':'bg-sprout';
      var lc=isCross?'text-orange-600':'text-green-700';
      var lb=isCross?(p.startedSeason+'→'+currentSeason+'跨季×2'):'生长中';
      style=isCross?'border-2 border-orange-300/50 bg-orange-50/30':'border-2 border-green-300/50 bg-green-50/30';
      iconStr='<span class="text-2xl">'+p.icon+'</span>';
      nameStr='<span class="text-sm font-extrabold text-soildark">'+p.cropName+'</span>';
      statusRow='<span class="text-xs '+lc+' font-bold">'+lb+'</span>';
      progRow='<div class="w-full h-2 bg-earth/10 rounded-full overflow-hidden"><div class="progress-fill h-full '+bc+' rounded-full" style="width:'+p.progress+'%;transition:width 1s linear"></div></div>';
      bottomRow='<div class="flex justify-between text-xs text-earth/70 font-bold"><span>'+p.progress+'%</span><span>剩余 '+p.remaining+'</span></div>'+popoverHTML();
      break;
    }

    case'RIPE':
      style='border-2 border-soildark/30';
      inlineStyle='border:2px solid #b8732a;background:#fef9f0';
      iconStr='<span class="text-3xl">'+p.icon+'</span>';
      nameStr='<span class="text-sm font-extrabold" style="color:#b8732a">'+p.cropName+'</span>';
      statusRow='<span class="text-xs font-extrabold" style="color:rgba(184,115,42,0.7)">🧺 成熟 · 点击收获</span>';
      break;
  }

  return '<div class="plot-card relative h-[180px] flex flex-col justify-between items-center rounded-2xl cursor-pointer hover:shadow-md '+style+'"'+(inlineStyle?' style="'+inlineStyle+'"':'')+' data-state="'+p.status+'" data-plot-id="'+p.id+'">'+
    queueBadge+
    // 顶部：图标 + 名称
    '<div class="flex flex-col items-center pt-2 px-2 w-full">'+iconStr+nameStr+'</div>'+
    // 中部：基因 + 状态（固定高度占位）
    '<div class="flex flex-col items-center gap-0.5 w-full px-2">'+
      '<div class="h-6 flex items-center">'+featRow+'</div>'+
      '<div class="h-6 flex items-center">'+statusRow+'</div>'+
    '</div>'+
    // 底部：进度条 + 动作信息
    '<div class="w-full px-3 pb-2">'+
      '<div class="h-3 flex items-center">'+progRow+'</div>'+
      '<div class="h-5 flex items-center justify-center">'+bottomRow+'</div>'+
    '</div>'+
    '</div>';
}
function popoverHTML(){return'<div class="popover hidden absolute -top-1 -right-1 z-20 bg-page rounded-xl shadow-lg border-2 border-soildark/30 flex flex-col gap-0.5 p-1.5 min-w-[150px]"><div class="text-[10px] text-earth/50 px-1 font-bold">施肥</div><button class="popover-btn text-xs px-3 py-1.5 rounded-lg hover:bg-green-100 text-green-700 transition-colors text-left font-extrabold" data-action="fertilize" data-fert="basic">🧪 基础肥 -10min</button><button class="popover-btn text-xs px-3 py-1.5 rounded-lg hover:bg-purple-100 text-purple-700 transition-colors text-left font-extrabold" data-action="fertilize" data-fert="quality">⚗️ 品质肥 -5min</button><button class="popover-btn text-xs px-3 py-1.5 rounded-lg hover:bg-pink-100 text-pink-700 transition-colors text-left font-extrabold" data-action="fertilize" data-fert="mutant">💉 突变肥 -2min</button><div class="h-px bg-soildark/15 my-0.5"></div><button class="popover-btn text-xs px-3 py-1.5 rounded-lg hover:bg-red-100 text-red-600 transition-colors text-left font-extrabold" data-action="clear">🗑 清除</button><button class="popover-btn text-xs px-3 py-1.5 rounded-lg hover:bg-earth/10 text-earth/70 transition-colors text-left" data-action="cancel">取消</button></div>';}

function bindPlotEvents(grid) {
  var ls=grid.querySelectorAll('.plot-card[data-state="LOCKED"]'); for (var l=0;l<ls.length;l++){ls[l].addEventListener('click',function(){openUnlockModal(this.dataset.plotId);});}
  var es=grid.querySelectorAll('.plot-card[data-state="EMPTY"]'); for (var e=0;e<es.length;e++){es[e].addEventListener('click',function(){var q=-1;for(var qi=0;qi<globalActionQueue.length;qi++){if(globalActionQueue[qi].plotId===this.dataset.plotId){q=qi;break;}}if(q>=0){withdrawQueuedPlot(this.dataset.plotId);}else{openSeedModal(this.dataset.plotId);}});}
  var ps=grid.querySelectorAll('.plot-card[data-state="PREPARING"]'); for (var pr=0;pr<ps.length;pr++){ps[pr].addEventListener('click',function(){onPreparingClick(this.dataset.plotId);});}
  var ts=grid.querySelectorAll('.plot-card[data-state="TILLED"]'); for (var tl=0;tl<ts.length;tl++){ts[tl].addEventListener('click',function(){onTilledClick(this.dataset.plotId);});}
  var gs=grid.querySelectorAll('.plot-card[data-state="GROWING"]'); for (var gr=0;gr<gs.length;gr++){gs[gr].addEventListener('click',function(e){togglePopover(e,this);});}
  var rs=grid.querySelectorAll('.plot-card[data-state="RIPE"]'); for (var rp=0;rp<rs.length;rp++){rs[rp].addEventListener('click',function(){harvestPlot(this.dataset.plotId);});}
  var pbs=grid.querySelectorAll('.popover-btn'); for (var pb=0;pb<pbs.length;pb++){pbs[pb].addEventListener('click',function(e){e.stopPropagation();var a=this.dataset.action,card=this.closest('.plot-card'),pop=this.closest('.popover');closePopover(pop);if(a==='fertilize')fertilizePlot(card.dataset.plotId,this.dataset.fert);else if(a==='clear')clearPlot(card.dataset.plotId);});}
}

function renderPlots() {
  var grid=document.getElementById('plot-grid'); if (!grid) return;
  var vis=getVisiblePlots();
  grid.innerHTML = vis.map(function(p){return plotCard(p);}).join('');
  bindPlotEvents(grid);
  // 温室额外渲染果树区
  if (currentSubTab==='温室') {
    var treeGrid=document.getElementById('tree-grid');
    if (treeGrid) {
      var trees=getVisibleTrees();
      treeGrid.innerHTML = trees.map(function(p){return plotCard(p);}).join('');
      bindPlotEvents(treeGrid);
    }
  }
}

/** 仅更新进度条宽度和剩余时间文本（不替换 DOM，保证 CSS transition 动画生效） */
function tickPlotProgresses() {
  var grids = [document.getElementById('plot-grid')];
  if (currentSubTab==='温室') { var tg=document.getElementById('tree-grid'); if(tg) grids.push(tg); }
  for (var gi = 0; gi < grids.length; gi++) {
    var grid = grids[gi];
    if (!grid) continue;
    var cards = grid.querySelectorAll('.plot-card');
    for (var i = 0; i < cards.length; i++) {
      var card = cards[i];
      var plotId = card.dataset.plotId;
      var p = findPlot(plotId);
      if (!p) continue;
      var fill = card.querySelector('.progress-fill');
      var bottomEl = card.querySelector('.h-5.flex.items-center.justify-center');
      if (p.status === 'GROWING') {
        if (fill) fill.style.width = p.progress + '%';
        if (bottomEl) bottomEl.innerHTML = '<div class="flex justify-between text-xs text-earth/70 font-bold"><span>'+p.progress+'%</span><span>剩余 '+p.remaining+'</span></div>';
      } else if (p.status === 'TILLED' && p.wiltTimer !== null && p.wiltTimer > 0) {
        var wp = Math.round((1 - p.wiltTimer / 600) * 100);
        if (fill) fill.style.width = wp + '%';
        if (bottomEl) bottomEl.innerHTML = '<span class="text-xs text-red-500 tabular-nums font-extrabold">'+formatTime(p.wiltTimer)+'</span>';
      }
    }
  }
}

// ============================================================
//  23. 地块交互
// ============================================================
function onPreparingClick(pid){if(currentActiveAction&&currentActiveAction.plotId===pid){showToast('角色正在此地劳作中...');return;}var q=-1;for(var i=0;i<globalActionQueue.length;i++){if(globalActionQueue[i].plotId===pid){q=i;break;}}if(q>=0){withdrawQueuedPlot(pid);return;}showToast('此地块等待中...');}
function withdrawQueuedPlot(pid){var p=findPlot(pid);if(!p)return;globalActionQueue=globalActionQueue.filter(function(q){return q.plotId!==pid;});if(p.status==='PREPARING'&&p.cropId){refundSeed(p);resetPlotToEmpty(p);showToast('🔙 已撤回排队，种子已退还');}else{p.remaining=null;showToast('🔙 已从队列中移除');}renderAll();}
function onTilledClick(pid){var p=findPlot(pid);if(!p)return;if(p.cropId&&p.resumeFrom==='WATERING'){if(isPlayerBusy()){if(currentActiveAction.region===currentRegion){globalActionQueue.push({type:'FARMING',region:currentRegion,subTab:currentSubTab,plotId:p.id,seedId:p.cropId,icon:p.icon,name:p.cropName,growthS:p.totalS});p.remaining='排队中';showToast(p.cropName+' 洒水已加入队列');renderAll();}else{pendingInterrupt={plotId:p.id,seedId:p.cropId,source:'resume',skipSteps:2};showInterruptModal('洒水',p);}return;}p.wiltTimer=null;startActionFrom(pid,2,currentRegion,currentSubTab);showToast('💧 开始为'+p.cropName+'洒水');return;}if(p.isPreTilled&&!p.cropId)openSeedModal(pid);}

// ============================================================
//  24. 种子弹窗

function openSeedModal(pid){currentPlotId=pid;var sc;if(currentSubTab==='温室'){sc=ALL_CROPS.filter(function(c){return c.subTabs.indexOf('温室')>=0;});}else{sc=getCropsBySeasonTab(currentSeason,currentSubTab);}if(currentSubTab==='药田'){sc=sc.filter(function(c){return c.type==='药草';});}var hs=[],so=[];for(var i=0;i<sc.length;i++){var c=sc[i];if((playerSeeds[c.seedId]||0)>0)hs.push({crop:c,source:'warehouse',count:playerSeeds[c.seedId]});else so.push({crop:c,source:'shop'});}

// ---- 地块开垦 ----
var unlockTargetPlotId = null;

function getPlotNum(pid) {
  if (pid.indexOf('tree-')===0) return parseInt(pid.replace('tree-',''));
  if (pid.indexOf('herb-')===0) return parseInt(pid.replace('herb-',''));
  if (pid.indexOf('gh-')===0) return parseInt(pid.replace('gh-',''));
  return parseInt(pid.replace('farm-',''));
}

function getPlotLabel(pid) {
  if (pid.indexOf('tree-')===0) return '温室果树位';
  if (pid.indexOf('herb-')===0) return '药田';
  if (pid.indexOf('gh-')===0) return '温室';
  return '农田';
}

function getNextUnlockablePlot(pid) {
  var subTab = null, isTree = false;
  if (pid.indexOf('tree-')===0) { subTab = '温室'; isTree = true; }
  else if (pid.indexOf('herb-')===0) { subTab = '药田'; }
  else if (pid.indexOf('gh-')===0) { subTab = '温室'; }
  else { subTab = '农田'; }
  var best = null;
  for (var i=0;i<plots.length;i++) {
    if (plots[i].subTab!==subTab || plots[i].status!=='LOCKED') continue;
    if (!!plots[i].isTree !== isTree) continue;
    var n = getPlotNum(plots[i].id);
    if (best===null || n<best) best = n;
  }
  return best;
}

function calcUnlockCost(pid) {
  var num = getPlotNum(pid);
  if (pid.indexOf('tree-')===0) return 50000 + Math.floor(35000 * Math.pow(num - 1, 1.8));
  if (pid.indexOf('herb-')===0) return 5000 + Math.floor(450 * Math.pow(num - 4, 2.2));
  if (pid.indexOf('gh-')===0) return 15000 + Math.floor(1800 * Math.pow(num - 4, 2.1));
  return 100 + Math.floor(40 * Math.pow(num - 4, 2.4));
}

function openUnlockModal(pid) {
  var plotNum = getPlotNum(pid);
  var nextNum = getNextUnlockablePlot(pid);
  if (plotNum !== nextNum) {
    var label = getPlotLabel(pid);
    showToast('🔒 需先解锁第 '+nextNum+' 块'+label);
    return;
  }
  var cost = calcUnlockCost(pid);
  var label = getPlotLabel(pid);
  unlockTargetPlotId = pid;
  document.getElementById('unlock-msg').innerHTML = '是否花费 <b class=\"text-soildark font-extrabold text-lg\">'+cost.toLocaleString()+' 金币</b> 开垦第 <b class=\"text-soildark font-extrabold\">'+plotNum+'</b> 块'+label+'？';
  document.getElementById('unlock-confirm-btn').textContent = '确认开垦 · '+cost.toLocaleString()+' 金币';
  document.getElementById('unlock-modal').classList.remove('hidden');
}

function closeUnlockModal(){ document.getElementById('unlock-modal').classList.add('hidden'); unlockTargetPlotId=null; }

function confirmUnlock(){
  if (!unlockTargetPlotId) { closeUnlockModal(); return; }
  var cost = calcUnlockCost(unlockTargetPlotId);
  var label = getPlotLabel(unlockTargetPlotId);
  var plotNum = getPlotNum(unlockTargetPlotId);
  if (gold < cost) { showToast('❌ 金币不足！需要 '+cost.toLocaleString()+' 金币'); closeUnlockModal(); return; }
  var p = findPlot(unlockTargetPlotId);
  if (!p || p.status!=='LOCKED') { closeUnlockModal(); return; }
  gold -= cost;
  updateGoldDisplay();
  resetPlotToEmpty(p);
  closeUnlockModal();
  saveAllUnlocks();
  renderAll();
  showToast('🔓 第 '+plotNum+' 块'+label+'已开垦！扣除 '+cost.toLocaleString()+' 金币');
}

function saveAllUnlocks() {
  var farmIds=[], herbIds=[], ghIds=[], treeIds=[];
  for (var i=0;i<plots.length;i++) {
    var p = plots[i];
    if (p.status==='LOCKED') continue;
    if (p.id.indexOf('tree-')===0) treeIds.push(p.id);
    else if (p.id.indexOf('herb-')===0) herbIds.push(p.id);
    else if (p.id.indexOf('gh-')===0) ghIds.push(p.id);
    else if (p.id.indexOf('farm-')===0) farmIds.push(p.id);
  }
  try {
    localStorage.setItem('farm_unlocked_ids', JSON.stringify(farmIds));
    localStorage.setItem('custom_medicinal_plots', JSON.stringify(herbIds));
    localStorage.setItem('custom_greenhouse_plots', JSON.stringify(ghIds));
    localStorage.setItem('custom_greenhouse_trees', JSON.stringify(treeIds));
  } catch(e) {}
}

function loadFarmUnlocks() {
  try {
    var keys = [
      { key:'farm_unlocked_ids', idPrefix:'farm-' },
      { key:'custom_medicinal_plots', idPrefix:'herb-' },
      { key:'custom_greenhouse_plots', idPrefix:'gh-' },
      { key:'custom_greenhouse_trees', idPrefix:'tree-' }
    ];
    for (var ki=0;ki<keys.length;ki++) {
      var raw = localStorage.getItem(keys[ki].key);
      if (!raw) continue;
      var ids = JSON.parse(raw);
      for (var i=0;i<ids.length;i++) {
        var p = findPlot(ids[i]);
        if (p && p.status==='LOCKED') resetPlotToEmpty(p);
      }
    }
  } catch(e) {}
}

nalPrice*1.25)+'）</div>';}b+='<div class="flex items-center justify-between mt-3"><span class="text-sm text-earth/70 font-bold">出售数量</span><div class="flex items-center gap-2"><button class="w-8 h-8 rounded-lg border-2 border-soildark/35 text-earth/70 hover:bg-earth/5 transition-colors font-extrabold" onclick="adjustSellCount(-1)">−</button><span class="font-mono text-base w-10 text-center font-extrabold" id="sell-count-display">1</span><button class="w-8 h-8 rounded-lg border-2 border-soildark/35 text-earth/70 hover:bg-earth/5 transition-colors font-extrabold" onclick="adjustSellCount(1)">+</button><button class="px-2 py-1.5 rounded-lg text-xs border-2 border-soildark/30 text-earth/70 hover:bg-earth/5 transition-colors font-extrabold" onclick="adjustSellCount('+slot.count+')">最大</button></div></div>';b+='<div class="mt-2 text-sm text-earth/70 font-medium">预计获得：<span class="font-mono text-soildark font-extrabold" id="sell-total-display">'+pi.finalPrice.toLocaleString()+'</span> 金币</div>';document.getElementById('sell-modal-body').innerHTML=b;document.getElementById('sell-modal').classList.remove('hidden');}

function adjustSellCount(delta){var slot=null;for(var i=0;i<warehouseSlots.length;i++){if(warehouseSlots[i].stackKey===sellTargetStackKey){slot=warehouseSlots[i];break;}}if(!slot)return;var count;if(delta===slot.count)count=slot.count;else count=Math.max(1,Math.min(slot.count,sellTargetCount+delta));sellTargetCount=count;document.getElementById('sell-count-display').textContent=count;var pi=calculateSellPrice({tasteTags:slot.tasteTags||[],basePrice:Math.floor((slot.basePrice||10)*qualityPriceMult(slot.quality||1)),materialTags:slot.materialTags||[],itemLevel:slot.itemLevel||1});document.getElementById('sell-total-display').textContent=(pi.finalPrice*count).toLocaleString();}
function confirmSell(){var slot=null;for(var i=0;i<warehouseSlots.length;i++){if(warehouseSlots[i].stackKey===sellTargetStackKey){slot=warehouseSlots[i];break;}}if(!slot||sellTargetCount<=0){closeSellModal();return;}var count=Math.min(sellTargetCount,slot.count);var result=sellItem(slot.itemId,slot.name,slot.icon,count,slot.tasteTags||[],slot.basePrice||10,slot.materialTags||[],slot.itemLevel||1);removeFromWarehouse(slot.itemId,count,slot.quality);var msg='💰 出售 '+slot.name+' ×'+count+'，获得 '+(result.finalPrice*count)+' 金币';if(result.totalBonus>0)msg+='（含+'+result.totalBonus+'%）';showToast(msg);closeSellModal();renderAll();}

// 卡片居中浮窗提示（自动1秒消失/点外部关闭）
function showCardNotice(cardEl, msg) {
  if (!cardEl) return;
  var notice = document.createElement('div');
  notice.className = 'absolute inset-0 z-10 flex items-center justify-center bg-ink/15 rounded-xl';
  notice.style.backdropFilter = 'blur(1px)';
  notice.innerHTML = '<div class="bg-page rounded-xl px-5 py-3 shadow-xl border-2 border-soildark/30 text-sm font-extrabold text-soildark text-center fade-in">'+msg+'</div>';
  cardEl.style.position = 'relative';
  var closer = function() { if (notice.parentNode) notice.parentNode.removeChild(notice); };
  var clickOut = function(e) { closer(); document.removeEventListener('click', clickOut); };
  notice.addEventListener('click', function(e) { e.stopPropagation(); closer(); document.removeEventListener('click', clickOut); });
  setTimeout(function() { closer(); document.removeEventListener('click', clickOut); }, 1000);
  setTimeout(function() { document.addEventListener('click', clickOut); }, 0);
  cardEl.appendChild(notice);
}

function renderActionBar(){var bar=document.getElementById('action-bar');if(!bar)return;if(!currentActiveAction){bar.className='mb-2 px-4 py-3 rounded-xl bg-green-100/60 border-2 border-green-300/40 flex items-center gap-3 text-sm';document.getElementById('action-bar-icon').textContent='😌';document.getElementById('action-bar-title').textContent='闲适中...';document.getElementById('action-bar-fill').style.width='0%';document.getElementById('action-bar-time').textContent='';document.getElementById('action-bar-queue').textContent='';return;}bar.className='mb-2 px-4 py-3 rounded-xl bg-amber-100/60 border-2 border-amber-300/40 flex items-center gap-3 text-sm';var pct=Math.round((1-currentActiveAction.remainingS/currentActiveAction.totalS)*100);if(currentActiveAction.type==='NODE'){document.getElementById('action-bar-icon').textContent='⚒️';document.getElementById('action-bar-title').textContent='资源采集... ('+currentActiveAction.remainingS+'s)';}else if(currentActiveAction.type==='HUSBANDRY'){document.getElementById('action-bar-icon').textContent=currentActiveAction.icon||'🐾';document.getElementById('action-bar-title').textContent=(currentActiveAction.label||'养殖操作')+'... ('+currentActiveAction.remainingS+'s)';}else{var step=ACTION_STEPS[currentActiveAction.stepIndex];var plot=findPlot(currentActiveAction.plotId);document.getElementById('action-bar-icon').textContent=step.icon;var cropLabel=plot&&plot.cropName?plot.cropName:'';document.getElementById('action-bar-title').textContent='正在 ['+currentActiveAction.subTab+'] '+(cropLabel?'为 '+cropLabel+' ':'')+step.label+'... ('+currentActiveAction.remainingS+'s)';}document.getElementById('action-bar-fill').style.width=pct+'%';document.getElementById('action-bar-time').textContent=currentActiveAction.remainingS+'s';document.getElementById('action-bar-queue').textContent=globalActionQueue.length>0?'队列 +'+globalActionQueue.length:'';}
