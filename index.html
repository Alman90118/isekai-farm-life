<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>异世界农场生活</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{colors:{
  daily:'#fbf5eb',page:'#fdf8f2',ink:'#4a3729',soildark:'#5c3d2e',
  earth:'#8a6e4e',sprout:'#6b8c3e',harvest:'#b8732a',gold:'#b8813c',
  ribbon_green:'#7a9a4a',ribbon_blue:'#6a8ca0',ribbon_amber:'#c4953c',ribbon_red:'#b85440',
}}}}}
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&display=swap');
html{font-size:18px;}
body{font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;color:#4a3729;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:#b8a48a;border-radius:2px;}
@keyframes ripePulse{0%,100%{box-shadow:0 0 0 0 rgba(184,115,42,.35)}50%{box-shadow:0 0 0 10px rgba(184,115,42,0)}}
.ripe-glow{animation:ripePulse 2.2s ease-in-out infinite;}
@keyframes wiltPulse{0%,100%{border-color:rgba(200,80,50,.25)}50%{border-color:rgba(200,80,50,.6)}}
.wilt-warn{animation:wiltPulse 1s ease-in-out infinite;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease-out;}
.progress-fill{transition:width .5s ease;}
.plot-card{transition:all .2s ease;}.plot-card:hover{transform:translateY(-1px);}
.card-ribbon{position:relative;border-top:3px solid;}
.card-ribbon::before{
  content:attr(data-ribbon);
  position:absolute;top:-1px;left:14px;transform:translateY(-50%);
  font-size:12px;font-weight:700;letter-spacing:.06em;
  padding:3px 14px;border-radius:999px;white-space:nowrap;
}
.ribbon-green{border-top-color:#7a9a4a;}.ribbon-green::before{background:#eef4e4;color:#5a7a2e;}
.ribbon-blue{border-top-color:#6a8ca0;}.ribbon-blue::before{background:#e8f0f4;color:#4a6a7e;}
.ribbon-amber{border-top-color:#c4953c;}.ribbon-amber::before{background:#faf3e6;color:#8a6020;}
.ribbon-red{border-top-color:#b85440;}.ribbon-red::before{background:#faece8;color:#8a3020;}
.ribbon-purple{border-top-color:#8a6ca0;}.ribbon-purple::before{background:#f2ecf6;color:#6a4a7e;}
.feature-badge{font-size:11px;padding:2px 7px;border-radius:3px;font-weight:700;letter-spacing:.02em;}
.ft-fast{background:#e3f2e0;color:#3d6b2e;border:1px solid #a3c89a;}
.ft-multi{background:#e0eaf4;color:#3a5a7e;border:1px solid #9ab0c8;}
.ft-cycle{background:#f0e0f4;color:#5e3a6e;border:1px solid #b89ac8;}
.ft-value{background:#fae8d0;color:#7a5020;border:1px solid #d4a860;}
/* 一键收获大按钮呼吸动画 */
@keyframes harvestGlow{0%,100%{box-shadow:0 0 8px rgba(184,115,42,.4)}50%{box-shadow:0 0 20px rgba(184,115,42,.7)}}
.harvest-big{animation:harvestGlow 1.8s ease-in-out infinite;}
/* 自定义颜色显式后备 — Tailwind CDN 无法为 hex 色值生成 opacity 修饰符 */
.text-harvest{color:#b8732a !important}.bg-harvest{background-color:#b8732a !important}
.text-sprout{color:#6b8c3e !important}.bg-sprout{background-color:#6b8c3e !important}
.text-earth{color:#8a6e4e !important}.bg-earth{background-color:#8a6e4e !important}
.text-soildark{color:#5c3d2e !important}.bg-soildark{background-color:#5c3d2e !important}
.text-ink{color:#4a3729 !important}.bg-ink{background-color:#4a3729 !important}
.text-daily{color:#fbf5eb !important}.bg-daily{background-color:#fbf5eb !important}
.text-page{color:#fdf8f2 !important}.bg-page{background-color:#fdf8f2 !important}
.text-gold{color:#b8813c !important}.bg-gold{background-color:#b8813c !important}
</style>
</head>
<body class="h-full bg-daily text-ink">

<!-- ========== 顶部栏 ========== -->
<header class="fixed top-0 left-0 right-0 z-40 h-12 bg-page/95 backdrop-blur border-b-2 border-soildark/35 flex items-center justify-between px-5 shadow-sm">
  <span class="text-base font-extrabold text-soildark tracking-wider">仙 农 · 牧场日报</span>
  <div class="flex items-center gap-6">
    <div class="flex items-center gap-2"><span class="text-gold text-lg">●</span><span class="font-mono text-lg font-bold" id="gold-display">12,480</span></div>
    <div class="flex items-center gap-2"><span class="text-earth/70 text-base">◇</span><span class="font-mono text-base text-earth/70" id="token-display">320</span></div>
  </div>
</header>

<!-- ========== 主体 ========== -->
<div class="pt-12 flex h-full">

  <!-- ====== 左侧导航 ====== -->
  <aside class="w-52 shrink-0 bg-page/80 border-r-2 border-soildark/25 overflow-y-auto">
    <div class="p-3 pt-4">
      <div class="text-[13px] text-earth/80 tracking-widest uppercase mb-2 font-bold">场 景</div>
      <nav class="flex flex-col gap-1" id="region-nav"></nav>
      <div class="h-px bg-soildark/20 my-3"></div>
      <div class="text-[13px] text-earth/80 tracking-widest uppercase mb-2 font-bold">功 能</div>
      <nav class="flex flex-col gap-1" id="func-nav"></nav>
    </div>
  </aside>

  <!-- ====== 中间内容 ====== -->
  <main class="flex-1 overflow-y-auto flex flex-col">
    <div class="px-5 pt-3 pb-0" id="subtab-bar"></div>
    <div class="flex-1 p-5 pt-3" id="main-content"></div>
  </main>

  <!-- ====== 右侧 小镇情报监控中心 ====== -->
  <aside class="w-80 shrink-0 bg-page/80 border-l-2 border-soildark/25 overflow-y-auto p-3 flex flex-col gap-3" id="info-panel"></aside>
</div>

<!-- ========== 种子弹窗 ========== -->
<div id="seed-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-ink/30 backdrop-blur-sm" onclick="closeSeedModal()">
  <div class="bg-page rounded-2xl shadow-xl border-2 border-soildark/35 w-[460px] max-h-[580px] overflow-hidden flex flex-col fade-in" onclick="event.stopPropagation()">
    <div class="px-5 py-3 border-b-2 border-soildark/25 flex items-center justify-between" style="background:linear-gradient(180deg,#faf3e6,#fdf8f2)">
      <span class="text-base font-extrabold text-soildark">选择种子</span>
      <button class="text-earth/70 hover:text-soildark text-2xl leading-none" onclick="closeSeedModal()">&times;</button>
    </div>
    <div class="overflow-y-auto p-3 space-y-1.5" id="seed-list"></div>
    <div class="px-5 py-2 border-t-2 border-soildark/25 text-[13px] text-earth/70 font-medium">选中种子立即扣除 · 不可撤销</div>
  </div>
</div>

<!-- ========== 打断确认弹窗 ========== -->
<div id="interrupt-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-ink/35 backdrop-blur-sm">
  <div class="bg-page rounded-2xl shadow-xl border-2 border-soildark/35 w-[420px] p-6 fade-in flex flex-col items-center text-center" onclick="event.stopPropagation()">
    <span class="text-5xl mb-3">&#x26A0;&#xFE0F;</span>
    <h3 class="text-base font-extrabold text-soildark mb-2">跨区域打断确认</h3>
    <p class="text-sm text-earth/70 leading-relaxed mb-2" id="interrupt-msg"></p>
    <div class="w-full text-left text-[13px] space-y-1 mb-4" id="interrupt-detail"></div>
    <div class="flex gap-3 w-full">
      <button class="flex-1 py-2.5 rounded-xl text-sm font-bold border-2 border-soildark/35 text-earth/70 hover:bg-earth/5 transition-colors" onclick="cancelInterrupt()">取 消</button>
      <button class="flex-1 py-2.5 rounded-xl text-sm font-bold bg-red-600/90 text-white hover:bg-red-600 transition-colors" onclick="confirmInterrupt()">确定打断</button>
    </div>
  </div>
</div>

<!-- ========== 仓库出售弹窗 ========== -->
<div id="sell-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-ink/30 backdrop-blur-sm" onclick="closeSellModal()">
  <div class="bg-page rounded-2xl shadow-xl border-2 border-soildark/35 w-[420px] p-6 fade-in flex flex-col items-center text-center" onclick="event.stopPropagation()">
    <span class="text-5xl mb-3" id="sell-modal-icon">📦</span>
    <h3 class="text-base font-extrabold text-soildark mb-1" id="sell-modal-title">出售物品</h3>
    <div class="w-full mt-3 space-y-2 text-left text-sm" id="sell-modal-body"></div>
    <div class="flex gap-3 w-full mt-4">
      <button class="flex-1 py-2.5 rounded-xl text-sm font-bold border-2 border-soildark/35 text-earth/70 hover:bg-earth/5 transition-colors" onclick="closeSellModal()">取 消</button>
      <button class="flex-1 py-2.5 rounded-xl text-sm font-bold text-white hover:opacity-90 transition-colors" style="background:#b8732a" onclick="confirmSell()">确认出售</button>
    </div>
  </div>
</div>

<!-- ========== NPC 互动弹窗 ========== -->
<div id="npc-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-ink/30 backdrop-blur-sm" onclick="closeNpcModal()">
  <div id="npc-modal-card" class="bg-page rounded-2xl shadow-xl border-2 border-soildark/35 w-[450px] max-h-[620px] overflow-hidden flex flex-col fade-in" onclick="event.stopPropagation()">
    <div class="px-5 py-3 border-b-2 border-soildark/25 flex items-center justify-between" style="background:linear-gradient(180deg,#faf3e6,#fdf8f2)">
      <span class="text-base font-extrabold text-soildark" id="npc-modal-title">采购官</span>
      <button class="text-earth/70 hover:text-soildark text-2xl leading-none" onclick="closeNpcModal()">&times;</button>
    </div>
    <div class="overflow-y-auto p-4 space-y-3" id="npc-modal-body"></div>
    <div class="px-5 py-2 border-t-2 border-soildark/25 text-[12px] text-earth/70 font-medium" id="npc-modal-footer">每天每位采购官限互动一次</div>
  </div>
</div>

<!-- 立绘上传隐藏控件 -->
<input type="file" id="npc-image-upload" accept="image/*" class="hidden" onchange="handleNpcImageUpload(event,'large')">
<input type="file" id="npc-avatar-upload" accept="image/*" class="hidden" onchange="handleNpcImageUpload(event,'avatar')">

<!-- ========== 送礼选物弹窗 ========== -->
<div id="gift-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-ink/30 backdrop-blur-sm" onclick="closeGiftModal()">
  <div class="bg-page rounded-2xl shadow-xl border-2 border-soildark/35 w-[460px] max-h-[580px] overflow-hidden flex flex-col fade-in" onclick="event.stopPropagation()">
    <div class="px-5 py-3 border-b-2 border-soildark/25 flex items-center justify-between" style="background:linear-gradient(180deg,#faf3e6,#fdf8f2)">
      <span class="text-base font-extrabold text-soildark">赠送礼品</span>
      <button class="text-earth/70 hover:text-soildark text-2xl leading-none" onclick="closeGiftModal()">&times;</button>
    </div>
    <div class="overflow-y-auto p-3 space-y-1.5 flex-1" id="gift-list"></div>
    <div class="px-5 py-2 border-t-2 border-soildark/25 text-[12px] text-earth/70 font-medium">仅显示该采购官偏好的物品 · 赠送不获得金币</div>
  </div>
</div>

<!-- ========== 地块开垦弹窗 ========== -->
<div id="unlock-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-ink/30 backdrop-blur-sm" onclick="closeUnlockModal()">
  <div class="bg-page rounded-2xl shadow-xl border-2 border-soildark/35 w-[420px] p-6 fade-in flex flex-col items-center text-center" onclick="event.stopPropagation()">
    <span class="text-5xl mb-3">🔒</span>
    <h3 class="text-base font-extrabold text-soildark mb-2">开垦新地块</h3>
    <p class="text-sm text-earth/80 leading-relaxed mb-1" id="unlock-msg"></p>
    <p class="text-xs text-earth/60 mb-4">开垦后该地块将永久变为可用空地</p>
    <div class="flex gap-3 w-full">
      <button class="flex-1 py-2.5 rounded-xl text-sm font-bold border-2 border-soildark/35 text-earth/70 hover:bg-earth/5 transition-colors" onclick="closeUnlockModal()">取 消</button>
      <button class="flex-1 py-2.5 rounded-xl text-sm font-bold text-white hover:opacity-90 transition-colors" style="background:#6b8c3e" id="unlock-confirm-btn" onclick="confirmUnlock()"></button>
    </div>
  </div>
</div>

<!-- ========== NPC 快捷气泡 ========== -->
<div id="npc-bubble" class="hidden fixed z-[55] bg-page rounded-2xl shadow-xl border-2 border-soildark/35 p-3 fade-in min-w-[180px]" onclick="event.stopPropagation()">
  <div class="flex flex-col gap-2">
    <button class="w-full py-3 rounded-xl text-base font-extrabold bg-green-100/70 text-green-800 border-2 border-green-300/50 hover:bg-green-100 transition-colors" id="npc-bubble-greet">👋 打招呼</button>
    <button class="w-full py-3 rounded-xl text-base font-extrabold bg-rose-100/70 text-rose-800 border-2 border-rose-300/50 hover:bg-rose-100 transition-colors" id="npc-bubble-gift">🎁 送礼物</button>
    <button class="w-full py-2 rounded-lg text-sm font-bold text-earth/70 hover:bg-earth/5 transition-colors" id="npc-bubble-cancel">取消</button>
  </div>
</div>

<!-- ========== Toast ========== -->
<div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-xl border-2 border-soildark/40 text-sm font-bold shadow-lg transition-all duration-300 opacity-0 pointer-events-none" style="background:#4a3729;color:#a8e6a0"></div>

<!-- ====================================================================== -->

// ============================================================
var regionRep = {};
var npcRep = {};       // { npcId: cumulativeRep }
var npcDailyState = {}; // { npcId: { greeted:bool, gifted:bool } }

Object.keys(REGION_DEFS).forEach(function(k) { regionRep[k] = 0; });
NPC_DATABASE.forEach(function(n) { npcRep[n.id] = 0; npcDailyState[n.id] = { greeted:false, gifted:false }; });

// 区域等级 (累积制: 300 * level^1.8)
function getRegionLevel(rep) { return Math.max(1, Math.floor(Math.pow(Math.max(0,rep)/300, 1/1.8))); }
function getRegionNextXP(level) { return Math.floor(300 * Math.pow(level, 1.8)); }

// NPC好感等级
function getNpcLevel(rep) { return Math.max(1, Math.floor(Math.pow(Math.max(0,rep)/100, 2/3))); }
function getNpcNextXP(level) { return Math.floor(100 * Math.pow(level, 1.5)); }

// 等级上升检测
var _prevRegionLevels = {};
var _prevNpcLevels = {};
Object.keys(REGION_DEFS).forEach(function(k) { _prevRegionLevels[k] = 1; });
NPC_DATABASE.forEach(function(n) { _prevNpcLevels[n.id] = 1; });

function checkLevelUps() {
  // 区域
  Object.keys(REGION_DEFS).forEach(function(k) {
    var lv = getRegionLevel(regionRep[k]||0);
    if (lv > (_prevRegionLevels[k]||1)) {
      _prevRegionLevels[k] = lv;
      showToast(REGION_DEFS[k].icon + ' ' + REGION_DEFS[k].name + ' 区域等级提升至 Lv.' + lv + '！');
    }
  });
  // NPC
  NPC_DATABASE.forEach(function(n) {
    var lv = getNpcLevel(npcRep[n.id]||0);
    if (lv > (_prevNpcLevels[n.id]||1)) {
      _prevNpcLevels[n.id] = lv;
      showToast(n.icon + ' ' + n.name + ' 好感度 Lv.' + lv + '！');
    }
  });
}

//  5. 每日来访 NPC
// ============================================================
var dailyNPCs = [];
var dayTimer = DAY_DURATION;

function generateDailyNPCs() {
  // 人族权重最高(60%)，保证至少1个人族
  dailyNPCs = [];
  var humanNPCs = NPC_DATABASE.filter(function(n) { return n.race==='human'; });
  var otherNPCs = NPC_DATABASE.filter(function(n) { return n.race!=='human'; });

  // 随机选1个人族
  dailyNPCs.push(humanNPCs[Math.floor(Math.random()*humanNPCs.length)]);

  // 再选0-2个其他族（加权随声望）
  var extraCount = Math.random()<0.3 ? 2 : (Math.random()<0.6 ? 1 : 0);
  var pool = otherNPCs.slice();
  // 按区域声望加权打乱
  for (var i=pool.length-1;i>0;i--) { var j=Math.floor(Math.random()*(i+1)); var t=pool[i]; pool[i]=pool[j]; pool[j]=t; }
  for (var e=0; e<extraCount && pool.length>0; e++) {
    dailyNPCs.push(pool.shift());
  }

  // 为当天来访 NPC 计算每日随机口味
  for (var d=0; d<dailyNPCs.length; d++) {
    dailyNPCs[d].dailyTastes = getNpcDailyTastes(dailyNPCs[d]);
  }

  // 重置每日互动状态
  NPC_DATABASE.forEach(function(n) {
    npcDailyState[n.id] = { greeted:false, gifted:false };
  });
}

// ============================================================
//  6. 双轨售价引擎 (计算时基於今日来访NPC)
// ============================================================
function calculateSellPrice(item) {
  var tasteTags = item.tasteTags || [];
  var materialTags = item.materialTags || [];
  var itemLevel = item.itemLevel || 1;
  var basePrice = item.basePrice || 10;

  var tasteBonus = 0;
  var materialBonus = 0;
  var matchedTastes = [];
  var matchedMaterials = [];
  var matchedNpcIds = {};

  // 口味匹配 (每个NPC的口味偏好命中+5%)
  for (var v=0; v<dailyNPCs.length; v++) {
    var npc = dailyNPCs[v];
    var prefs = npc.dailyTastes || [];
    for (var t=0; t<tasteTags.length; t++) {
      if (prefs.indexOf(tasteTags[t]) >= 0) {
        tasteBonus += 5;
        if (matchedTastes.indexOf(tasteTags[t]) < 0) matchedTastes.push(tasteTags[t]);
        matchedNpcIds[npc.id] = true;
      }
    }
  }

  // 材料偏好匹配 (每个NPC的物品偏好命中+10%)
  for (var v2=0; v2<dailyNPCs.length; v2++) {
    var npc2 = dailyNPCs[v2];
    var itemPrefs = npc2.itemPrefs || [];
    for (var p=0; p<itemPrefs.length; p++) {
      var pref = itemPrefs[p];
      for (var m=0; m<materialTags.length; m++) {
        if (materialTags[m] === pref.value) {
          var minLv = pref.minLevel || 1;
          if (itemLevel >= minLv) {
            materialBonus += 10;
            if (matchedMaterials.indexOf(pref.value) < 0) matchedMaterials.push(pref.value);
            matchedNpcIds[npc2.id] = true;
          }
        }
      }
    }
  }

  var totalBonus = tasteBonus + materialBonus;
  var finalPrice = Math.floor(basePrice * (1 + totalBonus/100));

  return {
    basePrice: basePrice,
    tasteBonus: tasteBonus,
    materialBonus: materialBonus,
    totalBonus: totalBonus,
    finalPrice: finalPrice,
    matchedTastes: matchedTastes,
    matchedMaterials: matchedMaterials,
    matchedNpcIds: Object.keys(matchedNpcIds)
  };
}

/** 仓库出售：金币 + NPC好感 + 区域声望 */
function sellItem(itemId, itemName, itemIcon, count, tasteTags, basePrice, materialTags, itemLevel) {
  var item = {
    tasteTags: tasteTags||[], basePrice: basePrice||10,
    materialTags: materialTags||[], itemLevel: itemLevel||1
  };
  var result = calculateSellPrice(item);
  var totalGold = result.finalPrice * count;
  gold += totalGold;

  // 分配合并后的好感度（含口味偏好命中和交易活动）
  var repPerNpc = Math.floor(result.finalPrice * 1.25 * count);
  for (var i=0; i<result.matchedNpcIds.length; i++) {
    var nid = result.matchedNpcIds[i];
    npcRep[nid] = (npcRep[nid]||0) + repPerNpc;
    var npcObj = getNpc(nid);
    if (npcObj) { regionRep[npcObj.region] = (regionRep[npcObj.region]||0) + repPerNpc; }
  }

  pushLog('出售', itemId, itemName, itemIcon, count);
  updateGoldDisplay();
  checkLevelUps();
  return result;
}

function calcRecipeOutput(recipe, selectedSlots) {
  var totalInputValue = 0;
  var totalQuality = 0;
  var count = 0;
  for (var i = 0; i < selectedSlots.length; i++) {
    var sl = selectedSlots[i];
    if (!sl) continue;
    var qm = qualityPriceMult(sl.quality||1);
    totalInputValue += (sl.basePrice||10) * qm * (recipe.inputs[i].count||1);
    totalQuality += (sl.quality||1);
    count++;
  }
  var outputPrice = Math.floor(totalInputValue * recipe.profitCoeff);
  var outputQuality = count > 0 ? Math.max(1, Math.floor(totalQuality / count)) : 1;
  return { price: outputPrice, quality: outputQuality, name: qualityName(recipe.outputName, outputQuality) };
}

  quality: { id:'fert_quality', name:'品质肥料', icon:'⚗️', timeReduce:300, qualBonus:0.15,  lv4Bonus:0 },

};

function rollQuality(farmingLv, seedLv, fertType) {
  var ft = FERTILER_TYPES[fertType] || { qualBonus: 0, lv4Bonus: 0 };
  var qBonus = (farmingLv - 1) * 0.005 + (seedLv || 0) * 0.02 + (ft.qualBonus || 0);
  var lv4Bonus = (seedLv || 0) * 0.005 + (ft.lv4Bonus || 0);
  var lv3Prob = Math.min(0.60, 0.12 + qBonus);
  var lv4Prob = Math.min(0.30, 0.03 + lv4Bonus);
  var lv2Prob = Math.min(0.70, 0.25 + qBonus * 0.5);
  var roll = Math.random();
  if (roll < lv4Prob) return 4;
  if (roll < lv4Prob + lv3Prob) return 3;
  if (roll < lv4Prob + lv3Prob + lv2Prob) return 2;
  return 1;
}

function removeFromWarehouse(itemId, count, quality) {
  var stackKey = makeQualityItemId(itemId, quality || 1);
  for (var i=0;i<warehouseSlots.length;i++) {
    if (warehouseSlots[i].stackKey===stackKey) { if (warehouseSlots[i].count<count) return false; warehouseSlots[i].count-=count; if (warehouseSlots[i].count<=0) warehouseSlots.splice(i,1); return true; }
  }
  // fallback: try any quality if specific quality not found
  if (!quality) return false;
  for (var j=0;j<warehouseSlots.length;j++) {
    if (warehouseSlots[j].itemId===itemId && warehouseSlots[j].count>=count) {
      warehouseSlots[j].count-=count;
      if (warehouseSlots[j].count<=0) warehouseSlots.splice(j,1);
      return true;
    }
  }
  return false;
}

function getNpcDailyTastes(npc) {
  var t = npc.fixedTastes.slice();
  if (npc.randomTasteCount>0 && npc.randomTastePool.length>0) {
    var pool = npc.randomTastePool.slice();
    for (var i=pool.length-1;i>0;i--) { var j=Math.floor(Math.random()*(i+1)); var tmp=pool[i]; pool[i]=pool[j]; pool[j]=tmp; }
    for (var r=0; r<npc.randomTasteCount && r<pool.length; r++) { if (t.indexOf(pool[r])<0) t.push(pool[r]); }
  }
  return t;
}

// 打招呼
function greetNpc(npcId) {
  var npc = getNpc(npcId); if (!npc) return;
  if (npcDailyState[npcId].greeted) { showToast('今天已经打过招呼了！'); return; }
  npcDailyState[npcId].greeted = true;
  var gain = 50 + Math.floor(Math.random()*50); // 50-100
  npcRep[npcId] = (npcRep[npcId]||0) + gain;
  regionRep[npc.region] = (regionRep[npc.region]||0) + gain;
  showToast('👋 向' + npc.name + '打招呼！好感 +' + gain);
  checkLevelUps();
  renderAll();
}

// 送礼
var giftTargetNpcId = null;
function openGiftModal(npcId) {
  var npc = getNpc(npcId); if (!npc) return;
  if (npcDailyState[npcId].gifted) { showToast('今天已经送过礼物了！'); return; }
  giftTargetNpcId = npcId;

  // 筛选可送物品：口味或材料匹配
  var prefs = npc.dailyTastes || [];
  var itemPrefs = npc.itemPrefs || [];
  var eligible = [];
  for (var i=0;i<warehouseSlots.length;i++) {
    var s = warehouseSlots[i];
    if (s.count<=0) continue;
    var match = false;
    // 口味匹配
    for (var t=0;t<(s.tasteTags||[]).length;t++) { if (prefs.indexOf(s.tasteTags[t])>=0) { match=true; break; } }
    // 材料匹配
    if (!match) {
      for (var p=0;p<itemPrefs.length;p++) {
        for (var m=0;m<(s.materialTags||[]).length;m++) {
          if (s.materialTags[m]===itemPrefs[p].value && (s.itemLevel||1)>=(itemPrefs[p].minLevel||1)) { match=true; break; }
        }
        if (match) break;
      }
    }
    if (match) eligible.push(s);
  }

  var h = '';
  if (eligible.length===0) {
    h = '<div class="text-center py-12 text-earth/70 text-sm font-medium">仓库中暂无' + npc.name + '偏好的物品</div>';
  } else {
    h = eligible.map(function(s) {
      return '<button class="gift-opt w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-pink-100/60 border-2 border-pink-200/50 hover:bg-pink-100 hover:border-pink-300 transition-colors text-left" data-item-id="' + s.itemId + '">' +
        '<span class="text-2xl">' + s.icon + '</span>' +
        '<div class="flex-1"><div class="text-sm font-bold text-soildark">' + s.name + '</div>' +
        '<div class="text-[12px] text-earth/70 font-medium">库存 ×' + s.count + ' · 估价 ' + (s.basePrice||10) + ' 金币</div></div>' +
        '<span class="text-xs text-rose-700 font-bold shrink-0">🎁 赠送</span></button>';
    }).join('');
  }

  document.getElementById('gift-list').innerHTML = h;
  document.getElementById('gift-modal').classList.remove('hidden');

  var btns = document.querySelectorAll('#gift-list .gift-opt');
  for (var b=0;b<btns.length;b++) {
    btns[b].addEventListener('click', function() {
      confirmGift(this.dataset.itemId);
    });
  }
}

function closeGiftModal() { document.getElementById('gift-modal').classList.add('hidden'); giftTargetNpcId = null; }

function confirmGift(itemId) {
  var npc = getNpc(giftTargetNpcId); if (!npc) return;
  var slot = null;
  for (var i=0;i<warehouseSlots.length;i++) { if (warehouseSlots[i].itemId===itemId) { slot=warehouseSlots[i]; break; } }
  if (!slot || slot.count<=0) return;

  removeFromWarehouse(itemId, 1);
  npcDailyState[giftTargetNpcId].gifted = true;
  var basePrice = slot.basePrice||10;
  var repGain = Math.floor(basePrice * 1.25 * 2); // 翻倍
  npcRep[giftTargetNpcId] = (npcRep[giftTargetNpcId]||0) + repGain;
  regionRep[npc.region] = (regionRep[npc.region]||0) + repGain;

  pushLog('送礼', itemId, slot.name + ' → ' + npc.name, slot.icon, 1);
  showToast('🎁 赠送 ' + slot.name + ' 给 ' + npc.name + '！好感 +' + repGain + '（翻倍）');
  checkLevelUps();
  closeGiftModal();
  renderAll();
}

// ---- localStorage 持久化 (图片: 自定义 Base64 覆盖 → 默认相对路径) ----

function loadNpcCustomData(npcId) {
  try { var raw = localStorage.getItem('farm_npc_custom_'+npcId); return raw ? JSON.parse(raw) : null; }
  catch(e) { return null; }
}
function saveNpcCustomData(npcId, data) {
  try { localStorage.setItem('farm_npc_custom_'+npcId, JSON.stringify(data)); } catch(e) {}
}

/** 读取自定义大立绘 Base64（无则返回 null，由调用方 fallback 到 npc.defaultLargePortrait） */
function loadNpcLarge(npcId) {
  try { return localStorage.getItem('custom_portrait_large_'+npcId) || null; } catch(e) { return null; }
}
function saveNpcLarge(npcId, base64) {
  try {
    localStorage.setItem('custom_portrait_large_'+npcId, base64);
    var verify = localStorage.getItem('custom_portrait_large_'+npcId);
    if (verify !== base64) throw new Error('验证失败');
    return true;
  } catch(e) {
    console.error('大立绘保存失败:', e);
    showToast('⚠️ 大立绘保存失败，可能图片过大超出本地存储限制');
    return false;
  }
}

/** 读取自定义像素头像 Base64（无则返回 null，由调用方 fallback 到 npc.defaultPixelAvatar） */
function loadNpcAvatar(npcId) {
  try { return localStorage.getItem('custom_portrait_pixel_'+npcId) || null; } catch(e) { return null; }
}
function saveNpcAvatar(npcId, base64) {
  try {
    localStorage.setItem('custom_portrait_pixel_'+npcId, base64);
    var verify = localStorage.getItem('custom_portrait_pixel_'+npcId);
    if (verify !== base64) throw new Error('验证失败');
    return true;
  } catch(e) {
    console.error('像素头像保存失败:', e);
    showToast('⚠️ 头像保存失败，可能图片过大超出本地存储限制');
    return false;
  }
}

/** 清除自定义图片，恢复默认相对路径 */
function restoreNpcDefaultImages(npcId) {
  try { localStorage.removeItem('custom_portrait_large_'+npcId); } catch(e) {}
  try { localStorage.removeItem('custom_portrait_pixel_'+npcId); } catch(e) {}
  showToast('🔄 已恢复默认图片');
}

/** 旧 key 迁移 → 新 key（一次性） */
function migrateNpcImageKeys() {
  if (localStorage.getItem('_img_key_migrated_v2')) return;
  var npcIds = NPC_DATABASE.map(function(n){return n.id;});
  for (var i=0;i<npcIds.length;i++) {
    var id = npcIds[i];
    try {
      var oldLarge = localStorage.getItem('farm_npc_large_'+id);
      if (oldLarge) { localStorage.setItem('custom_portrait_large_'+id, oldLarge); localStorage.removeItem('farm_npc_large_'+id); }
      var oldAvatar = localStorage.getItem('farm_npc_avatar_'+id);
      if (oldAvatar) { localStorage.setItem('custom_portrait_pixel_'+id, oldAvatar); localStorage.removeItem('farm_npc_avatar_'+id); }
    } catch(e) {}
  }
  try { localStorage.setItem('_img_key_migrated_v2', '1'); } catch(e) {}
}

function getNpcEffectiveData(npc) {
  var custom = loadNpcCustomData(npc.id);
  return {
    name:        (custom && custom.name)        || npc.name,
    personality: (custom && custom.personality) || npc.personality || '',
    backstory:   (custom && custom.backstory)   || npc.backstory   || '',
    quote:       (custom && custom.quote)       || npc.quote       || '',
    largePortrait: loadNpcLarge(npc.id) || npc.defaultLargePortrait || null,
    avatar:      loadNpcAvatar(npc.id) || npc.defaultPixelAvatar || null
  };
}

function triggerNpcImageUpload(slot) {
  if (slot==='avatar') document.getElementById('npc-avatar-upload').click();
  else document.getElementById('npc-image-upload').click();
}

function handleNpcImageUpload(event, slot) {
  var file = event.target.files[0];
  if (!file || !currentNpcId) return;
  if (!file.type.match(/^image\/(jpeg|png|webp|gif)$/)) {
    showToast('⚠️ 仅支持 JPG/PNG/WebP/GIF 图片格式');
    event.target.value = ''; return;
  }
  if (file.size > 2.5 * 1024 * 1024) {
    showToast('⚠️ 图片文件过大（超过 2.5MB），建议压缩后再上传');
    event.target.value = ''; return;
  }

  // 即时预览：使用 Blob URL，无需等待 Base64 编码
  var blobUrl = URL.createObjectURL(file);
  var previewId = (slot==='avatar') ? 'npc-avatar-preview' : 'npc-large-preview';
  var isAvatar = (slot==='avatar');
  var preview = document.getElementById(previewId);
  if (preview) {
    if (preview.tagName==='SPAN') {
      var img = document.createElement('img');
      img.id = previewId;
      img.src = blobUrl;
      img.alt = isAvatar ? '头像' : '立绘';
      img.className = isAvatar ? 'w-full h-full object-cover rounded-lg' : 'w-full h-full object-contain';
      preview.parentNode.replaceChild(img, preview);
    } else {
      preview.src = blobUrl;
    }
  }

  // 异步转 Base64 持久化到 localStorage
  var reader = new FileReader();
  reader.onload = function(e) {
    var base64 = e.target.result;
    var ok = (slot==='avatar')
      ? saveNpcAvatar(currentNpcId, base64)
      : saveNpcLarge(currentNpcId, base64);
    if (ok) {
      showToast('🖼️ ' + (isAvatar?'像素头像':'大立绘') + '已上传并保存！');
    }
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ============================================================
//  14. Tick
// ============================================================
function gameTick() {
  if (seasonTimerSeconds>0) { seasonTimerSeconds-=1; } else { seasonTimerSeconds=SEASON_DURATION-1; advanceSeason(); }
  if (dayTimer>0) { dayTimer-=1; } else { dayTimer=DAY_DURATION; generateDailyNPCs(); pushLog('新的一天','','游客刷新','🚶',0); }
  if (seasonTimerSeconds%1800===0 && seasonTimerSeconds>0) { var ci=weathers.indexOf(currentWeather); nextWeather=weathers[(ci+1)%weathers.length]; }

  var farmingStateChanged = false;
  for (var i=0;i<plots.length;i++) {
    var p=plots[i];
    if (p.status==='TILLED' && p.wiltTimer!==null && p.wiltTimer>0) { p.wiltTimer-=1; p.remaining='枯萎 '+formatTime(p.wiltTimer); if (p.wiltTimer<=0) { delete lockedSeedIds[p.cropId]; p.cropId=null; p.cropName=null; p.icon=null; p.remaining=null; p.remainingS=0; p.totalS=0; p.resumeFrom=null; p.wiltTimer=null; p.isPreTilled=true; p.progress=0; p.startedSeason=null; p.features=[]; showToast('💀 种子已枯萎坏死'); farmingStateChanged=true; } }
    if (p.status==='GROWING' && p.remainingS>0) { if (!currentActiveAction || currentActiveAction.plotId!==p.id) { p.remainingS=Math.max(0,p.remainingS-1); p.progress=Math.round((1-p.remainingS/p.totalS)*100); p.remaining=formatTime(p.remainingS); if (p.remainingS<=0) { p.status='RIPE'; p.progress=100; p.remaining='可收获'; farmingStateChanged=true; } } }
  }

  for (var j=0;j<playerAnimalInstances.length;j++) {
    var ai=playerAnimalInstances[j];
    if (ai.status==='growing'&&ai.remainingS>0) {
      ai.remainingS=Math.max(0,ai.remainingS-1);
      if (ai.remainingS<=0) ai.status='ready';
    }
  }
  // 自动存入建筑仓库
  for (var adi=0;adi<playerAnimalInstances.length;adi++) {
    var adInst=playerAnimalInstances[adi];
    if (adInst.status==='ready' && !isJuvenile(adInst)) {
      autoDepositAnimal(adInst);
    }
  }

  // 高级畜舍/鸡舍自动喂养（每1800秒=30分钟）
  if (autoFeedCooldown>0) { autoFeedCooldown-=1; }
  else {
    autoFeedCooldown = 1800;
    var autoFed = 0;
    for (var af=0;af<playerAnimalInstances.length;af++) {
      var afi = playerAnimalInstances[af];
      var afAd = getAnimal(afi.speciesId);
      if (!afAd) continue;
      var isCoopAnimal = afAd.type==='coop';
      var isBarnAnimal = afAd.type==='barn';
      if ((isCoopAnimal&&hasAutoFeed(true))||(isBarnAnimal&&hasAutoFeed(false))) {
        var juvMult3 = isJuvenile(afi) ? 1.25 : 1;
        afi.affection = Math.min(100, afi.affection + Math.ceil(2 * juvMult3));
        if (afi.status==='growing') afi.remainingS = Math.max(1, afi.remainingS-600);
        afi.lastFedTs = Date.now();
        autoFed++;
        // 自动喂养给少量采集经验
        playerSkillXP.gathering = (playerSkillXP.gathering||0) + 1;
        var xpNeed2 = playerSkillLevels.gathering*100;
        if (playerSkillXP.gathering>=xpNeed2) { playerSkillXP.gathering-=xpNeed2; playerSkillLevels.gathering=Math.min(99,playerSkillLevels.gathering+1); }
      }
    }
  }

  // 加工区机器倒计时
  for (var k=0;k<placedMachines.length;k++) {
    var pm = placedMachines[k];
    if (pm && pm.status==='crafting' && pm.remainingS>0) {
      pm.remainingS = Math.max(0, pm.remainingS-1);
      if (pm.remainingS<=0) pm.status='done';
    }
  }
  // 如果当前在加工区/养殖区，每tick重渲染以更新进度条
  if (currentRegion==='processing') {
    var mc2 = document.getElementById('main-content');
    if (mc2) { renderProcessingPage(mc2); insertActionBar(mc2); }
  }
  if (currentRegion==='husbandry') {
    var mc3 = document.getElementById('main-content');
    if (mc3) {
      if (currentSubTab==='鱼塘') renderFishpondPage(mc3);
      else renderHusbandryPage(mc3);
      insertActionBar(mc3);
    }
  }
  // 种植区每tick刷新地块进度（状态变化时全渲染，否则仅更新进度条）
  if (currentRegion==='farming') {
    if (farmingStateChanged) {
      renderPlots();
    } else {
      tickPlotProgresses();
    }
  }

  if (!currentActiveAction) { renderActionBar(); return; }
  currentActiveAction.remainingS-=1;
  if (currentActiveAction.remainingS<=0) advanceActionStep();
  renderActionBar();
}

function advanceSeason() { var o=['春','夏','秋','冬']; var idx=o.indexOf(currentSeason); currentSeason=o[(idx+1)%4]; if (currentSeason==='冬' && !greenhouseUnlocked) { greenhouseUnlocked=true; try { localStorage.setItem('greenhouse_unlocked','1'); } catch(e) {} showToast('🏠 温室已解锁！第一个冬季到来，温室分页正式开放'); } showToast('🍂 季节更替：'+currentSeason+'季来临！'); for (var i=0;i<plots.length;i++) { var p=plots[i]; if (p.status==='GROWING'&&p.startedSeason&&p.startedSeason!==currentSeason&&p.subTab!=='温室') { p.remainingS*=2; p.totalS=p.remainingS; p.remaining=formatTime(p.remainingS); } } }
function advanceActionStep() { var a=currentActiveAction; if (a.type==='HUSBANDRY') { var inst=playerAnimalInstances.find(function(ai){return ai.uid===a.uid;}); if (inst&&a.action==='comfort') { var juvMult=isJuvenile(inst)?1.25:1; inst.affection=Math.min(100,inst.affection+Math.ceil(5*juvMult)); showToast('🤝 已安抚 '+inst.name+' · 好感 +'+Math.ceil(5*juvMult)+(isJuvenile(inst)?' (幼年+25%)':'')); } else if (inst&&a.action==='feed') { var juvMult2=isJuvenile(inst)?1.25:1; inst.affection=Math.min(100,inst.affection+Math.ceil(10*juvMult2)); if (inst.status==='growing') inst.remainingS=Math.max(1,inst.remainingS-600); inst.lastFedTs=Date.now(); showToast('🍎 喂食 '+inst.name+' · 好感 +'+Math.ceil(10*juvMult2)+' · -10min'+(isJuvenile(inst)?' (幼年+25%)':'')); } currentActiveAction=null; if (globalActionQueue.length>0) startNextQueueAction(); renderAll(); return; } var p=findPlot(a.plotId); if (a.stepIndex<ACTION_STEPS.length-1) { a.stepIndex+=1; var ns=ACTION_STEPS[a.stepIndex]; a.remainingS=ns.duration; a.totalS=ns.duration; if (p) { p.progress=0; p.remaining=ns.duration+'s'; } } else { if (p) { p.status='GROWING'; p.resumeFrom=null; p.wiltTimer=null; p.isPreTilled=false; p.remainingS=p.totalS; p.progress=0; p.remaining=formatTime(p.remainingS); showToast('✅ '+p.cropName+' 进入自然生长'); pushLog('种植完成',p.cropId,p.cropName,p.icon,1); } currentActiveAction=null; if (globalActionQueue.length>0) startNextQueueAction(); } renderAll(); }

function renderShopPage(mc) {
  var seasonCrops = ALL_CROPS.filter(function(c) { return c.season === currentSeason; });
  var seen = {};
  var crops = [];
  for (var i=0;i<seasonCrops.length;i++) {
    if (!seen[seasonCrops[i].seedId]) { seen[seasonCrops[i].seedId]=true; crops.push(seasonCrops[i]); }
  }
  mc.innerHTML =
    '<div class="card-ribbon ribbon-amber rounded-xl p-5 border-2 border-soildark/35" style="background:#fbf5eb" data-ribbon="种子商店">'+
      '<p class="text-sm text-soildark mt-1 mb-4 font-extrabold">🛒 '+currentSeason+'季种子 · 购买后存入仓库种子栏，可自由种植</p>'+
      '<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4" id="shop-grid">'+
        crops.map(function(c) { return renderShopItem(c); }).join('')+
      '</div></div>';

  // 数量按钮事件 — 同时更新购买按钮显示总价
  var qbtns = mc.querySelectorAll('.shop-qty-btn');
  for (var q=0;q<qbtns.length;q++) {
    qbtns[q].addEventListener('click', function(e) {
      e.stopPropagation();
      var seedId = this.dataset.seedId;
      var display = mc.querySelector('.shop-qty-display[data-seed-id="'+seedId+'"]');
      if (!display) return;
      var cur = parseInt(display.textContent) || 1;
      var action = this.dataset.action;
      if (action==='minus') cur = Math.max(1, cur-1);
      else if (action==='plus') cur = Math.min(99, cur+1);
      else if (action==='max10') cur = 10;
      display.textContent = cur;
      // 动态更新购买按钮价格
      var unitPrice = parseInt(display.dataset.unitPrice) || 0;
      var total = unitPrice * cur;
      var btn = mc.querySelector('.shop-buy-btn[data-seed-id="'+seedId+'"]');
      if (btn) {
        btn.innerHTML = '🛒 ' + (cur===1 ? unitPrice+' 金币' : total.toLocaleString()+' 金币');
        btn.dataset.price = total;
      }
    });
  }

  // 购买按钮事件
  var bts = mc.querySelectorAll('.shop-buy-btn');
  for (var b=0;b<bts.length;b++) {
    bts[b].addEventListener('click', function(e) {
      e.stopPropagation();
      var seedId = this.dataset.seedId;
      var price = parseInt(this.dataset.price);
      var display = mc.querySelector('.shop-qty-display[data-seed-id="'+seedId+'"]');
      var qty = display ? parseInt(display.textContent) || 1 : 1;
      buySeed(seedId, price, qty);
    });
  }
}

function renderShopItem(c) {
  var price = Math.floor(c.basePrice * 0.6);
  var owned = playerSeeds[c.seedId] || 0;
  var fb = featureBadges(c.features);

  // 库存角标 — 始终渲染，0 时浅色占位
  var badgeHTML = owned > 0
    ? '<span class="text-xs px-2 py-0.5 rounded-full bg-green-100 text-green-700 font-extrabold border border-green-300/50">库存 ×'+owned+'</span>'
    : '<span class="text-xs px-2 py-0.5 rounded-full bg-earth/5 text-earth/40 font-bold border border-earth/15">库存 0</span>';

  // 基因特质行 — 固定高度，空时透明占位
  var featHTML = fb
    ? '<div class="flex gap-1 justify-center items-center">'+fb+'</div>'
    : '<div class="opacity-0 pointer-events-none"><span class="feature-badge ft-fast">.</span></div>';

  // 口味标签 — 固定高度，一行居中
  var tasteHTML = '<div class="flex gap-1 justify-center items-center">'+
    c.tasteTags.map(function(t){return'<span class="text-xs px-1.5 py-0.5 rounded-full font-extrabold border" style="background:#eef4e4;color:#5a7a2e;border-color:#a3c89a">'+t+'</span>';}).join('')+
    '</div>';

  // 生长时间
  var growHTML = '<span class="text-sm text-earth/80 font-bold">生长 '+formatGrowth(c.growthM)+'</span>';

  // 底部：数量选择器 + 购买按钮
  var canBuy = gold >= price;
  var buyHTML = canBuy
    ? '<div class="space-y-2">'+
        '<div class="flex items-center justify-center gap-2">'+
          '<button class="shop-qty-btn w-7 h-7 rounded-lg text-sm font-extrabold border-2 border-soildark/35 text-earth/70 hover:bg-earth/10 transition-colors flex items-center justify-center" data-action="minus" data-seed-id="'+c.seedId+'">−</button>'+
          '<span class="shop-qty-display w-9 text-center font-mono text-base font-extrabold text-soildark" data-seed-id="'+c.seedId+'" data-unit-price="'+price+'">1</span>'+
          '<button class="shop-qty-btn w-7 h-7 rounded-lg text-sm font-extrabold border-2 border-soildark/35 text-earth/70 hover:bg-earth/10 transition-colors flex items-center justify-center" data-action="plus" data-seed-id="'+c.seedId+'">+</button>'+
          '<button class="shop-qty-btn px-2 h-7 rounded-lg text-xs font-extrabold border-2 border-soildark/35 text-earth/70 hover:bg-earth/10 transition-colors" data-action="max10" data-seed-id="'+c.seedId+'">最大</button>'+
        '</div>'+
        '<button class="shop-buy-btn w-full py-2 rounded-lg text-sm font-extrabold text-white hover:opacity-90 transition-colors border-2" style="background:#6b8c3e;border-color:#6b8c3e" data-seed-id="'+c.seedId+'" data-unit-price="'+price+'">🛒 '+price+' 金币</button>'+
      '</div>'
    : '<span class="text-sm text-earth/50 font-bold">金币不足</span>';

  return '<div class="relative flex flex-col justify-between rounded-xl p-4 border-2 border-soildark/35 hover:shadow-md transition-all" style="background:#fbf5eb;min-height:280px">'+
    // 右上角库存角标
    '<div class="absolute top-3 right-3 z-10">'+badgeHTML+'</div>'+
    // 顶部：图标 + 名称 + 生长时间
    '<div class="flex flex-col items-center pt-1">'+
      '<span class="text-4xl mb-1">'+c.icon+'</span>'+
      '<span class="text-base font-extrabold text-soildark text-center leading-tight">'+c.seedName+'</span>'+
      growHTML+
    '</div>'+
    // 中部：基因 + 口味 + 改良（固定高度占位）
    '<div class="flex flex-col items-center gap-1.5">'+
      '<div class="h-7 flex items-center">'+featHTML+'</div>'+
      '<div class="h-7 flex items-center">'+tasteHTML+'</div>'+
'<div class="h-6 flex items-center"><span class="text-xs text-earth/40">作物杂交 · 即将开放</span></div>'+
    '</div>'+
    // 底部：数量 + 购买按钮
    '<div class="mt-1">'+buyHTML+'</div>'+
    '</div>';
}

function buySeed(seedId, price, qty) {
  qty = qty || 1;
  var totalPrice = price * qty;
  if (gold < totalPrice) { showToast('金币不足！需要 '+totalPrice+' 金币'); return; }
  gold -= totalPrice;
  playerSeeds[seedId] = (playerSeeds[seedId] || 0) + qty;
  updateGoldDisplay();
  var crop = getCrop(seedId);
  var name = crop ? crop.seedName : seedId;
  showToast('🛒 购买 '+name+' ×'+qty+'，花费 '+totalPrice+' 金币');
  renderAll();
}

function upgradeSeed(seedId, cost) {
  var curLv = playerSeedLevels[seedId] || 0;
  if (curLv >= 10) { showToast('已达到最高改良等级 Lv.10'); return; }
  if (gold < cost) { showToast('金币不足！需要 '+cost+' 金币'); return; }
  gold -= cost;
  updateGoldDisplay();
  playerSeedLevels[seedId] = (playerSeedLevels[seedId] || 0) + 1;
  var crop = getCrop(seedId);
  var name = crop ? crop.seedName : seedId;
  showToast('🌱 '+name+' 改良成功！Lv.'+playerSeedLevels[seedId]);
  renderAll();
}

function renderContactCard(n) {
  var lv = getNpcLevel(npcRep[n.id]||0);
  var nextXP = getNpcNextXP(lv);
  var prevXP = lv>1?getNpcNextXP(lv-1):0;
  var progress = Math.min(100, Math.round(((npcRep[n.id]||0)-prevXP)/Math.max(1,nextXP-prevXP)*100));
  var isToday = false;
  for (var i=0;i<dailyNPCs.length;i++) { if (dailyNPCs[i].id===n.id) { isToday=true; break; } }
  var av = getNpcDisplayAvatar(n);
  var iconHTML = av
    ? '<img src="'+av+'" alt="'+n.name+'" class="w-14 h-14 rounded-xl object-cover border-2 border-soildark/25 mb-2" data-fallback="'+n.icon+'" data-fallback-class="text-4xl mb-2">'
    : '<span class="text-4xl mb-2">'+n.icon+'</span>';
  return '<div class="contact-card bg-page border-2 '+(isToday?'border-green-300/60':'border-soildark/25')+' rounded-xl p-4 flex flex-col items-center hover:border-soildark/40 hover:shadow-md transition-all cursor-pointer relative" data-npc-id="'+n.id+'">'+
    (isToday?'<div class="absolute top-2 right-2 text-[12px] px-2 py-0.5 bg-green-100 text-green-700 rounded-full font-bold">来访中</div>':'')+
    iconHTML+'<span class="text-sm font-extrabold text-soildark">'+n.name+'</span>'+
    '<span class="text-[12px] text-earth/70 font-medium">'+n.raceName+' · ❤️ Lv.'+lv+'</span>'+
    '<div class="w-full h-2 bg-earth/10 rounded-full overflow-hidden mt-2"><div class="h-full bg-purple-400 rounded-full" style="width:'+progress+'%"></div></div>'+
    '</div>';
}

function renderHusbandryPage(mc) {
  var isCoop = currentSubTab==='鸡舍';
  var typeFilter = isCoop?'coop':'barn';
  var slots = isCoop ? playerCoops : playerBarns;
  var allInstances = getAnimalInstancesByType(typeFilter);
  var totalCap = 0;
  for (var s=0;s<slots.length;s++) totalCap += getTierCapacity(slots[s].tier, isCoop);
  var instances = allInstances.slice(0, totalCap);
  var autoFeed = hasAutoFeed(isCoop);
  var now = Date.now();

  // 将动物分配到各建筑位
  var slotAnimals = [[],[]];
  var cursor = 0;
  for (var si=0;si<slots.length;si++) {
    var sc = getTierCapacity(slots[si].tier, isCoop);
    slotAnimals[si] = instances.slice(cursor, cursor+sc);
    cursor += sc;
  }

  // 动物卡片渲染（近方形，便于操作）
  function animalMiniCard(inst) {
    var ad = getAnimal(inst.speciesId);
    if (!ad) return '';
    var juv = isJuvenile(inst);
    var juvRemain = juv ? getJuvenileRemaining(inst) : '';
    var juvTag = juv ? '<span class="text-xs px-2 py-0.5 rounded-full bg-green-200 text-green-800 font-extrabold">🌱 幼年</span>' : '<span class="text-xs px-2 py-0.5 rounded-full bg-blue-100 text-blue-700 font-bold">🧑 成年</span>';
    var isReady = inst.status==='ready';
    var progress = inst.totalS>0 ? Math.round((1 - inst.remainingS/inst.totalS)*100) : 0;
    var statusStyle, progHTML, statusBadge, remainingStr, collectDisabled, collectLabel, collectBtn;
    if (juv) {
      // 幼年：只显示成年倒计时，无生产进度
      statusStyle = 'border-green-300/60 bg-green-50/30';
      var juvPct = juvRemain ? getJuvenilePercent(inst) : 0;
      progHTML = '<div class="w-full h-2.5 bg-earth/10 rounded-full overflow-hidden"><div class="h-full bg-green-400 rounded-full" style="width:'+juvPct+'%"></div></div>';
      statusBadge = '<span class="text-xs px-2 py-0.5 rounded-full bg-green-100 text-green-700 font-bold">🌱 成长中</span>';
      remainingStr = '成年 · '+juvRemain;
      collectDisabled = true;
      collectLabel = '🔒 幼年';
      collectBtn = '<button class="flex-1 py-2 rounded-lg text-xs font-bold bg-earth/10 text-earth/50 border-2 border-soildark/20 cursor-default" disabled>🔒 幼年</button>';
    } else {
      statusStyle = isReady ? 'border-amber-400/60 bg-amber-50/50' : 'border-soildark/25';
      var progBarColor = isReady ? 'bg-amber-500' : 'bg-sprout';
      progHTML = '<div class="w-full h-2.5 bg-earth/10 rounded-full overflow-hidden"><div class="progress-fill h-full '+progBarColor+' rounded-full" style="width:'+(isReady?100:progress)+'%"></div></div>';
      statusBadge = isReady ? '<span class="text-xs px-2 py-0.5 rounded-full bg-amber-200 text-amber-800 font-extrabold">可收获</span>' : '<span class="text-xs px-2 py-0.5 rounded-full bg-green-100 text-green-700 font-bold">生产中</span>';
      remainingStr = isReady ? '可收获' : formatTimeMS(inst.remainingS);
      collectDisabled = true;
      collectLabel = '🤖 自动';
      collectBtn = '<button class="flex-1 py-2 rounded-lg text-xs font-bold bg-purple-50/60 text-purple-600/60 border-2 border-purple-200/40 cursor-default" disabled>🤖 自动入仓</button>';
    }
    var heartCount = Math.min(5, Math.floor(inst.affection/20));
    var hearts = ['🤍','💚','💛','🧡','❤️'];
    var heartHTML = '';
    for (var h=0;h<5;h++) heartHTML += h<heartCount ? hearts[heartCount-1] : '🤍';
    var feedQueued = getAnimalQueueInfo(inst.uid, 'feed') !== null;
    var comfortQueued = getAnimalQueueInfo(inst.uid, 'comfort') !== null;
    var feedOnCooldown = inst.lastFedTs && (now - inst.lastFedTs) < 1800000;
    var feedDisabled = feedQueued ? false : (feedOnCooldown || autoFeed);
    var feedBtn;
    if (feedQueued) {
      feedBtn = '<button class="flex-1 py-2 rounded-lg text-xs font-extrabold text-amber-800 bg-amber-100/70 border-2 border-amber-300/50 hover:bg-amber-200/60 transition-colors" onclick="cancelQueuedHusbandryAction(\''+inst.uid+'\')">⏳ 队列中</button>';
    } else if (feedDisabled) {
      feedBtn = '<button class="flex-1 py-2 rounded-lg text-xs font-bold bg-earth/10 text-earth/50 border-2 border-soildark/20 cursor-default" disabled>'+(autoFeed?'🤖自动':'冷却')+'</button>';
    } else {
      feedBtn = '<button class="flex-1 py-2 rounded-lg text-xs font-extrabold text-green-800 bg-green-100/70 border-2 border-green-300/50 hover:bg-green-200/60 transition-colors" onclick="feedAnimal(\''+inst.uid+'\')">🍎 喂食</button>';
    }
    var comfortOnCooldown = inst.lastComfortTs && (now - inst.lastComfortTs) < 1800000;
    var comfortDisabled = comfortQueued ? false : (comfortOnCooldown || autoFeed);
    var comfortBtn;
    if (comfortQueued) {
      comfortBtn = '<button class="flex-1 py-2 rounded-lg text-xs font-extrabold text-amber-800 bg-amber-100/70 border-2 border-amber-300/50 hover:bg-amber-200/60 transition-colors" onclick="cancelQueuedHusbandryAction(\''+inst.uid+'\')">⏳ 队列中</button>';
    } else if (comfortDisabled) {
      comfortBtn = '<button class="flex-1 py-2 rounded-lg text-xs font-bold bg-earth/10 text-earth/50 border-2 border-soildark/20 cursor-default" disabled>'+(comfortOnCooldown?'冷却':'🤝')+'</button>';
    } else {
      comfortBtn = '<button class="flex-1 py-2 rounded-lg text-xs font-extrabold text-purple-800 bg-purple-100/70 border-2 border-purple-300/50 hover:bg-purple-200/60 transition-colors" onclick="comfortAnimal(\''+inst.uid+'\')">🤝 安抚</button>';
    }
    var juvRemainHTML = juv ? '<div class="text-center text-xs text-green-700 font-bold mb-1">⏳ '+juvRemain+' 后成年</div>' : '';
    return '<div class="flex flex-col rounded-xl p-4 border-2 '+statusStyle+'" style="background:#fefaf5;aspect-ratio:1/1.05">'+
      '<div class="flex items-center justify-between mb-2"><span class="text-3xl">'+ad.icon+'</span>'+statusBadge+'</div>'+
      '<div class="flex items-center justify-center gap-1.5 mb-1"><span class="text-sm font-extrabold text-soildark">'+inst.name+'</span>'+juvTag+'</div>'+
      '<div class="text-center text-sm mb-2">'+heartHTML+' <span class="text-earth/50 font-bold text-xs">'+inst.affection+'</span></div>'+
      progHTML+
      '<div class="text-center text-xs text-earth/50 tabular-nums font-bold mt-1 mb-1">'+remainingStr+'</div>'+
      juvRemainHTML+
      (juv ? '' : '<div class="text-xs text-earth/60 text-center mb-1.5">'+ad.produceIcon+' '+ad.produceItem+'</div>')+
      '<div class="flex gap-1.5 mt-auto">'+comfortBtn+feedBtn+collectBtn+'</div>'+
    '</div>';
  }

  // 建筑卡片（动物在内部）
  var buildingCards = slots.map(function(sl, idx){
    var tier = sl.tier;
    var cap = getTierCapacity(tier, isCoop);
    var animalsHere = slotAnimals[idx] || [];
    // 锁定卡片
    if (tier<0) {
      var unlockCost = isCoop ? 500 : 800;
      var unlockLabel = isCoop ? '购买新鸡舍' : '购买畜棚';
      return '<div class="rounded-xl p-5 border-2 border-dashed border-soildark/20 flex flex-col items-center justify-center" style="background:#fdf8f2;min-height:200px">'+
        '<span class="text-3xl mb-2 opacity-40">🔒</span>'+
        '<p class="text-sm font-extrabold text-soildark mb-1">空位 #'+(idx+1)+'</p>'+
        '<p class="text-xs text-earth/50 mb-3">'+unlockCost+'💰 · 解锁后可放置动物</p>'+
        '<button class="px-4 py-2 rounded-lg text-xs font-extrabold text-white hover:opacity-90 transition-colors border-2" style="background:#6b8c3e;border-color:#6b8c3e" onclick="upgradeHusbandryBuilding(\''+(isCoop?'coop':'barn')+'\','+idx+')">🔨 '+unlockLabel+'</button>'+
      '</div>';
    }
    // 已解锁建筑
    var tierName = getTierName(tier, isCoop);
    var autoBadge = tier>=2 ? '<span class="text-xs px-2 py-0.5 rounded-full bg-purple-100 text-purple-700 font-bold">🤖自动</span>' : '';
    var upgradeHTML = '';
    if (tier<2) {
      var upCost, upLabel;
      if (isCoop && tier===0) { upCost='500💰+木材×10+石材×5'; upLabel='升级普通鸡舍(3只)'; }
      else if (isCoop && tier===1) { upCost='2000💰+木材×20+石材×10+铁锭×2'; upLabel='升级高级鸡舍(6只·🤖)'; }
      else if (!isCoop && tier===0) { upCost='500💰+木材×10+石材×5'; upLabel='升级普通畜棚(3只)'; }
      else { upCost='3000💰+木材×25+石材×15+铁锭×3'; upLabel='升级高级畜棚(6只·🤖)'; }
      upgradeHTML = '<div class="text-xs text-earth/60 mb-1">'+upCost+'</div><button class="px-3 py-1.5 rounded-lg text-xs font-extrabold text-white hover:opacity-90 transition-colors border-2" style="background:#6b8c3e;border-color:#6b8c3e" onclick="upgradeHusbandryBuilding(\''+(isCoop?'coop':'barn')+'\','+idx+')">🔨 '+upLabel+'</button>';
    }
    // 一键喂养按钮（仅高级建筑）
    var oneClickHTML = '';
    if (tier>=2) {
      var grainCount = 0;
      for (var wgi=0;wgi<warehouseSlots.length;wgi++) {
        if (warehouseSlots[wgi].type==='CROP' && warehouseSlots[wgi].count>0) grainCount += warehouseSlots[wgi].count;
      }
      var canOneClick = grainCount >= animalsHere.length && animalsHere.length > 0;
      oneClickHTML = '<div class="mt-2">'+
        '<button class="w-full py-2 rounded-lg text-sm font-extrabold border-2 transition-colors '+(canOneClick?'text-purple-800 bg-purple-100/70 border-purple-300/50 hover:bg-purple-200/60':'text-earth/40 bg-earth/5 border-soildark/15 cursor-default')+'" '+
        (canOneClick?'onclick="oneClickFeedBuilding(\''+(isCoop?'coop':'barn')+'\','+idx+')"':'disabled')+
        '>🍎 一键喂养 ('+grainCount+'粮草 / '+animalsHere.length+'只)</button></div>';
    }
    // 动物网格
    var animalGridHTML = '';
    if (animalsHere.length===0) {
      animalGridHTML = '<div class="text-sm text-earth/40 text-center py-10 font-bold">暂无动物</div>';
    } else {
      animalGridHTML = '<div class="grid grid-cols-3 gap-3 mt-3">'+animalsHere.map(function(inst){return animalMiniCard(inst);}).join('')+'</div>';
    }
    // 建筑仓库展示（聚合本建筑内所有动物的 stored）
    var storedHTML = '';
    if (tier >= 0) {
      var allStored = [];
      for (var ai=0;ai<animalsHere.length;ai++) {
        var ast = animalsHere[ai].stored || [];
        for (var aj=0;aj<ast.length;aj++) allStored.push(ast[aj]);
      }
      var storedCount = allStored.length;
      var maxTotalStore = animalsHere.length * 3;
      var storedIcons = '';
      for (var si = 0; si < storedCount && si < 8; si++) {
        storedIcons += '<span class="text-lg">' + (allStored[si].icon || '📦') + '</span>';
      }
      if (storedCount > 8) storedIcons += '<span class="text-xs text-earth/70 font-bold">+' + (storedCount - 8) + '</span>';
      var collectDisabled2 = storedCount === 0;
      storedHTML = '<div class="mt-3 pt-3 border-t border-soildark/15">'+
        '<div class="flex items-center justify-between">'+
          '<div class="flex items-center gap-1.5">'+
            '<span class="text-xs text-earth/70 font-bold">📦 产物</span>'+
            '<span class="text-xs font-mono font-extrabold '+(storedCount>=maxTotalStore && maxTotalStore>0?'text-red-600':'text-earth/60')+'">'+storedCount+'/'+maxTotalStore+'</span>'+
            '<span class="flex items-center gap-0.5">'+storedIcons+'</span>'+
          '</div>'+
          '<button class="px-3 py-1.5 rounded-lg text-xs font-extrabold border-2 transition-colors '+(collectDisabled2?'text-earth/40 bg-earth/5 border-soildark/15 cursor-default':'text-amber-800 bg-amber-100/70 border-amber-300/50 hover:bg-amber-200/60')+'" '+
            (collectDisabled2?'disabled':'onclick="collectBuildingProduce(\''+(isCoop?'coop':'barn')+'\','+idx+')"')+
          '>🧺 收集</button>'+
        '</div>'+
      '</div>';
    }
    return '<div class="rounded-xl p-5 border-2 border-soildark/35" style="background:#fbf5eb">'+
      '<div class="flex items-center justify-between mb-2">'+
        '<span class="text-sm font-extrabold px-3 py-1 rounded-full '+(tier>=2?'bg-purple-100 text-purple-800':tier>=1?'bg-green-100 text-green-800':'bg-earth/10 text-earth/70')+'">'+tierName+'</span>'+
        autoBadge+
      '</div>'+
      '<div class="text-xs text-earth/60 font-bold mb-2">容量 '+animalsHere.length+'/'+cap+' 只</div>'+
      upgradeHTML+
      oneClickHTML+
      storedHTML+
      animalGridHTML+
    '</div>';
  });

  var autoBadgeGlobal = autoFeed ? '<span class="text-xs px-2 py-1 rounded-full bg-purple-100 text-purple-700 font-bold">🤖 自动喂养中</span>' : '';

  mc.innerHTML =
    '<div style="font-size:115%">'+
    '<div class="flex items-center justify-between mb-3 flex-wrap gap-2 px-1">'+
      '<div class="flex items-center gap-3">'+
        '<span class="text-xs text-earth/80 font-extrabold">总容量 '+instances.length+'/'+totalCap+' 只</span>'+autoBadgeGlobal+
      '</div>'+
      '<p class="text-[11px] text-earth/60 font-bold">独立个体 · 安抚提升好感 · 高好感产优质品</p>'+
    '</div>'+
    '<div class="grid grid-cols-2 gap-4">'+buildingCards.join('')+'</div>'+
    '</div>';
}
function comfortAnimal(uid) {
  var inst = playerAnimalInstances.find(function(ai){ return ai.uid===uid; });
  if (!inst) return;
  var now = Date.now();
  if (inst.lastComfortTs && (now - inst.lastComfortTs) < 1800000) {
    var remainMins = Math.ceil((1800000 - (now - inst.lastComfortTs)) / 60000);
    showToast('⏳ 还需等待 '+remainMins+' 分钟才能再次安抚');
    return;
  }
  if (isPlayerBusy()) {
    var bldInfo2 = getAnimalBuildingInfo(uid);
    if (currentActiveAction.type==='FARMING') {
      pendingInterrupt = { plotId:null, seedId:null, source:'husbandryAction', skipTilling:false, targetRegion:null, targetSubTab:null,
        husbandryAction: { type:'HUSBANDRY', action:'comfort', uid:uid, icon:'🤝', label:'正在 ['+(bldInfo2?bldInfo2.tierName:'未知')+'] 安抚 '+inst.name } };
      showInterruptModal('安抚 '+inst.name);
      return;
    }
    globalActionQueue.push({ type:'HUSBANDRY', action:'comfort', uid:uid, icon:'🤝', label:'正在 ['+(bldInfo2?bldInfo2.tierName:'未知')+'] 安抚 '+inst.name });
    showToast('⏳ 安抚已加入队列');
    return;
  }
  inst.lastComfortTs = now;
  var bldComfort = getAnimalBuildingInfo(uid);
  currentActiveAction = { type:'HUSBANDRY', action:'comfort', uid:uid, remainingS:5, totalS:5, icon:'🤝', label:'正在 ['+(bldComfort?bldComfort.tierName:'未知')+'] 安抚 '+inst.name };
  showToast('🤝 安抚中...');
  renderAll();
}
function feedAnimal(uid) {
  var inst = playerAnimalInstances.find(function(ai){ return ai.uid===uid; });
  if (!inst) return;
  var now = Date.now();
  if (inst.lastFedTs && (now - inst.lastFedTs) < 1800000) {
    var remainMins = Math.ceil((1800000 - (now - inst.lastFedTs)) / 60000);
    showToast('⏳ 还需等待 '+remainMins+' 分钟才能再次喂食');
    return;
  }
  var cropSlot = null;
  for (var i = 0; i < warehouseSlots.length; i++) {
    if (warehouseSlots[i].type === 'CROP' && warehouseSlots[i].count > 0) {
      cropSlot = warehouseSlots[i];
      break;
    }
  }
  if (!cropSlot) { showToast('❌ 仓库中没有可用作物'); return; }
  var bldInfo3 = getAnimalBuildingInfo(uid);
  if (isPlayerBusy()) {
    if (currentActiveAction.type==='FARMING') {
      pendingInterrupt = { plotId:null, seedId:null, source:'husbandryAction', skipTilling:false, targetRegion:null, targetSubTab:null,
        husbandryAction: { type:'HUSBANDRY', action:'feed', uid:uid, cropItemId:cropSlot.itemId, cropQuality:cropSlot.quality, icon:'🍎', label:'正在 ['+(bldInfo3?bldInfo3.tierName:'未知')+'] 喂养 '+inst.name } };
      showInterruptModal('喂食 '+inst.name);
      return;

function calcSlotProgress(slot, pondType) {
  if (!slot) return { progress: 0, completed: 0, ratePerSec: 0 };
  var pond = fishPonds[pondType];
  var now = Date.now();
  var elapsedSec = (now - pond.lastTick) / 1000;
  var f = getFish(slot.fishId);
  if (!f) return { progress: 0, completed: 0, ratePerSec: 0 };
  var ratePerSec = (slot.count / 10) * (100 / f.spb);
  var newProgress = Math.min(100, (slot.progress || 0) + elapsedSec * ratePerSec);
  var completed = Math.floor(newProgress / 100);
  return { progress: newProgress % 100, completed: completed, ratePerSec: ratePerSec };
}
function collectPondYield(pondType) {
  var pond = fishPonds[pondType];
  pond.lastTick = Date.now();
  var totalFish = 0, totalRoe = 0, rareLoot = [];
  var anyCollected = false;
  for (var i = 0; i < pond.slots.length; i++) {
    var s = pond.slots[i];
    if (!s) continue;
    var res = calcSlotProgress(s, pondType);
    if (res.completed <= 0) { s.progress = res.progress; continue; }
    anyCollected = true;
    s.progress = res.progress;
    var f = getFish(s.fishId);
    if (!f) continue;
    var fishYield = s.count * res.completed;
    totalFish += fishYield;
    totalRoe += Math.floor(s.count * res.completed * 0.5);
    if (fishYield > 0) addToWarehouse(f.produce, f.name, f.pIcon, fishYield, 'MATERIAL', [], 10, [], 1);
    var ry = Math.floor(s.count * res.completed * 0.5);
    if (ry > 0) addToWarehouse(f.produce+'鱼子', f.name+'鱼子', '🫧', ry, 'MATERIAL', [], 5, [], 1);
    var chance = f.rChance * res.completed * (s.count >= 10 ? 5 : 1);
    if (Math.random() < chance) {
      var rItem = f.rare[Math.floor(Math.random() * f.rare.length)];
      rareLoot.push(rItem);
    }
  }
  for (var k = 0; k < rareLoot.length; k++) {
    addToWarehouse(rareLoot[k], rareLoot[k], '💎', 1, 'MATERIAL', [], 80, [], 1);
  }
  if (!anyCollected) {
    showToast('⏳ 所有鱼种均未完成一轮生产');
    return;
  }
  var msg = '🐟 收获了鱼×'+totalFish+' + 鱼子×'+totalRoe;
  if (rareLoot.length > 0) msg += ' + 稀有道具×'+rareLoot.length+'！';
  showToast(msg);
  renderAll();
}

function selectRecipeSlot(recId, slotIdx, el) {
  var rec = PROCESSING_RECIPES.find(function(r){ return r.id===recId; });
  if (!rec) return;
  var inp = rec.inputs[slotIdx];
  // Build candidate list from warehouse matching type
  var candidates = [];
  for (var i=0;i<warehouseSlots.length;i++) {
    var s = warehouseSlots[i];
    if (inp.itemId!=='*' && s.itemId!==inp.itemId) continue;
    if (inp.itemId==='*' && s.type!==inp.type) continue;
    if (s.count <= 0) continue;
    candidates.push(s);
  }
  if (candidates.length===0) { showToast('❌ 仓库中没有符合条件的材料'); return; }
  // Simple: pick first candidate
  var key = recId+'_'+slotIdx;
  processingSelectedSlots[key] = candidates[0];
  el.textContent = candidates[0].displayName || candidates[0].name;
  el.className = 'recipe-slot-display text-xs text-green-700 font-bold';
  updateRecipePreview(recId);
}
function updateRecipePreview(recId) {
  var rec = PROCESSING_RECIPES.find(function(r){ return r.id===recId; });
  if (!rec) return;
  var slots = [];
  for (var i=0;i<rec.inputs.length;i++) {
    var key = recId+'_'+i;
    slots.push(processingSelectedSlots[key] || null);
  }
  var allSelected = slots.every(function(s){ return !!s; });
  var previewEls = document.querySelectorAll('.recipe-preview[data-rec-id="'+recId+'"]');
  var craftBtns = document.querySelectorAll('.recipe-craft-btn[data-rec-id="'+recId+'"]');
  if (!allSelected) {
    for (var p=0;p<previewEls.length;p++) previewEls[p].textContent = '选择材料后预览...';
    for (var c=0;c<craftBtns.length;c++) { craftBtns[c].disabled = true; craftBtns[c].className = 'w-full py-2 rounded-lg text-sm font-extrabold text-white/50 border-2 bg-earth/30 border-soildark/20 cursor-default'; }
    return;
  }
  var result = calcRecipeOutput(rec, slots);
  for (var j=0;j<previewEls.length;j++) previewEls[j].textContent = '预计产出：'+result.name+' · 售价 '+result.price+' 金币';
  for (var k=0;k<craftBtns.length;k++) { craftBtns[k].disabled = false; craftBtns[k].className = 'w-full py-2 rounded-lg text-sm font-extrabold text-white hover:opacity-90 transition-colors border-2'; craftBtns[k].style.cssText = 'background:#6b8c3e;border-color:#6b8c3e'; }
}
function craftRecipe(recId) {
  var rec = PROCESSING_RECIPES.find(function(r){ return r.id===recId; });
  if (!rec) return;
  var slots = [];
  for (var i=0;i<rec.inputs.length;i++) {
    var key = recId+'_'+i;
    var sl = processingSelectedSlots[key];
    if (!sl) { showToast('❌ 请先选择所有材料'); return; }
    // Verify still in warehouse
    var found = null;
    for (var w=0;w<warehouseSlots.length;w++) {
      if (warehouseSlots[w].stackKey===sl.stackKey && warehouseSlots[w].count>=rec.inputs[i].count) { found=warehouseSlots[w]; break; }
    }
    if (!found) { showToast('❌ 材料不足或被消耗'); processingSelectedSlots[key]=null; renderAll(); return; }
    slots.push(found);
  }
  // Consume materials
  for (var j=0;j<slots.length;j++) {
    var need = rec.inputs[j].count;
    removeFromWarehouse(slots[j].itemId, need, slots[j].quality);
    var key2 = recId+'_'+j;
    delete processingSelectedSlots[key2];
  }
  var result = calcRecipeOutput(rec, slots);
  addToWarehouse(rec.outputName, result.name, rec.outputIcon, 1, rec.outputType, rec.outputTasteTags||[], result.price, [], 1, result.quality);
  playerSkillXP.cooking = (playerSkillXP.cooking||0) + 10;
  var xpNeed = playerSkillLevels.cooking*100;
  if (playerSkillXP.cooking>=xpNeed) { playerSkillXP.cooking-=xpNeed; playerSkillLevels.cooking=Math.min(99,playerSkillLevels.cooking+1); showToast('⭐ 烹饪技能升级！Lv.'+playerSkillLevels.cooking); }
  showToast('🔨 加工完成：'+result.name+' · 价值 '+result.price+' 金币');
  renderAll();
}

        '<span class="text-[11px] px-2 py-0.5 rounded-full '+(ds.greeted?'bg-green-100 text-green-700':'bg-earth/5 text-earth/60')+' font-medium">'+(ds.greeted?'✅ 已招呼':'👋 可招呼')+'</span>'+
        '<span class="text-[11px] px-2 py-0.5 rounded-full '+(ds.gifted?'bg-green-100 text-green-700':'bg-rose-50 text-rose-600')+' font-medium">'+(ds.gifted?'✅ 已送礼':'🎁 可送礼')+'</span>'+
      '</div></div>';
  }).join('');

  // 区域声望
  var regionHTML = Object.keys(REGION_DEFS).map(function(k) {
    var def=REGION_DEFS[k]; var rep=regionRep[k]||0; var lv=getRegionLevel(rep);
    var nextXP=getRegionNextXP(lv); var prevXP=lv>1?getRegionNextXP(lv-1):0;
    var progress=Math.min(100,Math.round((rep-prevXP)/Math.max(1,nextXP-prevXP)*100));
    return '<div class="flex items-center gap-2 text-[12px]"><span>'+def.icon+'</span><span class="text-earth/70 w-14 truncate font-medium">'+def.name+'</span><span class="font-extrabold text-soildark">Lv.'+lv+'</span><div class="flex-1 h-2 bg-earth/10 rounded-full overflow-hidden"><div class="h-full bg-green-500 rounded-full" style="width:'+progress+'%"></div></div></div>';
  }).join('');

  ip.innerHTML =
    '<div class="card-ribbon ribbon-blue bg-page rounded-xl p-4 border-2 border-soildark/30" data-ribbon="时令天气">'+
      '<div class="mt-1 space-y-2 text-sm"><div class="flex justify-between"><span class="text-earth/70 font-medium">季节</span><span class="font-extrabold text-soildark">'+currentSeason+' 季</span></div>'+
      '<div class="flex justify-between"><span class="text-earth/70 font-medium">距下季</span><span class="font-mono text-green-800 font-extrabold" id="info-timer">--</span></div>'+
      '<div class="flex justify-between"><span class="text-earth/70 font-medium">距次日</span><span class="font-mono text-amber-700 font-extrabold">'+formatTimerDisplay(dayTimer)+'</span></div>'+
      '<div class="flex justify-between"><span class="text-earth/70 font-medium">天气</span><span class="font-bold">'+currentWeather+'</span></div>'+
      '<div class="flex justify-between"><span class="text-earth/70 font-medium">预报</span><span class="text-xs text-earth/80">30分钟后 '+nextWeather+'</span></div></div></div>'+

    '<div class="card-ribbon ribbon-amber bg-page rounded-xl p-4 border-2 border-soildark/30" data-ribbon="今日采购官">'+
      '<div class="mt-1">'+(dailyNPCs.length===0?'<div class="text-xs text-earth/70 py-2 font-medium">暂无采购官来访（等待新的一天）</div>':npcHTML)+'</div></div>'+

    '<div class="card-ribbon ribbon-purple bg-page rounded-xl p-4 border-2 border-soildark/30" data-ribbon="区域声望">'+
      '<div class="mt-1 space-y-2">'+regionHTML+'</div></div>'+

    '<div class="card-ribbon ribbon-red bg-page rounded-xl p-4 border-2 border-soildark/30" data-ribbon="奇闻轶事">'+
      '<div class="mt-1 space-y-2">'+dailyEvents.map(function(e){return'<div class="text-xs text-earth/70 flex items-start gap-2"><span>'+e.icon+'</span><span class="font-bold">'+e.text+'</span></div>';}).join('')+'</div></div>'+

    '<div class="card-ribbon ribbon-green bg-page rounded-xl p-4 border-2 border-soildark/30" data-ribbon="劳作日志">'+
      '<div class="mt-1 space-y-1">'+(recentLogs.length===0?'<div class="text-xs text-earth/70 font-medium">暂无记录</div>':recentLogs.map(function(l){var al={'种植完成':'🌱 种植','收获':'🧺 收获','施肥':'✨ 施肥','出售':'💰 出售','送礼':'🎁 送礼'};return'<div class="flex items-center gap-2 text-xs"><span>'+l.icon+'</span><span class="text-earth/70">'+(al[l.action]||l.action)+'</span><span class="text-soildark font-extrabold truncate">'+l.itemName+'</span><span class="text-earth/70 ml-auto shrink-0 font-bold">&times;'+l.count+'</span></div>';}).join(''))+'</div></div>';

  updateTimerDisplay();
