<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>异世界农场生活</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{colors:{
  daily:'#fbf5eb',page:'#fdf8f2',ink:'#4a3729',soildark:'#5c3d2e',
  earth:'#8a6e4e',sprout:'#6b8c3e',harvest:'#b8732a',gold:'#b8813c',
  ribbon_green:'#7a9a4a',ribbon_blue:'#6a8ca0',ribbon_amber:'#c4953c',ribbon_red:'#b85440',
}}}}
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&display=swap');
html{font-size:18px;}
body{font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;color:#4a3729;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:#b8a48a;border-radius:2px;}
@keyframes ripePulse{0%,100%{box-shadow:0 0 0 0 rgba(184,115,42,.35)}50%{box-shadow:0 0 0 10px rgba(184,115,42,0)}}
.ripe-glow{animation:ripePulse 2.2s ease-in-out infinite;}
@keyframes wiltPulse{0%,100%{border-color:rgba(200,80,50,.25)}50%{border-color:rgba(200,80,50,.6)}}
.wilt-warn{animation:wiltPulse 1s ease-in-out infinite;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease-out;}
.progress-fill{} /* transition inlined per-component */
.plot-card{transition:all .2s ease;}.plot-card:hover{transform:translateY(-1px);}
.card-ribbon{position:relative;border-top:3px solid;}
.card-ribbon::before{
  content:attr(data-ribbon);
  position:absolute;top:5px;left:14px;transform:translateY(-50%);
  font-size:12px;font-weight:700;letter-spacing:.06em;
  padding:3px 14px;border-radius:999px;white-space:nowrap;
}
.ribbon-green{border-top-color:#7a9a4a;}.ribbon-green::before{background:#eef4e4;color:#5a7a2e;}
.ribbon-blue{border-top-color:#6a8ca0;}.ribbon-blue::before{background:#e8f0f4;color:#4a6a7e;}
.ribbon-amber{border-top-color:#c4953c;}.ribbon-amber::before{background:#faf3e6;color:#8a6020;}
.ribbon-red{border-top-color:#b85440;}.ribbon-red::before{background:#faece8;color:#8a3020;}
.ribbon-purple{border-top-color:#8a6ca0;}.ribbon-purple::before{background:#f2ecf6;color:#6a4a7e;}
.feature-badge{font-size:11px;padding:2px 7px;border-radius:3px;font-weight:700;letter-spacing:.02em;}
.ft-fast{background:#e3f2e0;color:#3d6b2e;border:1px solid #a3c89a;}
.ft-multi{background:#e0eaf4;color:#3a5a7e;border:1px solid #9ab0c8;}
.ft-cycle{background:#f0e0f4;color:#5e3a6e;border:1px solid #b89ac8;}
.ft-value{background:#fae8d0;color:#7a5020;border:1px solid #d4a860;}
/* 一键收获大按钮呼吸动画 */
@keyframes harvestGlow{0%,100%{box-shadow:0 0 8px rgba(184,115,42,.4)}50%{box-shadow:0 0 20px rgba(184,115,42,.7)}}
.harvest-big{animation:harvestGlow 1.8s ease-in-out infinite;}
/* 自定义颜色显式后备 — Tailwind CDN 无法为 hex 色值生成 opacity 修饰符 */
.text-harvest{color:#b8732a !important}.bg-harvest{background-color:#b8732a !important}
.text-sprout{color:#6b8c3e !important}.bg-sprout{background-color:#6b8c3e !important}
.text-earth{color:#8a6e4e !important}.bg-earth{background-color:#8a6e4e !important}
.text-soildark{color:#5c3d2e !important}.bg-soildark{background-color:#5c3d2e !important}
.text-ink{color:#4a3729 !important}.bg-ink{background-color:#4a3729 !important}
.text-daily{color:#fbf5eb !important}.bg-daily{background-color:#fbf5eb !important}
.text-page{color:#fdf8f2 !important}.bg-page{background-color:#fdf8f2 !important}
.text-gold{color:#b8813c !important}.bg-gold{background-color:#b8813c !important}
#gameTooltip {
  display:none; position:fixed; z-index:9999;
  max-width:280px; padding:10px 14px;
  background:rgba(255,255,255,0.97); border:2px solid #5c3d2e;
  border-radius:10px; font-size:12px; font-weight:700; color:#4a3729;
  box-shadow:0 4px 16px rgba(0,0,0,0.15);
  pointer-events:none; white-space:pre-line;
}
</style>
</head>
<body class="h-full bg-daily text-ink">
<div id="gameTooltip"></div>

<!-- ========== 顶部栏 ========== -->
<header class="fixed top-0 left-0 right-0 z-40 h-12 bg-page/95 backdrop-blur border-b-2 border-soildark/35 flex items-center justify-between px-5 shadow-sm">
  <span class="text-base font-extrabold text-soildark tracking-wider">异世界·农场生活</span>
  <div class="flex items-center gap-6">
    <div class="flex items-center gap-2"><span class="text-gold text-lg">●</span><span class="font-mono text-lg font-bold" id="gold-display">12,480</span></div>
    <div class="flex items-center gap-2"><span class="text-earth/70 text-base">◇</span><span class="font-mono text-base text-earth/70" id="token-display">320</span></div>
  </div>
</header>

<!-- ========== 主体 ========== -->
<div class="pt-12 flex h-full">

  <!-- ====== 左侧导航 ====== -->
  <aside class="w-52 shrink-0 bg-page/80 border-r-2 border-soildark/25 overflow-y-auto">
    <div class="p-3 pt-4">
      <div class="text-[13px] text-earth/80 tracking-widest uppercase mb-2 font-bold">🌾 农 场</div>
      <nav class="flex flex-col gap-1" id="farm-nav"></nav>
      <div class="h-px bg-soildark/20 my-3"></div>
      <div class="text-[13px] text-earth/80 tracking-widest uppercase mb-2 font-bold">🗺️ 世界地图</div>
      <nav class="flex flex-col gap-1" id="world-nav"></nav>
      <div class="h-px bg-soildark/20 my-3"></div>
      <div class="text-[13px] text-earth/80 tracking-widest uppercase mb-2 font-bold">📋 功 能</div>
      <nav class="flex flex-col gap-1" id="func-nav"></nav>
    </div>
  </aside>

  <!-- ====== 中间内容 ====== -->
  <main class="flex-1 overflow-y-auto flex flex-col">
    <div class="px-5 pt-3 pb-0" id="subtab-bar"></div>
    <div class="flex-1 p-5 pt-3" id="main-content"></div>
  </main>

  <!-- ====== 右侧 小镇情报监控中心 ====== -->
  <aside class="w-80 shrink-0 bg-page/80 border-l-2 border-soildark/25 overflow-y-auto p-3 flex flex-col gap-3" id="info-panel"></aside>
</div>

<!-- ========== 种子弹窗 ========== -->
<div id="seed-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-ink/30 backdrop-blur-sm" onclick="closeSeedModal()">
  <div class="bg-page rounded-2xl shadow-xl border-2 border-soildark/35 w-[460px] max-h-[580px] overflow-hidden flex flex-col fade-in" onclick="event.stopPropagation()">
    <div class="px-5 py-3 border-b-2 border-soildark/25 flex items-center justify-between" style="background:linear-gradient(180deg,#faf3e6,#fdf8f2)">
      <span class="text-base font-extrabold text-soildark">选择种子</span>
      <button class="text-earth/70 hover:text-soildark text-2xl leading-none" onclick="closeSeedModal()">&times;</button>
    </div>
    <div class="overflow-y-auto p-3 space-y-1.5" id="seed-list"></div>
    <div class="px-5 py-2 border-t-2 border-soildark/25 text-[13px] text-earth/70 font-medium">选中种子立即扣除 · 不可撤销</div>
  </div>
</div>

<!-- ========== 打断确认弹窗 ========== -->
<div id="interrupt-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-ink/35 backdrop-blur-sm">
  <div class="bg-page rounded-2xl shadow-xl border-2 border-soildark/35 w-[420px] p-6 fade-in flex flex-col items-center text-center" onclick="event.stopPropagation()">
    <span class="text-5xl mb-3">&#x26A0;&#xFE0F;</span>
    <h3 class="text-base font-extrabold text-soildark mb-2">跨区域打断确认</h3>
    <p class="text-sm text-earth/70 leading-relaxed mb-2" id="interrupt-msg"></p>
    <div class="w-full text-left text-[13px] space-y-1 mb-4" id="interrupt-detail"></div>
    <div class="flex gap-3 w-full">
      <button class="flex-1 py-2.5 rounded-xl text-sm font-bold border-2 border-soildark/35 text-earth/70 hover:bg-earth/5 transition-colors" onclick="cancelInterrupt()">取 消</button>
      <button class="flex-1 py-2.5 rounded-xl text-sm font-bold bg-red-600/90 text-white hover:bg-red-600 transition-colors" onclick="confirmInterrupt()">确定打断</button>
    </div>
  </div>
</div>

<!-- ========== 鱼塘投苗模态框 ========== -->
<div id="fish-stock-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-ink/35 backdrop-blur-sm" onclick="closeFishStockModal()">
  <div class="rounded-2xl shadow-xl border-2 p-6 fade-in w-[480px] max-h-[70vh] overflow-y-auto flex flex-col" style="background:#fbf5eb;border-color:#5c3d2e" onclick="event.stopPropagation()">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-base font-extrabold text-soildark" id="fish-stock-title" style="font-size:115%">🐟 选择投苗物种</h3>
      <button class="text-xl text-earth/50 hover:text-earth/80 transition-colors leading-none" onclick="closeFishStockModal()">&times;</button>
    </div>
    <p class="text-xs text-earth/60 mb-3" id="fish-stock-subtitle"></p>
    <div class="grid grid-cols-3 gap-2 mb-4" id="fish-stock-grid"></div>
    <button class="w-full py-2.5 rounded-xl text-sm font-bold border-2 border-soildark/35 text-earth/70 hover:bg-earth/5 transition-colors" onclick="closeFishStockModal()" style="font-size:115%">取 消</button>
  </div>
</div>

<!-- ========== 粮草选择弹窗 ========== -->
<div id="feed-selector" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-ink/35 backdrop-blur-sm" onclick="closeFeedSelection()">
  <div class="rounded-2xl shadow-xl border-2 p-6 fade-in w-[420px] max-h-[70vh] overflow-y-auto flex flex-col" style="background:#fbf5eb;border-color:#5c3d2e" onclick="event.stopPropagation()">
    <div id="feed-selector-body"></div>
  </div>
</div>

<!-- ========== 仓库出售弹窗 ========== -->
<div id="sell-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-ink/30 backdrop-blur-sm" onclick="closeSellModal()">
  <div class="bg-page rounded-2xl shadow-xl border-2 border-soildark/35 w-[420px] p-6 fade-in flex flex-col items-center text-center" onclick="event.stopPropagation()">
    <span class="text-5xl mb-3" id="sell-modal-icon">📦</span>
    <h3 class="text-base font-extrabold text-soildark mb-1" id="sell-modal-title">出售物品</h3>
    <div class="w-full mt-3 space-y-2 text-left text-sm" id="sell-modal-body"></div>
    <div class="flex gap-3 w-full mt-4">
      <button class="flex-1 py-2.5 rounded-xl text-sm font-bold border-2 border-soildark/35 text-earth/70 hover:bg-earth/5 transition-colors" onclick="closeSellModal()">取 消</button>
      <button class="flex-1 py-2.5 rounded-xl text-sm font-bold text-white hover:opacity-90 transition-colors" style="background:#b8732a" onclick="confirmSell()">确认出售</button>
    </div>
  </div>
</div>

<!-- ========== NPC 互动弹窗 ========== -->
<!-- ========== 购买动物弹窗 ========== -->
<div id="animal-buy-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-ink/30 backdrop-blur-sm" onclick="closeBuyAnimal()">
  <div class="rounded-2xl shadow-xl border-2 p-6 fade-in w-[420px] max-h-[70vh] overflow-y-auto" style="background:#fbf5eb;border-color:#5c3d2e" onclick="event.stopPropagation()">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-base font-extrabold text-soildark">🐣 购买动物</h3>
      <button class="text-xl text-earth/50 hover:text-earth/80 transition-colors leading-none" onclick="closeBuyAnimal()">&times;</button>
    </div>
    <div class="grid grid-cols-1 gap-3" id="animal-buy-grid"></div>
    <button class="w-full mt-4 py-2.5 rounded-xl text-sm font-bold border-2 border-soildark/35 text-earth/70 hover:bg-earth/5 transition-colors" onclick="closeBuyAnimal()">取 消</button>
  </div>
</div>

<div id="npc-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-ink/30 backdrop-blur-sm" onclick="closeNpcModal()">
  <div id="npc-modal-card" class="bg-page rounded-2xl shadow-xl border-2 border-soildark/35 w-[450px] max-h-[620px] overflow-hidden flex flex-col fade-in" onclick="event.stopPropagation()">
    <div class="px-5 py-3 border-b-2 border-soildark/25 flex items-center justify-between" style="background:linear-gradient(180deg,#faf3e6,#fdf8f2)">
      <span class="text-base font-extrabold text-soildark" id="npc-modal-title">采购官</span>
      <button class="text-earth/70 hover:text-soildark text-2xl leading-none" onclick="closeNpcModal()">&times;</button>
    </div>
    <div class="overflow-y-auto p-4 space-y-3" id="npc-modal-body"></div>
    <div class="px-5 py-2 border-t-2 border-soildark/25 text-[12px] text-earth/70 font-medium" id="npc-modal-footer">每天每位采购官限互动一次</div>
  </div>
</div>

<!-- 立绘上传隐藏控件 -->
<input type="file" id="npc-image-upload" accept="image/*" class="hidden" onchange="handleNpcImageUpload(event,'large')">
<input type="file" id="npc-avatar-upload" accept="image/*" class="hidden" onchange="handleNpcImageUpload(event,'avatar')">

<!-- ========== 送礼选物弹窗 ========== -->
<div id="gift-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-ink/30 backdrop-blur-sm" onclick="closeGiftModal()">
  <div class="bg-page rounded-2xl shadow-xl border-2 border-soildark/35 w-[460px] max-h-[580px] overflow-hidden flex flex-col fade-in" onclick="event.stopPropagation()">
    <div class="px-5 py-3 border-b-2 border-soildark/25 flex items-center justify-between" style="background:linear-gradient(180deg,#faf3e6,#fdf8f2)">
      <span class="text-base font-extrabold text-soildark">赠送礼品</span>
      <button class="text-earth/70 hover:text-soildark text-2xl leading-none" onclick="closeGiftModal()">&times;</button>
    </div>
    <div class="overflow-y-auto p-3 space-y-1.5 flex-1" id="gift-list"></div>
    <div class="px-5 py-2 border-t-2 border-soildark/25 text-[12px] text-earth/70 font-medium">仅显示该采购官偏好的物品 · 赠送不获得金币</div>
  </div>
</div>

<!-- ========== 地块开垦弹窗 ========== -->
<!-- ========== 建筑升级确认弹窗 ========== -->
<div id="upgrade-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-ink/30 backdrop-blur-sm" onclick="closeUpgradeModal()">
  <div class="bg-page rounded-2xl shadow-xl border-2 border-soildark/35 w-[440px] p-6 fade-in flex flex-col" onclick="event.stopPropagation()">
    <h3 class="text-base font-extrabold text-soildark mb-3" id="upgrade-title">🔨 建筑升级</h3>
    <div id="upgrade-info" class="text-sm text-earth/80 space-y-2 mb-4"></div>
    <div class="flex gap-3 w-full">
      <button class="flex-1 py-2.5 rounded-xl text-sm font-bold border-2 border-soildark/35 text-earth/70 hover:bg-earth/5 transition-colors" onclick="closeUpgradeModal()">取 消</button>
      <button class="flex-1 py-2.5 rounded-xl text-sm font-bold text-white opacity-40 cursor-not-allowed transition-colors" style="background:#6b8c3e" id="upgrade-confirm-btn" disabled>确 认</button>
    </div>
  </div>
</div>

<div id="unlock-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-ink/30 backdrop-blur-sm" onclick="closeUnlockModal()">
  <div class="bg-page rounded-2xl shadow-xl border-2 border-soildark/35 w-[420px] p-6 fade-in flex flex-col items-center text-center" onclick="event.stopPropagation()">
    <span class="text-5xl mb-3">🔒</span>
    <h3 class="text-base font-extrabold text-soildark mb-2">开垦新地块</h3>
    <p class="text-sm text-earth/80 leading-relaxed mb-1" id="unlock-msg"></p>
    <p class="text-xs text-earth/60 mb-4">开垦后该地块将永久变为可用空地</p>
    <div class="flex gap-3 w-full">
      <button class="flex-1 py-2.5 rounded-xl text-sm font-bold border-2 border-soildark/35 text-earth/70 hover:bg-earth/5 transition-colors" onclick="closeUnlockModal()">取 消</button>
      <button class="flex-1 py-2.5 rounded-xl text-sm font-bold text-white hover:opacity-90 transition-colors" style="background:#6b8c3e" id="unlock-confirm-btn" onclick="confirmUnlock()"></button>
    </div>
  </div>
</div>

<!-- ========== NPC 快捷气泡 ========== -->
<div id="npc-bubble" class="hidden fixed z-[55] bg-page rounded-2xl shadow-xl border-2 border-soildark/35 p-3 fade-in min-w-[180px]" onclick="event.stopPropagation()">
  <div class="flex flex-col gap-2">
    <button class="w-full py-3 rounded-xl text-base font-extrabold bg-green-100/70 text-green-800 border-2 border-green-300/50 hover:bg-green-100 transition-colors" id="npc-bubble-greet">👋 打招呼</button>
    <button class="w-full py-3 rounded-xl text-base font-extrabold bg-rose-100/70 text-rose-800 border-2 border-rose-300/50 hover:bg-rose-100 transition-colors" id="npc-bubble-gift">🎁 送礼物</button>
    <button class="w-full py-2 rounded-lg text-sm font-bold text-earth/70 hover:bg-earth/5 transition-colors" id="npc-bubble-cancel">取消</button>
  </div>
</div>

<!-- ========== Toast ========== -->
<div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-xl border-2 border-soildark/40 text-sm font-bold shadow-lg transition-all duration-300 opacity-0 pointer-events-none" style="background:#4a3729;color:#a8e6a0"></div>

<!-- ====================================================================== -->
<script>
// ============================================================
//  1. 常量
// ============================================================
var SEASON_DURATION = 72 * 3600;
var DAY_DURATION = 1800;
var ACTION_STEPS = [
  { key:'TILLING',  label:'松土', icon:'🪵', duration:10 },
  { key:'SEEDING',  label:'播种', icon:'🌱', duration:5  },
  { key:'WATERING', label:'洒水', icon:'💧', duration:5  },
];
var TASTE_TAGS = ['鲜','香','甜','糯','酸','辣','苦','涩','硬','咸'];

// ============================================================
//  2. 采购官数据库 (NPC_DATABASE)
// ============================================================
var NPC_DATABASE = [
  // === 人族 (西方平原) ===
  { id:'roland',  name:'老行商·罗兰', icon:'🧓', race:'human', raceName:'人族', region:'westernPlains',
    fixedTastes:[], randomTasteCount:2, randomTastePool:TASTE_TAGS,
    itemPrefs:[],
    defaultLargePortrait: 'assets/portraits/npc_roland.png',
    defaultPixelAvatar: 'assets/pixels/npc_roland.png',
    desc:'走南闯北五十载，见多识广的老行商。说话慢条斯理，对新鲜农作物总是充满好奇。',
    personality:'豪爽 · 怀旧', backstory:'罗兰年轻时曾随商队横跨大陆，从东方森林到南方裂谷都留下过足迹。如今虽已年迈，但眼力不减当年——他能一眼看出一颗种子的成色、一捆药草的真伪。镇上人都说，罗兰的商队就是活的历史书。',
    quote:'"新鲜的作物，就是最好的通货。"' },
  { id:'nina',    name:'面包师·妮娜', icon:'👩‍🍳', race:'human', raceName:'人族', region:'westernPlains',
    fixedTastes:[], randomTasteCount:2, randomTastePool:TASTE_TAGS,
    itemPrefs:[],
    defaultLargePortrait: 'assets/portraits/npc_nina.png',
    defaultPixelAvatar: 'assets/pixels/npc_nina.png',
    desc:'小镇最受欢迎的面包师，性格开朗热情。她烤的面包能让整条街飘香。',
    personality:'开朗 · 细腻', backstory:'妮娜继承了祖母的石窑烤炉，每天凌晨三点就开始揉面。她坚信好的面包来自好的原料——麦子的香气、水的清甜，缺一不可。镇上每逢节庆，妮娜的面包总是第一个被抢光。',
    quote:'"好面包的味道，是从泥土里长出来的。"' },
  { id:'rayn',    name:'护卫·雷恩', icon:'💂', race:'human', raceName:'人族', region:'westernPlains',
    fixedTastes:[], randomTasteCount:2, randomTastePool:TASTE_TAGS,
    itemPrefs:[],
    defaultLargePortrait: 'assets/portraits/npc_rayn.png',
    defaultPixelAvatar: 'assets/pixels/npc_rayn.png',
    desc:'沉默寡言的年轻护卫，剑术精湛。虽然话不多，但对品质卓越的物资从不吝啬赞美。',
    personality:'寡言 · 严谨', backstory:'雷恩出身平民，靠自学剑术考入王国护卫队。不善言辞的他用行动说话——每一批物资的检验、每一趟商队的护送，他都亲力亲为。对手下严格，对自己更严格。',
    quote:'"品质，不需要多言。"' },
  // === 精灵族 (东方森林) ===
  { id:'elune',   name:'月影·艾露恩', icon:'🧝', race:'elf', raceName:'精灵族', region:'easternForest',
    fixedTastes:['甜'], randomTasteCount:0, randomTastePool:[],
    itemPrefs:[{value:'木材',minLevel:3},{value:'花卉',minLevel:2},{value:'恢复类'}],

//  4. 声望系统 (区域 + NPC个人)
// ============================================================
var regionRep = {};
var npcRep = {};       // { npcId: cumulativeRep }
var npcDailyState = {}; // { npcId: { greeted:bool, gifted:bool } }

Object.keys(REGION_DEFS).forEach(function(k) { regionRep[k] = 0; });
NPC_DATABASE.forEach(function(n) { npcRep[n.id] = 0; npcDailyState[n.id] = { greeted:false, gifted:false }; });

// 区域等级 (累积制: 300 * level^1.8)
function getRegionLevel(rep) { return Math.max(1, Math.floor(Math.pow(Math.max(0,rep)/300, 1/1.8))); }
function getRegionNextXP(level) { return Math.floor(300 * Math.pow(level, 1.8)); }

// NPC好感等级
function getNpcLevel(rep) { return Math.max(1, Math.floor(Math.pow(Math.max(0,rep)/100, 2/3))); }
function getNpcNextXP(level) { return Math.floor(100 * Math.pow(level, 1.5)); }

// 等级上升检测
var _prevRegionLevels = {};
var _prevNpcLevels = {};
Object.keys(REGION_DEFS).forEach(function(k) { _prevRegionLevels[k] = 1; });
NPC_DATABASE.forEach(function(n) { _prevNpcLevels[n.id] = 1; });

function checkLevelUps() {
  // 区域
  Object.keys(REGION_DEFS).forEach(function(k) {
    var lv = getRegionLevel(regionRep[k]||0);
    if (lv > (_prevRegionLevels[k]||1)) {
      _prevRegionLevels[k] = lv;
      showToast(REGION_DEFS[k].icon + ' ' + REGION_DEFS[k].name + ' 区域等级提升至 Lv.' + lv + '！');
    }
  });
  // NPC
  NPC_DATABASE.forEach(function(n) {
    var lv = getNpcLevel(npcRep[n.id]||0);
    if (lv > (_prevNpcLevels[n.id]||1)) {
      _prevNpcLevels[n.id] = lv;
      showToast(n.icon + ' ' + n.name + ' 好感度 Lv.' + lv + '！');
    }
  });
}

// ============================================================
//  5. 每日来访 NPC
// ============================================================
var dailyNPCs = [];
var dayTimer = DAY_DURATION;

function generateDailyNPCs() {
  // 人族权重最高(60%)，保证至少1个人族
  dailyNPCs = [];
  var humanNPCs = NPC_DATABASE.filter(function(n) { return n.race==='human'; });
  var otherNPCs = NPC_DATABASE.filter(function(n) { return n.race!=='human'; });

  // 随机选1个人族
  dailyNPCs.push(humanNPCs[Math.floor(Math.random()*humanNPCs.length)]);

  // 再选0-2个其他族（加权随声望）
  var extraCount = Math.random()<0.3 ? 2 : (Math.random()<0.6 ? 1 : 0);
  var pool = otherNPCs.slice();
  // 按区域声望加权打乱
  for (var i=pool.length-1;i>0;i--) { var j=Math.floor(Math.random()*(i+1)); var t=pool[i]; pool[i]=pool[j]; pool[j]=t; }
  for (var e=0; e<extraCount && pool.length>0; e++) {
    dailyNPCs.push(pool.shift());
  }

  // 为当天来访 NPC 计算每日随机口味
  for (var d=0; d<dailyNPCs.length; d++) {
    dailyNPCs[d].dailyTastes = getNpcDailyTastes(dailyNPCs[d]);
  }

  // 重置每日互动状态
  NPC_DATABASE.forEach(function(n) {
    npcDailyState[n.id] = { greeted:false, gifted:false };
  });
}

// ============================================================
//  6. 双轨售价引擎 (计算时基於今日来访NPC)
// ============================================================
function calculateSellPrice(item) {
  var tasteTags = item.tasteTags || [];
  var materialTags = item.materialTags || [];
  var itemLevel = item.itemLevel || 1;
  var basePrice = item.basePrice || 10;

  var tasteBonus = 0;
  var materialBonus = 0;
  var matchedTastes = [];
  var matchedMaterials = [];
  var matchedNpcIds = {};

  // 口味匹配 (每个NPC的口味偏好命中+5%)
  for (var v=0; v<dailyNPCs.length; v++) {
    var npc = dailyNPCs[v];
    var prefs = npc.dailyTastes || [];
    for (var t=0; t<tasteTags.length; t++) {
      if (prefs.indexOf(tasteTags[t]) >= 0) {
        tasteBonus += 5;
        if (matchedTastes.indexOf(tasteTags[t]) < 0) matchedTastes.push(tasteTags[t]);
        matchedNpcIds[npc.id] = true;
      }
    }
  }

  // 材料偏好匹配 (每个NPC的物品偏好命中+10%)
  for (var v2=0; v2<dailyNPCs.length; v2++) {
    var npc2 = dailyNPCs[v2];
    var itemPrefs = npc2.itemPrefs || [];
    for (var p=0; p<itemPrefs.length; p++) {
      var pref = itemPrefs[p];
      for (var m=0; m<materialTags.length; m++) {
        if (materialTags[m] === pref.value) {
          var minLv = pref.minLevel || 1;
          if (itemLevel >= minLv) {
            materialBonus += 10;
            if (matchedMaterials.indexOf(pref.value) < 0) matchedMaterials.push(pref.value);
            matchedNpcIds[npc2.id] = true;
          }
        }
      }
    }
  }

  var totalBonus = tasteBonus + materialBonus;
  var finalPrice = Math.floor(basePrice * (1 + totalBonus/100));

  return {
    basePrice: basePrice,
    tasteBonus: tasteBonus,
    materialBonus: materialBonus,
    totalBonus: totalBonus,
    finalPrice: finalPrice,
    matchedTastes: matchedTastes,
    matchedMaterials: matchedMaterials,
    matchedNpcIds: Object.keys(matchedNpcIds)
  };
}

/** 仓库出售：金币 + NPC好感 + 区域声望 */
function sellItem(itemId, itemName, itemIcon, count, tasteTags, basePrice, materialTags, itemLevel) {
  var item = {
    tasteTags: tasteTags||[], basePrice: basePrice||10,
    materialTags: materialTags||[], itemLevel: itemLevel||1
  };
  var result = calculateSellPrice(item);
  var totalGold = result.finalPrice * count;
  gold += totalGold;

  // 分配合并后的好感度（含口味偏好命中和交易活动）
  var repPerNpc = Math.floor(result.finalPrice * 1.25 * count);
  for (var i=0; i<result.matchedNpcIds.length; i++) {
    var nid = result.matchedNpcIds[i];
    npcRep[nid] = (npcRep[nid]||0) + repPerNpc;
    var npcObj = getNpc(nid);
    if (npcObj) { regionRep[npcObj.region] = (regionRep[npcObj.region]||0) + repPerNpc; }
  }

  pushLog('出售', itemId, itemName, itemIcon, count);
  updateGoldDisplay();
  checkLevelUps();
  return result;
}

function getTierCapacity(tier, isCoop) { if(tier<0)return 0; if(tier===0)return 1; if(tier===1)return 3; if(tier===2)return 6; return 12; }
function getTierName(tier, isCoop) { if(tier<0)return '未解锁'; if(tier===0)return isCoop?'破旧鸡舍':'破旧畜棚'; if(tier===1)return isCoop?'普通鸡舍':'普通畜棚'; if(tier===2)return isCoop?'高级鸡舍':'高级畜棚'; return isCoop?'顶级鸡舍':'顶级畜棚'; }

function hasAutoFeed(isCoop) { var slots=isCoop?playerCoops:playerBarns; for(var hi=0;hi<slots.length;hi++){if(slots[hi].tier>=2)return true;} return false; }
function setFeedCrop(type, cropId) {
  if (cropId==='*') cropId = null; // null = any crop
  var isCoop = type==='coop';
  if (isCoop) coopFeedCropId = cropId;
  else barnFeedCropId = cropId;
  var isAdvanced = hasAutoFeed(isCoop);

  // 选定了具体粮草 且 建筑为高级 → 批量自动喂养（需检查库存是否足够所有待喂养动物）
  if (cropId !== null && cropId !== '' && cropId !== undefined && isAdvanced) {
    var nowF = Date.now();
    var pending = [];
    for (var fi = 0; fi < playerAnimalInstances.length; fi++) {
      var afi = playerAnimalInstances[fi];
      var afAd = getAnimal(afi.speciesId);
      if (!afAd) continue;
      if (isCoop && afAd.type !== 'coop') continue;
      if (!isCoop && afAd.type !== 'barn') continue;
      if (afi.lastFedTs && (nowF - afi.lastFedTs) < 1800000) continue;
      pending.push(afi);
    }
    if (pending.length === 0) { showToast('⏰ 所有动物都在冷却中（30分钟）'); renderAll(); return; }
    // 检查库存是否足够所有待喂养动物
    var totalStock = 0;
    for (var wix = 0; wix < warehouseSlots.length; wix++) {
      if (warehouseSlots[wix].itemId === cropId && warehouseSlots[wix].count > 0) {
        totalStock += warehouseSlots[wix].count;
      }
    }
    if (totalStock < pending.length) {
      showToast('⚠ 粮草不足（需要 '+pending.length+'，现有 '+totalStock+'），请补充或手动喂养');
      renderAll();
      return;
    }
    // 一次性扣减所有粮草，再逐一喂养
    removeFromWarehouse(cropId, pending.length, 1);
    var fed = 0;
    for (var fi2 = 0; fi2 < pending.length; fi2++) {
      var afi2 = pending[fi2];
      var juvMult = isJuvenile(afi2) ? 1.25 : 1;
      afi2.affection = Math.min(1000, afi2.affection + Math.ceil(10 * juvMult));
      afi2.isFed = true;
      if (afi2.status === 'growing') afi2.remainingS = Math.max(1, afi2.remainingS - 600);
      afi2.lastFedTs = nowF;
      fed++;
    }
    if (fed > 0) { showToast('🤖 自动喂养 ×'+fed+'（消耗 '+cropId+' ×'+fed+'）'); playerSkillXP.gathering=(playerSkillXP.gathering||0)+fed; var xpNeed=playerSkillLevels.gathering*100; if(playerSkillXP.gathering>=xpNeed){playerSkillXP.gathering-=xpNeed;playerSkillLevels.gathering=Math.min(99,playerSkillLevels.gathering+1);} }
  } else {
    var label = '已选择';
    if (cropId === null || cropId === '*') label = '🌾 任意粮草';
    else if (cropId === '') label = '❌ 已关闭';
    else {
      var fc = warehouseSlots.find(function(ws){ return ws.itemId===cropId; });
      if (fc && fc.count>0) label = fc.icon+' '+fc.name;
      else label = '⚠ 粮草不足';
    }
    showToast('📋 '+label);
  }
  renderAll();
}

  if (cropId === null || cropId === '*') label = '🌾 任意饲料';

}

function getAnimalBuildingInfo(uid) {
  var inst = playerAnimalInstances.find(function(ai){ return ai.uid===uid; });
  if (!inst) return null;
  var ad = getAnimal(inst.speciesId);
  if (!ad) return null;
  var isCoop = ad.type==='coop';
  var slots = isCoop ? playerCoops : playerBarns;
  var allInstances = getAnimalInstancesByType(ad.type);
  var cursor = 0;
  for (var si=0;si<slots.length;si++) {
    var sc = getTierCapacity(slots[si].tier, isCoop);
    var slotAnimals = allInstances.slice(cursor, cursor+sc);
    for (var aix=0;aix<slotAnimals.length;aix++) {
      if (slotAnimals[aix].uid===uid) return { isCoop:isCoop, slotIdx:si, tier:slots[si].tier, tierName:getTierName(slots[si].tier, isCoop) };
    }
    cursor += sc;
  }
  return null;
}
function getAnimalQueueInfo(uid, action) {
  for (var i=0;i<globalActionQueue.length;i++) { var q=globalActionQueue[i]; if (q.type==='HUSBANDRY'&&q.uid===uid&&(!action||q.action===action)) return q; }
  return null;
}
function cancelQueuedHusbandryAction(uid) {
  var idx=-1;
  for (var i=0;i<globalActionQueue.length;i++) { if (globalActionQueue[i].type==='HUSBANDRY'&&globalActionQueue[i].uid===uid) { idx=i; break; } }
  if (idx<0) return;
  var removed=globalActionQueue.splice(idx,1)[0];
  var inst=playerAnimalInstances.find(function(ai){return ai.uid===uid;});
  showToast('⏳ 已取消 '+(inst?inst.name:'')+(removed.action==='feed'?' 喂食':' 安抚')+'排队');
  renderAll();
}

function calcRecipeOutput(recipe, selectedSlots) {
  var totalInputValue = 0;
  var totalQuality = 0;
  var count = 0;
  for (var i = 0; i < selectedSlots.length; i++) {
    var sl = selectedSlots[i];
    if (!sl) continue;
    var qm = qualityPriceMult(sl.quality||1);
    totalInputValue += (sl.basePrice||10) * qm * (recipe.inputs[i].count||1);
    totalQuality += (sl.quality||1);
    count++;
  }
  var outputPrice = Math.floor(totalInputValue * recipe.profitCoeff);
  var outputQuality = count > 0 ? Math.max(1, Math.floor(totalQuality / count)) : 1;
  return { price: outputPrice, quality: outputQuality, name: qualityName(recipe.outputName, outputQuality) };
}

function rollQuality(farmingLv, seedLv, fertType) { var quality=1;
  var ft = FERTILER_TYPES[fertType] || { qualBonus: 0, lv4Bonus: 0 };
  var qBonus = (farmingLv - 1) * 0.005 + (seedLv || 0) * 0.02 + (ft.qualBonus || 0);
  var lv4Bonus = (seedLv || 0) * 0.005 + (ft.lv4Bonus || 0);
  var lv5Prob = Math.min(0.08, 0.005 + lv4Bonus * 0.3);
  var lv4Prob = Math.min(0.30, 0.03 + lv4Bonus);
  var lv3Prob = Math.min(0.60, 0.12 + qBonus);
  var lv2Prob = Math.min(0.70, 0.25 + qBonus * 0.5);
  var roll = Math.random();
  if (roll < lv5Prob) return 5;
  if (roll < lv5Prob + lv4Prob) return 4;
  if (roll < lv5Prob + lv4Prob + lv3Prob) return 3;
  if (roll < lv5Prob + lv4Prob + lv3Prob + lv2Prob) return 2;
  return 1;
}

var warehouseSlots = [];
function addToWarehouse(itemId, name, icon, count, type, tasteTags, basePrice, materialTags, itemLevel, quality) {
  quality = quality || 1;
  var stackKey = makeQualityItemId(itemId, quality);
  var ex = null;
  for (var i=0;i<warehouseSlots.length;i++) { if (warehouseSlots[i].stackKey===stackKey) { ex=warehouseSlots[i]; break; } }
  if (ex) { ex.count+=count; }
  else { warehouseSlots.push({ stackKey:stackKey, itemId:itemId, name:name, displayName:qualityName(name, quality), icon:icon, count:count, type:type||'CROP', tasteTags:tasteTags||[], basePrice:basePrice||10, materialTags:materialTags||[], itemLevel:itemLevel||1, quality:quality }); }
}
function removeFromWarehouse(itemId, count, quality) {
  var stackKey = makeQualityItemId(itemId, quality || 1);
  for (var i=0;i<warehouseSlots.length;i++) {
    if (warehouseSlots[i].stackKey===stackKey) { if (warehouseSlots[i].count<count) return false; warehouseSlots[i].count-=count; if (warehouseSlots[i].count<=0) warehouseSlots.splice(i,1); return true; }
  }
  // fallback: try any quality if specific quality not found
  if (!quality) return false;
  for (var j=0;j<warehouseSlots.length;j++) {
    if (warehouseSlots[j].itemId===itemId && warehouseSlots[j].count>=count) {
      warehouseSlots[j].count-=count;
      if (warehouseSlots[j].count<=0) warehouseSlots.splice(j,1);
      return true;
    }
  }
  return false;
}

var giftTargetNpcId = null;
function openGiftModal(npcId) {
  var npc = getNpc(npcId); if (!npc) return;
  if (npcDailyState[npcId].gifted) { showToast('今天已经送过礼物了！'); return; }
  giftTargetNpcId = npcId;

  // 筛选可送物品：口味或材料匹配
  var prefs = npc.dailyTastes || [];
  var itemPrefs = npc.itemPrefs || [];
  var eligible = [];
  for (var i=0;i<warehouseSlots.length;i++) {
    var s = warehouseSlots[i];
    if (s.count<=0) continue;
    var match = false;
    // 口味匹配
    for (var t=0;t<(s.tasteTags||[]).length;t++) { if (prefs.indexOf(s.tasteTags[t])>=0) { match=true; break; } }
    // 材料匹配
    if (!match) {
      for (var p=0;p<itemPrefs.length;p++) {
        for (var m=0;m<(s.materialTags||[]).length;m++) {
          if (s.materialTags[m]===itemPrefs[p].value && (s.itemLevel||1)>=(itemPrefs[p].minLevel||1)) { match=true; break; }
        }
        if (match) break;
      }
    }
    if (match) eligible.push(s);
  }

  var h = '';
  if (eligible.length===0) {
    h = '<div class="text-center py-12 text-earth/70 text-sm font-medium">仓库中暂无' + npc.name + '偏好的物品</div>';
  } else {
    h = eligible.map(function(s) {
      return '<button class="gift-opt w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-pink-100/60 border-2 border-pink-200/50 hover:bg-pink-100 hover:border-pink-300 transition-colors text-left" data-item-id="' + s.itemId + '">' +
        '<span class="text-2xl">' + s.icon + '</span>' +
        '<div class="flex-1"><div class="text-sm font-bold text-soildark">' + s.name + '</div>' +
        '<div class="text-[12px] text-earth/70 font-medium">库存 ×' + s.count + ' · 估价 ' + (s.basePrice||10) + ' 金币</div></div>' +
        '<span class="text-xs text-rose-700 font-bold shrink-0">🎁 赠送</span></button>';
    }).join('');
  }

  document.getElementById('gift-list').innerHTML = h;
  document.getElementById('gift-modal').classList.remove('hidden');

  var btns = document.querySelectorAll('#gift-list .gift-opt');
  for (var b=0;b<btns.length;b++) {
    btns[b].addEventListener('click', function() {
      confirmGift(this.dataset.itemId);
    });
  }
}

function closeGiftModal() { document.getElementById('gift-modal').classList.add('hidden'); giftTargetNpcId = null; }

function confirmGift(itemId) {
  var npc = getNpc(giftTargetNpcId); if (!npc) return;
  var slot = null;
  for (var i=0;i<warehouseSlots.length;i++) { if (warehouseSlots[i].itemId===itemId) { slot=warehouseSlots[i]; break; } }

// ---- 弹窗 ----

function openNpcModal(npcId, mode) {

  var card = document.getElementById('npc-modal-card');

  else { card.style.width = '450px'; card.style.maxWidth = ''; }

  document.getElementById('npc-modal-title').textContent = (isReadonly?'📒 联络簿 · ':'') + eff.name;

    ? '<span class="text-xs text-earth/70 font-medium">📌 档案阅览模式 · 点击下方按钮进入编辑</span>'

    var nextXP = getNpcNextXP(lv);

    // 左侧立绘

      : '<span id="npc-large-preview" class="text-7xl opacity-30">'+npc.icon+'</span>';

      ? '<img src="'+eff.avatar+'" alt="头像" class="w-full h-full object-cover rounded-lg" data-fallback="'+npc.icon+'" data-fallback-class="text-3xl">'
      : '<span class="text-3xl">'+npc.icon+'</span>';

    body += '<div class="flex gap-4">'+

      // ===== 左栏 40%：大立绘 =====

        '</div>'+

      '</div>'+

      // ===== 右栏 60%：名片与手札 =====

        // 顶层：像素头像 + 名称/种族/好感

          '<div class="w-20 h-20 shrink-0 rounded-xl border-2 border-soildark/35 flex items-center justify-center overflow-hidden cursor-pointer hover:border-soildark/50 transition-colors" style="background:#fbf5eb" onclick="triggerNpcImageUpload(\'avatar\')" title="点击上传像素头像">'+
            avHTML+
          '</div>'+
          '<div class="flex-1 min-w-0">'+
            '<div class="text-lg font-extrabold text-soildark leading-tight">'+eff.name+'</div>'+

function saveNpcProfile() {
  if (!currentNpcId) return;
  var data = {
    name:        (document.getElementById('npc-edit-name')||{}).value || '',
    personality: (document.getElementById('npc-edit-personality')||{}).value || '',
    backstory:   (document.getElementById('npc-edit-backstory')||{}).value || '',
    quote:       (document.getElementById('npc-edit-quote')||{}).value || ''
  };
  // 过滤空值
  for (var k in data) { if (!data[k] || !data[k].trim()) data[k] = ''; else data[k] = data[k].trim(); }
  saveNpcCustomData(currentNpcId, data);
  npcEditMode = false;
  showToast('✅ 档案已保存！刷新页面不丢失');
  openNpcModal(currentNpcId, 'readonly');
}

// ---- 立绘 & 头像上传 ----

function triggerNpcImageUpload(slot) {
  if (slot==='avatar') document.getElementById('npc-avatar-upload').click();
  else document.getElementById('npc-image-upload').click();
}

function handleNpcImageUpload(event, slot) {
  var file = event.target.files[0];
  if (!file || !currentNpcId) return;
  if (!file.type.match(/^image\/(jpeg|png|webp|gif)$/)) {
    showToast('⚠️ 仅支持 JPG/PNG/WebP/GIF 图片格式');
    event.target.value = ''; return;
  }
  if (file.size > 2.5 * 1024 * 1024) {
    showToast('⚠️ 图片文件过大（超过 2.5MB），建议压缩后再上传');
    event.target.value = ''; return;
  }

  // 即时预览：使用 Blob URL，无需等待 Base64 编码
  var blobUrl = URL.createObjectURL(file);
  var previewId = (slot==='avatar') ? 'npc-avatar-preview' : 'npc-large-preview';
  var isAvatar = (slot==='avatar');
  var preview = document.getElementById(previewId);
  if (preview) {
    if (preview.tagName==='SPAN') {
      var img = document.createElement('img');
      img.id = previewId;
      img.src = blobUrl;
      img.alt = isAvatar ? '头像' : '立绘';
      img.className = isAvatar ? 'w-full h-full object-cover rounded-lg' : 'w-full h-full object-contain';
      preview.parentNode.replaceChild(img, preview);
    } else {
      preview.src = blobUrl;
    }
  }

  // 异步转 Base64 持久化到 localStorage
  var reader = new FileReader();
  reader.onload = function(e) {
    var base64 = e.target.result;
    var ok = (slot==='avatar')
      ? saveNpcAvatar(currentNpcId, base64)
      : saveNpcLarge(currentNpcId, base64);
    if (ok) {
      showToast('🖼️ ' + (isAvatar?'像素头像':'大立绘') + '已上传并保存！');
    }
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ---- NPC 快捷气泡 ----
var bubbleNpcId = null;
function openNpcBubble(event, el, npcId) {
  if (bubbleNpcId === npcId) { closeNpcBubble(); return; }
  var npc = getNpc(npcId); if (!npc) return;
  bubbleNpcId = npcId;
  var ds = npcDailyState[npcId];
  var bubble = document.getElementById('npc-bubble');
  var rect = el.getBoundingClientRect();
  bubble.style.left = Math.max(10, rect.left - 200) + 'px';
  bubble.style.top = Math.max(60, rect.top) + 'px';
  bubble.classList.remove('hidden');
  // 按钮状态 — 纯按钮，无头像/名字/生平
  var greetBtn = document.getElementById('npc-bubble-greet');
  var giftBtn = document.getElementById('npc-bubble-gift');
  greetBtn.textContent = ds.greeted?'✅ 已打招呼':'👋 打招呼';
  greetBtn.className = 'w-full py-3 rounded-xl text-base font-extrabold border-2 transition-colors '+(ds.greeted?'bg-earth/5 text-earth/70 border-soildark/20':'bg-green-100/70 text-green-800 border-green-300/50 hover:bg-green-100');
  giftBtn.textContent = ds.gifted?'✅ 已送礼':'🎁 送礼物';
  giftBtn.className = 'w-full py-3 rounded-xl text-base font-extrabold border-2 transition-colors '+(ds.gifted?'bg-earth/5 text-earth/70 border-soildark/20':'bg-rose-100/70 text-rose-800 border-rose-300/50 hover:bg-rose-100');
  // 事件
  greetBtn.onclick = function(){closeNpcBubble();greetNpc(npcId);};
  giftBtn.onclick = function(){closeNpcBubble();openGiftModal(npcId);};
  document.getElementById('npc-bubble-cancel').onclick = closeNpcBubble;
}
function closeNpcBubble(){document.getElementById('npc-bubble').classList.add('hidden');bubbleNpcId=null;}
document.addEventListener('click',function(e){if(bubbleNpcId&&!e.target.closest('#npc-bubble')&&!e.target.closest('#info-panel [onclick]')){closeNpcBubble();}});

// ============================================================
//  12. 核心 Tick 引擎
// ============================================================
var currentActiveAction = null;
var globalActionQueue = [];
var pendingInterrupt = null;
// 种植分段保存：根据 stepIndex 保留中断时种植进度
function saveFarmingProgress() {
  if (!currentActiveAction || currentActiveAction.type==='HUSBANDRY' || currentActiveAction.type==='NODE') return;
  var p = findPlot(currentActiveAction.plotId);
  var si = currentActiveAction.stepIndex;
  if (p && p.status === 'PREPARING') {
    if (si === 0) { refundSeed(p); resetPlotToEmpty(p); }
    else if (si === 1) { refundSeed(p); p.status = 'TILLED'; p.isPreTilled = true; p.wiltTimer = null; p.resumeFrom = null; p.remaining = '待播种'; p.progress = 0; p.cropId = null; p.cropName = null; p.icon = null; }
    else if (si === 2) { p.status = 'TILLED'; p.resumeFrom = 'WATERING'; p.wiltTimer = 600; p.isPreTilled = false; p.remaining = '枯萎 600s'; p.progress = 0; }
  }
}
// 强制取消所有活跃行动（含缓冲），清空队列
function cancelNodeLoop() {
  if (currentActiveAction) {
    if (currentActiveAction._bufferTimer) { clearTimeout(currentActiveAction._bufferTimer); currentActiveAction._bufferTimer=null; }
    currentActiveAction=null;
    globalActionQueue=[];
  }
}
var lockedSeedIds = {};
var playerSpecializations = { fishing_30: null };
function isPlayerBusy() { return currentActiveAction!==null; }

function startNextQueueAction() {
  if (!globalActionQueue.length) return;
  var n = globalActionQueue.shift();
  if (n.type==='HUSBANDRY') {
    // 队列喂养：粮草消耗延迟到 advanceActionStep 实际完成时扣除

// ---- 钓鱼操作 ----
function startFishingAt(locId) {
  var loc = getFishingLocation(locId);
  if (!loc) return;
  if (playerFishingState.active) {
    showToast('已在 '+getFishingLocation(playerFishingState.location).label+' 垂钓中');
    return;
  }
  var baseTime = 120; // 基础120秒/杆
  if (playerFishingState.baitEquipped) { baseTime = Math.floor(baseTime * 0.8); }
  playerFishingState.active = true;
  playerFishingState.location = locId;
  playerFishingState.remainingS = baseTime;
  playerFishingState.totalS = baseTime;
  showToast('🎣 开始在 '+loc.label+' 垂钓...');
  renderAll();
}

function stopFishing() {
  if (!playerFishingState.active) return;
  playerFishingState.active = false;
  playerFishingState.remainingS = 0;
  playerFishingState.totalS = 0;
  showToast('🛑 已收杆停止垂钓');
  renderAll();
}

function equipFishingBait() {
  if (playerFishingState.baitEquipped) {
    // 卸下鱼饵
    playerFishingState.baitEquipped = false;
    playerFishingState.baitItemId = null;
    showToast('🪱 已卸下鱼饵');
  } else {
    // 从仓库找基础鱼饵
    var baitSlot = null;
    for (var i=0;i<warehouseSlots.length;i++) {
      if (warehouseSlots[i].itemId==='basic_bait' && warehouseSlots[i].count>0) { baitSlot=warehouseSlots[i]; break; }
    }
    if (!baitSlot) { showToast('❌ 仓库中没有基础鱼饵（在制作区-手工制作中制作）'); return; }
    removeFromWarehouse('basic_bait', 1);
    playerFishingState.baitEquipped = true;
    playerFishingState.baitItemId = 'basic_bait';
    showToast('🪱 已装备基础鱼饵 · 垂钓速度+20%');
  }
  renderAll();
}

// ---- 钓鱼结算 ----
function completeFishingCatch() {
  var loc = getFishingLocation(playerFishingState.location);
  if (!loc) { playerFishingState.active=false; return; }
  var fishingLv = playerSkillLevels.fishing || 1;

  // 按地点筛选可钓的鱼
  var candidates = getFishByLocation(loc.location);
  // 按最小等级过滤
  var eligible = [];
  for (var i=0;i<candidates.length;i++) {
    if (fishingLv >= candidates[i].minFishingLv) eligible.push(candidates[i]);
  }
  if (eligible.length===0) eligible = candidates; // 保底：至少有一条

  // 加权随机（按 rarity 反比：稀有度越高越难出）
  var totalW = 0;
  for (var w=0;w<eligible.length;w++) { totalW += 1 / eligible[w].rarity; }
  var roll = Math.random() * totalW;
  var caught = eligible[0];
  var cum = 0;
  for (var c=0;c<eligible.length;c++) {
    cum += 1 / eligible[c].rarity;
    if (roll <= cum) { caught = eligible[c]; break; }
  }

  // 鱼获入仓（带品质）
  var fishQ = rollQuality(playerSkillLevels.fishing, 0, null);
  addToWarehouse(caught.id, caught.name, caught.icon, 1, 'MATERIAL', caught.flavor, caught.basePrice, [], 1, fishQ);
  var qName = qualityName(caught.name, fishQ);

  // 钓鱼经验
  playerSkillXP.fishing = (playerSkillXP.fishing||0) + 10;
  var xpNeed = playerSkillLevels.fishing * 100;
  if (playerSkillXP.fishing >= xpNeed) {
    playerSkillXP.fishing -= xpNeed;
    playerSkillLevels.fishing = Math.min(99, playerSkillLevels.fishing+1);
    showToast('⭐ 钓鱼技能升级！Lv.'+playerSkillLevels.fishing);
  }

  // 宝箱判定
  var treasureMsg = '';
  var chestResult = rollTreasureChest(playerSkillLevels.fishing);
  if (chestResult) {
    var chestId = 'chest_'+nextChestId;
    nextChestId++;
    playerTreasureChests.push({ id:chestId, tier:chestResult.tier });
    var ti = getChestTierInfo(chestResult.tier);
    treasureMsg = '  🎉 捞起 ['+ti.name+'('+ti.quality+')]！已存入仓库';
  }

  showToast('🎣 钓到 '+qName+'！'+treasureMsg);
  pushLog('钓鱼收获', caught.id, caught.name, caught.icon, 1);

  // 重置钓鱼计时
  var baseTime = 120;
  if (playerFishingState.baitEquipped) { baseTime = Math.floor(baseTime * 0.8); }
  playerFishingState.remainingS = baseTime;
  playerFishingState.totalS = baseTime;

  renderAll();
}

// ---- 沉船宝箱双重摇表 ----
function rollTreasureChest(fishingLevel) {
  // 第一重：宝箱触发率
  var spec = (playerSpecializations.fishing_30==='treasure_hunter') ? 0.05 : 0;
  var treasureCheckRate = 0.03 + (fishingLevel * 0.001) + spec;
  if (Math.random() >= treasureCheckRate) return null;

  // 第二重：阶梯保底品质
  var tierProbs;
  if (fishingLevel <= 15) {
    tierProbs = [0.90, 0.10, 0, 0, 0];
  } else if (fishingLevel <= 30) {
    tierProbs = [0.50, 0.35, 0.15, 0, 0];
  } else if (fishingLevel <= 60) {
    tierProbs = [0.10, 0.40, 0.35, 0.15, 0];
  } else if (fishingLevel <= 89) {
    tierProbs = [0, 0.15, 0.40, 0.35, 0.10];
  } else {
    tierProbs = [0, 0, 0.20, 0.50, 0.30];
  }

  var r2 = Math.random();
  var tier = 1;
  var cum2 = 0;
  for (var t=0;t<tierProbs.length;t++) {
    cum2 += tierProbs[t];
    if (r2 < cum2) { tier = t+1; break; }
  }

  return { tier: tier };
}

// ---- 开箱函数：多品类独立结算 ----

        var gemPool = [
          { id:'emerald', name:'绿宝石', icon:'💚', basePrice:200 },

        var pick3 = gemPool[Math.floor(Math.random()*gemPool.length)];

      // 判定4: 20% 2-3级木材
      if (Math.random() < 0.20) {
        var woodPool = [

        lootSummary.push(pick4.icon+' '+pick4.name+' ×'+qty4);
      }
      break;
    case 2: // 铜制宝箱 - 预留
      // TODO: 铜制宝箱爆率数据
      if (Math.random() < 0.60) {
        addToWarehouse('copper_ore', '铜矿石', '🔶', 4+Math.floor(Math.random()*3), 'MATERIAL', [], 0, ['矿石'], 1, 1);
        lootSummary.push('🔶 铜矿石组合');
      }
      break;
    case 3: // 铁制宝箱 - 预留
      // TODO: 铁制宝箱爆率数据
      if (Math.random() < 0.60) {
        addToWarehouse('iron_ore', '铁矿石', '⛏️', 2+Math.floor(Math.random()*3), 'MATERIAL', [], 0, ['矿石'], 1, 1);
        lootSummary.push('⛏️ 铁矿石组合');
      }
      break;
    case 4: // 镀金宝箱 - 预留
      // TODO: 镀金宝箱爆率数据
      if (Math.random() < 0.60) {
        addToWarehouse('gold_ore', '金矿石', '🥇', 1+Math.floor(Math.random()*2), 'MATERIAL', [], 0, ['矿石'], 1, 1);
        lootSummary.push('🥇 金矿石组合');
      }
      break;
    case 5: // 暗金宝箱 - 预留
      // TODO: 暗金宝箱爆率数据
      if (Math.random() < 0.70) {
        addToWarehouse('mithril_ore', '秘银矿石', '💎', 1+Math.floor(Math.random()*2), 'MATERIAL', [], 0, ['矿石'], 1, 1);
        lootSummary.push('💎 秘银矿石组合');
      }
      break;
  }

  // 移除已开启的宝箱
  playerTreasureChests.splice(idx, 1);

  var summaryText = lootSummary.length>0 ? lootSummary.join(' / ') : '（空箱）';
  showToast('🔓 打开了 '+ti.name+'('+ti.quality+') · '+summaryText);
  pushLog('开箱', chestId, ti.name, ti.icon, 1);
  renderAll();
}

// ---- 蟹笼系统 ----
function placeCrabPot(location) {
  if (location!=='lake' && location!=='ocean') { showToast('❌ 仅可在湖边或海边放置蟹笼'); return; }
  // 检查仓库中是否有蟹笼
  var potSlot = null;
  for (var i=0;i<warehouseSlots.length;i++) {
    if (warehouseSlots[i].itemId==='crab_pot' && warehouseSlots[i].count>0) { potSlot=warehouseSlots[i]; break; }
  }
  if (!potSlot) { showToast('❌ 仓库中没有蟹笼（在制作区-手工制作中制作）'); return; }
  removeFromWarehouse('crab_pot', 1);
  var potId = 'crabpot_'+nextCrabPotId;
  nextCrabPotId++;
  playerCrabPots.push({
    id: potId,
    location: location,
    remainingS: 900, // 15分钟一轮
    totalS: 900,
    stored: []
  });
  var locLabel = location==='ocean'?'广阔海边':'静谧湖泊';
  showToast('🦀 蟹笼已放置在 '+locLabel);
  playerSkillXP.gathering = (playerSkillXP.gathering||0) + 5;
  renderAll();
}

function collectCrabPot(potId) {
  var idx = -1;
  for (var i=0;i<playerCrabPots.length;i++) {
    if (playerCrabPots[i].id===potId) { idx=i; break; }
  }
  if (idx<0) return;
  var pot = playerCrabPots[idx];
  if (pot.stored.length===0) { showToast('📦 蟹笼暂无收获'); return; }
  var totalCollected = 0;
  for (var s=0;s<pot.stored.length;s++) {
    var item = pot.stored[s];
    addToWarehouse(item.id, item.name, item.icon, item.count||1, item.type, item.flavor||[], item.basePrice||50, [], 1, 1);
    totalCollected += (item.count||1);
  }
  pot.stored = [];
  var locLabel = pot.location==='ocean'?'海边':'湖边';
  showToast('🦀 从 '+locLabel+' 蟹笼收获了 '+totalCollected+' 件物品');
  playerSkillXP.gathering = (playerSkillXP.gathering||0) + 8;
  renderAll();
}

function removeCrabPot(potId) {
  var idx = -1;
  for (var i=0;i<playerCrabPots.length;i++) {
    if (playerCrabPots[i].id===potId) { idx=i; break; }
  }
  if (idx<0) return;
  var pot = playerCrabPots[idx];
  // 如果有未收的，先收入仓库
  for (var s=0;s<pot.stored.length;s++) {
    var item = pot.stored[s];
    addToWarehouse(item.id, item.name, item.icon, item.count||1, item.type, item.flavor||[], item.basePrice||50, [], 1, 1);
  }
  playerCrabPots.splice(idx, 1);
  // 退还蟹笼到仓库
  addToWarehouse('crab_pot', '蟹笼', '🦀', 1, 'MATERIAL', [], 50, [], 1, 1);
  showToast('🔧 已回收蟹笼');
  renderAll();
}

function tickCrabPots() {
  for (var i=0;i<playerCrabPots.length;i++) {
    var pot = playerCrabPots[i];
    pot.remainingS -= 1;
    if (pot.remainingS <= 0) {
      // 蟹笼产出
      var table = CRAB_POT_TABLE[pot.location];
      if (table && table.length>0) {
        var totalW = 0;
        for (var w=0;w<table.length;w++) { totalW += table[w].weight; }
        var roll = Math.random() * totalW;
        var cum = 0;
        var caught = table[0];
        for (var c=0;c<table.length;c++) {
          cum += table[c].weight;
          if (roll <= cum) { caught = table[c]; break; }
        }
        // 加入蟹笼暂存
        var found = false;
        for (var s=0;s<pot.stored.length;s++) {
          if (pot.stored[s].id===caught.id) { pot.stored[s].count=(pot.stored[s].count||1)+1; found=true; break; }
        }
        if (!found) {
          pot.stored.push({ id:caught.id, name:caught.name, icon:caught.icon, type:caught.type, flavor:caught.flavor, basePrice:caught.basePrice, count:1 });
        }
      }
      pot.remainingS = pot.totalS;
    }
  }
}

// ---- 海边采集 ----
var beachGatherTimer = 0;

function tickBeachGathering() {
  // 仅当玩家在海边垂钓页面时计时
  if (!playerFishingState.active || playerFishingState.location!=='ocean') {
    beachGatherTimer = 0;
    return;
  }
  beachGatherTimer += 1;
  if (beachGatherTimer >= BEACH_GATHER_INTERVAL) {
    beachGatherTimer = 0;
    // 海边采集不计算钓鱼等级
    var totalW2 = 0;
    for (var w=0;w<BEACH_GATHER_TABLE.length;w++) { totalW2 += BEACH_GATHER_TABLE[w].weight; }
    var roll2 = Math.random() * totalW2;
    var cum2 = 0;
    var found = BEACH_GATHER_TABLE[0];
    for (var c=0;c<BEACH_GATHER_TABLE.length;c++) {
      cum2 += BEACH_GATHER_TABLE[c].weight;
      if (roll2 <= cum2) { found = BEACH_GATHER_TABLE[c]; break; }
    }
    addToWarehouse(found.id, found.name, found.icon, 1, found.type, found.flavor, found.basePrice, [], 1, 1);
    showToast('🏖️ 海边采集：捡到了 '+found.icon+' '+found.name);
    playerSkillXP.gathering = (playerSkillXP.gathering||0) + 3;
  }
}

function renderNodeCard(node) {
  var level = node.level || 1;
  var tool = node.tool || null;
  var isHighLevel = level >= 2;
  var toolBlocked = false;
  if (isHighLevel && tool && playerTools[tool]==='old') {
    toolBlocked = true;
  }

  // Track 1: Player manual action
  var track1HTML = '';
  if (toolBlocked) {
    track1HTML = '<button class="px-3 py-2 rounded-lg text-xs font-extrabold bg-earth/15 text-earth/40 border-2 border-soildark/15 w-full" onclick="showToast(\'❌ 当前工具品级过低，无法对高级资源点进行作业，请前往制作区升级！\')">🔒 工具品级不足</button>';
  } else {
    // Show active state if this node is being worked
    var isActiveNode = currentActiveAction && currentActiveAction.type==='NODE' && currentActiveAction.nodeId===node.id;
    if (isActiveNode) {
      var pct = Math.round((1-currentActiveAction.remainingS/currentActiveAction.totalS)*100);
      track1HTML = '<div class="node-action-progress px-3 py-2 rounded-lg text-xs font-extrabold text-amber-800 bg-amber-100 border-2 border-amber-300/50 w-full text-center cursor-pointer" onclick="cancelNodeAction()" title="点击取消挂机">⏳ 采集中... <span class="progress-text">'+currentActiveAction.remainingS+'</span>s <span class="text-red-500">(点击取消)</span><div class="w-full h-2 bg-amber-200 rounded-full overflow-hidden mt-1"><div class="progress-fill h-full bg-amber-500 rounded-full" style="transition:width 1s linear;width:'+pct+'%"></div></div></div>';
    } else {
      track1HTML = '<button class="node-action-btn px-3 py-2 rounded-lg text-xs font-extrabold text-white bg-green-600/80 hover:bg-green-600 border-2 border-green-500/30 transition-colors w-full" data-node-id="'+node.id+'" data-node-type="'+node.type+'" data-node-level="'+level+'">'+(nodeTypeLabels[node.type]||'🚶 玩家亲自挂机')+'</button>';
    }
  }

  // Track 2: Pet dispatch (placeholder)
  var track2HTML = '<button class="px-3 py-2 rounded-lg text-xs font-extrabold bg-earth/10 text-earth/40 border-2 border-dashed border-soildark/20 cursor-not-allowed w-full" disabled>🐾 宠物派遣（暂未开放）</button>';

  // Track 3: Consumable placement
  var track3Label = '';
  var track3Consumable = '';
  if (node.type==='fishing') { track3Label = '🦀 投入蟹笼'; track3Consumable = 'crab_pot'; }
  else if (node.type==='bug') { track3Label = '🍯 抹上虫蜜'; track3Consumable = 'bug_honey'; }
  else if (node.type==='hunting') { track3Label = '🪤 安置陷阱'; track3Consumable = 'trap'; }
  else { track3Label = '📦 暂无需耗材'; }

  var hasConsumable = false;
  if (track3Consumable) {
    for (var wi=0; wi<warehouseSlots.length; wi++) {
      if (warehouseSlots[wi].itemId===track3Consumable && warehouseSlots[wi].count>0) { hasConsumable=true; break; }
    }
  } else {
    hasConsumable = true; // no consumable needed, just show as text
  }

  var track3HTML = '';
  if (track3Consumable && !hasConsumable) {
    track3HTML = '<button class="px-3 py-2 rounded-lg text-xs font-extrabold bg-earth/10 text-earth/30 border-2 border-soildark/10 cursor-not-allowed w-full" disabled>'+track3Label+'（背包无此道具）</button>';
  } else if (track3Consumable && hasConsumable) {
    track3HTML = '<button class="node-consumable-btn px-3 py-2 rounded-lg text-xs font-extrabold text-amber-700 bg-amber-50 hover:bg-amber-100 border-2 border-amber-300/40 transition-colors w-full" data-node-id="'+node.id+'" data-consumable="'+track3Consumable+'">'+track3Label+'</button>';
  } else {
    track3HTML = '<span class="px-3 py-2 rounded-lg text-xs text-earth/40 text-center w-full block">'+track3Label+'</span>';
  }

  var levelBadge = isHighLevel ? '<span class="absolute top-1 left-1 text-[10px] px-1 rounded font-extrabold text-red-600 bg-red-50">②高阶</span>' : '';

  return '<div class="bg-page border-2 border-soildark/30 rounded-xl p-4 flex flex-col gap-3 relative hover:border-soildark/45 hover:shadow-md transition-all">'+
    levelBadge+
    '<div class="flex items-center gap-2">'+
      '<span class="text-3xl">'+node.icon+'</span>'+

    '</div>'+
    '<div class="flex gap-2">'+
      track1HTML+

// ---- 取消挂机 ----
function cancelNodeAction() {
  if (currentActiveAction && currentActiveAction.type==='NODE') {
    if (currentActiveAction._bufferTimer) { clearTimeout(currentActiveAction._bufferTimer); currentActiveAction._bufferTimer=null; }
    currentActiveAction=null;
    showToast('⏹️ 已取消挂机');
    renderAll();
  }
}
// ---- 点位玩家挂机 ----
var currentNodeAction = null;
function startNodeAction(nodeId, nodeType, nodeLevel) {
  // 若有 NODE 自身缓冲计时器，清理后重入
  if (currentActiveAction && currentActiveAction.type==='NODE' && currentActiveAction._bufferTimer) {
    clearTimeout(currentActiveAction._bufferTimer);
    currentActiveAction._bufferTimer=null;
  }
  // Global lock check — 弹窗确认打断（种植/养殖/采集一律平等走弹窗）
  if (currentActiveAction) {
    showInterruptPrompt(nodeId, nodeType, nodeLevel);
    return;
  }
  if (currentNodeAction && currentNodeAction.nodeId !== nodeId) {
    showToast('⚠️ 已有其他点位在挂机中，请先完成或取消');
    return;
  }
  doNodeAction(nodeId, nodeType, nodeLevel);
}

function showInterruptPrompt(nodeId, nodeType, nodeLevel) {
  document.getElementById('interrupt-msg').textContent = '你正在其他区域进行劳作，确定要打断当前行动并切换到新的资源点位吗？';
  document.getElementById('interrupt-detail').innerHTML = '<p class="text-earth/70">当前行动将被取消，进度不会保留。</p>';
  document.getElementById('interrupt-modal').classList.remove('hidden');
  // Store pending node info
  document.getElementById('interrupt-modal')._pendingNode = { id:nodeId, type:nodeType, level:nodeLevel };
}

// Override confirmInterrupt to handle node actions (guarded)
if (!window._nodeInterruptPatched) {
  window._nodeInterruptPatched = true;
  var _origConfirmInterrupt = confirmInterrupt;
  confirmInterrupt = function() {
    var pending = document.getElementById('interrupt-modal')._pendingNode;
    if (pending) {
      if (currentActiveAction) {
        saveFarmingProgress(); // 种植分段保存（stepIndex 0/1/2）
        currentActiveAction = null;
      }
      // 全量清队：回滚所有排队地块的状态
      for (var qi=0;qi<globalActionQueue.length;qi++) {
        var qa=globalActionQueue[qi];
        if (qa.type==='FARMING' || !qa.type) {
          var qp=findPlot(qa.plotId);
          if (qp && qp.status==='PREPARING') { refundSeed(qp); resetPlotToEmpty(qp); }
        }
      }
      globalActionQueue = [];
      document.getElementById('interrupt-modal').classList.add('hidden');
      doNodeAction(pending.id, pending.type, pending.level);
      document.getElementById('interrupt-modal')._pendingNode = null;
      return;
    }
    _origConfirmInterrupt();
  };
}

function doNodeAction(nodeId, nodeType, nodeLevel) {
  var duration = 3;
  currentActiveAction = {
    type: 'NODE',
    nodeId: nodeId,
    nodeType: nodeType,
    nodeLevel: nodeLevel,
    remainingS: duration,
    totalS: duration,
    label: '资源采集',
    icon: '⚒️'
  };
  showToast('⚒️ 开始在资源点挂机采集... ('+duration+'s)');
  renderAll();
}

function placeNodeConsumable(nodeId, consumable) {
  var slot = null;
  for (var i=0;i<warehouseSlots.length;i++) {
    if (warehouseSlots[i].itemId===consumable && warehouseSlots[i].count>0) { slot=warehouseSlots[i]; break; }
  }
  if (!slot) { showToast('❌ 背包中没有该道具'); return; }
  removeFromWarehouse(consumable, 1);
  showToast('✅ 已在点位安置 '+consumable+'，稍后回来收获！');
  renderAll();
}

  var skillCardsHTML = '';

      '<span class="text-3xl mb-2">'+recentUnlock.icon+'</span>'+

  var upcomingCard = '<div class="rounded-2xl border-2 p-5 flex flex-col items-center justify-center text-center" style="min-height:140px;background:#fbf5eb;border-color:#5c3d2e"><span class="text-sm font-bold text-earth/50">全部已解锁！</span></div>';
  if (upcomingUnlock) {

          '<div><span class="text-sm font-extrabold text-earth">经验值: '+charXP+' / '+xpNeed+'</span></div>'+
        '</div>'+

function renderShopPage(mc) {
  var seasonCrops = ALL_CROPS.filter(function(c) { return c.season === currentSeason; });
  var seen = {};
  var crops = [];
  for (var i=0;i<seasonCrops.length;i++) {
    if (!seen[seasonCrops[i].seedId]) { seen[seasonCrops[i].seedId]=true; crops.push(seasonCrops[i]); }
  }
  mc.innerHTML =
    '<div class="card-ribbon ribbon-amber rounded-xl p-5 border-2 border-soildark/35" style="background:#fbf5eb" data-ribbon="种子商店">'+
      '<p class="text-sm text-soildark mt-1 mb-4 font-extrabold">🛒 '+currentSeason+'季种子 · 购买后存入仓库种子栏，可自由种植</p>'+
      '<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4" id="shop-grid">'+
        crops.map(function(c) { return renderShopItem(c); }).join('')+
      '</div></div>';

  // 数量按钮事件 — 同时更新购买按钮显示总价
  var qbtns = mc.querySelectorAll('.shop-qty-btn');
  for (var q=0;q<qbtns.length;q++) {
    qbtns[q].addEventListener('click', function(e) {
      e.stopPropagation();
      var seedId = this.dataset.seedId;
      var display = mc.querySelector('.shop-qty-display[data-seed-id="'+seedId+'"]');
      if (!display) return;
      var cur = parseInt(display.textContent) || 1;
      var action = this.dataset.action;
      if (action==='minus') cur = Math.max(1, cur-1);
      else if (action==='plus') cur = Math.min(99, cur+1);
      else if (action==='max10') cur = 10;
      display.textContent = cur;
      // 动态更新购买按钮价格
      var unitPrice = parseInt(display.dataset.unitPrice) || 0;
      var total = unitPrice * cur;
      var btn = mc.querySelector('.shop-buy-btn[data-seed-id="'+seedId+'"]');
      if (btn) {
        btn.innerHTML = '🛒 ' + (cur===1 ? unitPrice+' 金币' : total.toLocaleString()+' 金币');
        btn.dataset.price = total;
      }
    });
  }

  // 购买按钮事件
  var bts = mc.querySelectorAll('.shop-buy-btn');
  for (var b=0;b<bts.length;b++) {
    bts[b].addEventListener('click', function(e) {
      e.stopPropagation();
      var seedId = this.dataset.seedId;
      var price = parseInt(this.dataset.price);
      var display = mc.querySelector('.shop-qty-display[data-seed-id="'+seedId+'"]');
      var qty = display ? parseInt(display.textContent) || 1 : 1;
      buySeed(seedId, price, qty);
    });
  }
}

function renderShopItem(c) {
  var price = Math.floor(c.basePrice * 0.6);
  var owned = playerSeeds[c.seedId] || 0;
  var fb = featureBadges(c.features);

  // 库存角标 — 始终渲染，0 时浅色占位
  var badgeHTML = owned > 0
    ? '<span class="text-xs px-2 py-0.5 rounded-full bg-green-100 text-green-700 font-extrabold border border-green-300/50">库存 ×'+owned+'</span>'
    : '<span class="text-xs px-2 py-0.5 rounded-full bg-earth/5 text-earth/40 font-bold border border-earth/15">库存 0</span>';

  // 基因特质行 — 固定高度，空时透明占位
  var featHTML = fb
    ? '<div class="flex gap-1 justify-center items-center">'+fb+'</div>'
    : '<div class="opacity-0 pointer-events-none"><span class="feature-badge ft-fast">.</span></div>';

  // 口味标签 — 固定高度，一行居中
  var tasteHTML = '<div class="flex gap-1 justify-center items-center">'+
    c.tasteTags.map(function(t){return'<span class="text-xs px-1.5 py-0.5 rounded-full font-extrabold border" style="background:#eef4e4;color:#5a7a2e;border-color:#a3c89a">'+t+'</span>';}).join('')+
    '</div>';

  // 生长时间
  var growHTML = '<span class="text-sm text-earth/80 font-bold">生长 '+formatGrowth(c.growthM)+'</span>';

  // 底部：数量选择器 + 购买按钮
  var canBuy = gold >= price;
  var buyHTML = canBuy
    ? '<div class="space-y-2">'+
        '<div class="flex items-center justify-center gap-2">'+
          '<button class="shop-qty-btn w-7 h-7 rounded-lg text-sm font-extrabold border-2 border-soildark/35 text-earth/70 hover:bg-earth/10 transition-colors flex items-center justify-center" data-action="minus" data-seed-id="'+c.seedId+'">−</button>'+
          '<span class="shop-qty-display w-9 text-center font-mono text-base font-extrabold text-soildark" data-seed-id="'+c.seedId+'" data-unit-price="'+price+'">1</span>'+
          '<button class="shop-qty-btn w-7 h-7 rounded-lg text-sm font-extrabold border-2 border-soildark/35 text-earth/70 hover:bg-earth/10 transition-colors flex items-center justify-center" data-action="plus" data-seed-id="'+c.seedId+'">+</button>'+
          '<button class="shop-qty-btn px-2 h-7 rounded-lg text-xs font-extrabold border-2 border-soildark/35 text-earth/70 hover:bg-earth/10 transition-colors" data-action="max10" data-seed-id="'+c.seedId+'">最大</button>'+
        '</div>'+
        '<button class="shop-buy-btn w-full py-2 rounded-lg text-sm font-extrabold text-white hover:opacity-90 transition-colors border-2" style="background:#6b8c3e;border-color:#6b8c3e" data-seed-id="'+c.seedId+'" data-unit-price="'+price+'">🛒 '+price+' 金币</button>'+
      '</div>'
    : '<span class="text-sm text-earth/50 font-bold">金币不足</span>';

  return '<div class="relative flex flex-col justify-between rounded-xl p-4 border-2 border-soildark/35 hover:shadow-md transition-all" style="background:#fbf5eb;min-height:280px">'+
    // 右上角库存角标
    '<div class="absolute top-3 right-3 z-10">'+badgeHTML+'</div>'+
    // 顶部：图标 + 名称 + 生长时间
    '<div class="flex flex-col items-center pt-1">'+
      '<span class="text-4xl mb-1">'+c.icon+'</span>'+
      '<span class="text-base font-extrabold text-soildark text-center leading-tight">'+c.seedName+'</span>'+
      growHTML+
    '</div>'+
    // 中部：基因 + 口味 + 改良（固定高度占位）
    '<div class="flex flex-col items-center gap-1.5">'+
      '<div class="h-7 flex items-center">'+featHTML+'</div>'+
      '<div class="h-7 flex items-center">'+tasteHTML+'</div>'+
'<div class="h-6 flex items-center"><span class="text-xs text-earth/40">作物杂交 · 即将开放</span></div>'+
    '</div>'+
    // 底部：数量 + 购买按钮
    '<div class="mt-1">'+buyHTML+'</div>'+
    '</div>';
}

function buySeed(seedId, price, qty) {
  qty = qty || 1;
  var totalPrice = price * qty;
  if (gold < totalPrice) { showToast('金币不足！需要 '+totalPrice+' 金币'); return; }
  gold -= totalPrice;
  playerSeeds[seedId] = (playerSeeds[seedId] || 0) + qty;
  updateGoldDisplay();
  var crop = getCrop(seedId);
  var name = crop ? crop.seedName : seedId;
  showToast('🛒 购买 '+name+' ×'+qty+'，花费 '+totalPrice+' 金币');
  renderAll();
}

function upgradeSeed(seedId, cost) {
  var curLv = playerSeedLevels[seedId] || 0;
  if (curLv >= 10) { showToast('已达到最高改良等级 Lv.10'); return; }
  if (gold < cost) { showToast('金币不足！需要 '+cost+' 金币'); return; }
  gold -= cost;
  updateGoldDisplay();
  playerSeedLevels[seedId] = (playerSeedLevels[seedId] || 0) + 1;
  var crop = getCrop(seedId);
  var name = crop ? crop.seedName : seedId;
  showToast('🌱 '+name+' 改良成功！Lv.'+playerSeedLevels[seedId]);
  renderAll();
}

// 千分制好感度品质传导：基于 affection 0-1000 的五档 Roll 表
function rollAnimalQuality(affection) {
  var roll = Math.random();
  if (affection <= 200) {
    if (roll < 0.10) return 2; // 优质 10%
    return 1; // 普通 90%
  } else if (affection <= 400) {
    if (roll < 0.10) return 3; // 精良 10%
    if (roll < 0.40) return 2; // 优质 30%
    return 1; // 普通 60%
  } else if (affection <= 600) {
    if (roll < 0.05) return 4; // 珍品 5%
    if (roll < 0.25) return 3; // 精良 20%
    if (roll < 0.70) return 2; // 优质 45%
    return 1; // 普通 30%
  } else if (affection <= 800) {
    if (roll < 0.05) return 5; // 传说 5%
    if (roll < 0.20) return 4; // 珍品 15%
    if (roll < 0.60) return 3; // 精良 40%
    if (roll < 0.90) return 2; // 优质 30%
    return 1; // 普通 10%
  } else {
    if (roll < 0.10) return 5; // 传说 10%
    if (roll < 0.45) return 4; // 珍品 35%
    if (roll < 0.80) return 3; // 精良 35%
    if (roll < 0.95) return 2; // 优质 15%
    return 1; // 普通 0%（极小概率）
  }
}

// 千分制隐藏特殊产出判定：金蛋/皇家牛奶等
function rollAnimalPremium(inst) {
  var aff = inst.affection || 0;
  if (aff <= 400) return false;
  var chance = 0;
  if (aff <= 600) chance = 0.02;
  else if (aff <= 800) chance = 0.035;
  else chance = 0.05;
  // 高级粮草联动预留：若喂食了高级粮草，概率翻倍
  if (inst._premiumFeedBonus) chance *= 2;
  return Math.random() < chance;
}

function autoDepositAnimal(inst) {
  var ad = getAnimal(inst.speciesId);
  if (!ad) return;
  if (!inst.stored) inst.stored = [];
  if (inst.stored.length >= getAnimalStorageCapacity(inst.uid)) return;
  var affection = inst.affection || 0;
  // Step 1: 基于好感度的品质 Roll
  var quality = rollAnimalQuality(affection);
  // Step 2: 隐藏特殊产出判定（金蛋/皇家牛奶）
  var isPremium = rollAnimalPremium(inst);
  // Step 3: 确定产物名称与图标
  var ql = QUALITY_LEVELS.find(function(l){ return l.level===quality; });
  var prefix = ql ? ql.prefix : '';
  var itemId, itemName, itemIcon, basePrice;
  if (isPremium) {
    itemId = ad.premiumItem || ad.produceItem;
    itemName = prefix + (ad.premiumItem || ad.produceItem);
    itemIcon = ad.premiumIcon || ad.produceIcon;
    basePrice = (ad.price || 15) * 3; // 隐藏产物价值 3x
  } else {
    itemId = ad.produceItem;
    itemName = prefix + ad.produceItem;
    itemIcon = ad.produceIcon;
    basePrice = (ad.price || 15);
  }
  var priceMult = ql ? ql.priceMult : 1.0;
  inst.stored.push({
    itemId: ad.produceItem,
    name: itemName,
    icon: itemIcon,
    isPremium: isPremium,
    quality: quality,
    basePrice: Math.floor(basePrice * priceMult),
    ts: Date.now()
  });
  // Step 4: 好感度加速生产周期（每 100 好感缩短约 1%）
  var effectiveInterval = Math.max(1, ad.baseIntervalS * (1 - affection / 10000));
  inst.status = 'growing';
  inst.remainingS = effectiveInterval;
  inst.totalS = effectiveInterval;
}

function upgradeHusbandryBuilding(buildingType, slotIdx) {
  var isCoop = buildingType==='coop';
  var slots = isCoop ? playerCoops : playerBarns;
  var slot = slots[slotIdx];
  if (!slot) return;

  // ---- 解锁新建筑位（读定价目表） ----
  if (slot.tier < 0) {
    var cost = isCoop ? COOP_UNLOCK_COSTS[slotIdx] : BARN_UNLOCK_COSTS[slotIdx];
    if (cost > 0) {
      if (gold < cost) { showToast('❌ 金币不足 (需'+cost+')'); return; }
      gold -= cost;
    }
    slot.tier = 1;
    showToast('🔨 '+(isCoop?'鸡舍':'畜棚')+'已建成！容量3只 · 暂存3格');
    renderAll();
    return;
  }

  // ---- 升级（读升级数据字典） ----
  var upgData = ANIMAL_BUILDING_UPGRADES[isCoop?'coop':'barn'];
  if (!upgData || slot.tier >= upgData.length-1) { showToast('已是最高等级'); renderAll(); return; }
  var nxt = upgData[slot.tier + 1];
  if (!nxt) { showToast('升级数据缺失'); renderAll(); return; }

  // 校验金币
  if (nxt.costGold > 0 && gold < nxt.costGold) { showToast('❌ 金币不足 (需'+nxt.costGold+')'); return; }
  // 校验材料
  var matKeys = Object.keys(nxt.materials);
  for (var mi=0; mi<matKeys.length; mi++) {
    var needed = nxt.materials[matKeys[mi]];
    if (needed > 0) {
      var hasMat = false;
      for (var wi=0; wi<warehouseSlots.length; wi++) {
        if (warehouseSlots[wi].itemId === matKeys[mi] && warehouseSlots[wi].count >= needed) { hasMat = true; break; }
      }
      if (!hasMat) { showToast('❌ '+matKeys[mi]+'不足 (需'+needed+')'); return; }
    }
  }
  // 扣除金币和材料
  if (nxt.costGold > 0) gold -= nxt.costGold;
  for (var mi2=0; mi2<matKeys.length; mi2++) {
    var need2 = nxt.materials[matKeys[mi2]];
    if (need2 > 0) removeFromWarehouse(matKeys[mi2], need2);
  }
  slot.tier = nxt.level;
  showToast('🔨 已升级为'+nxt.name+'！容量'+nxt.maxCapacity+'只');
  renderAll();
}

    if (warehouseSlots[wi].type==='CROP' && warehouseSlots[wi].count>0) totalGrain += warehouseSlots[wi].count;
  }
  if (totalGrain < animalCount) {
    showToast('❌ 仓库粮草不足以一次性全部喂养！（需 '+animalCount+'，现有 '+totalGrain+'）');
    return;
  }
  // 瞬间扣除等量粮草
  var remaining = animalCount;
  for (var wj=0;wj<warehouseSlots.length&&remaining>0;wj++) {
    if (warehouseSlots[wj].type==='CROP' && warehouseSlots[wj].count>0) {
      var take = Math.min(warehouseSlots[wj].count, remaining);
      removeFromWarehouse(warehouseSlots[wj].itemId, take, warehouseSlots[wj].quality);
      remaining -= take;
    }
  }
  // 瞬间喂饱所有动物
  var tierName = getTierName(slot.tier, isCoop);
  for (var ak=0;ak<slotAnimals.length;ak++) {
    var inst = slotAnimals[ak];
    var juvMult4 = isJuvenile(inst) ? 1.25 : 1;
    inst.affection = Math.min(100, inst.affection + Math.ceil(10 * juvMult4));
    inst.lastFedTs = Date.now();
    if (inst.status==='growing') { inst.remainingS = Math.max(1, inst.remainingS-600); if(isJuvenile(inst))inst.birthTs=Math.max(1,inst.birthTs-600000); }
    playerSkillXP.gathering = (playerSkillXP.gathering||0) + 5;
    var xpNeed3 = playerSkillLevels.gathering*100;
    if (playerSkillXP.gathering>=xpNeed3) { playerSkillXP.gathering-=xpNeed3; playerSkillLevels.gathering=Math.min(99,playerSkillLevels.gathering+1); }
  }
  showToast('🍎 '+tierName+' 一键喂养 ×'+animalCount+'只 · 好感+10/只 · 消耗粮草×'+animalCount);
  renderAll();
}

function calcSlotProgress(slot, pondType) {
  if (!slot) return { progress: 0, completed: 0, ratePerSec: 0 };
  var pond = fishPonds[pondType];
  var now = Date.now();
  var elapsedSec = (now - pond.lastTick) / 1000;
  var f = getFish(slot.fishId);
  if (!f) return { progress: 0, completed: 0, ratePerSec: 0 };
  var ratePerSec = (slot.count / 10) * (100 / f.spb);
  var newProgress = Math.min(100, (slot.progress || 0) + elapsedSec * ratePerSec);
  var completed = Math.floor(newProgress / 100);
  return { progress: newProgress % 100, completed: completed, ratePerSec: ratePerSec };
}
function collectPondYield(pondType) {
  var pond = fishPonds[pondType];
  var pu = fishPondUnlocks.find(function(p){ return p.id===pondType; });
  var ecoLevel = pu ? pu.ecoLevel : 1;
  var cap = getPondStorageCap(ecoLevel);
  pond.lastTick = Date.now();
  var totalAdded = 0;
  var anyCollected = false;
  for (var i = 0; i < pond.slots.length; i++) {
    var s = pond.slots[i];
    if (!s) continue;
    var res = calcSlotProgress(s, pondType);
    if (res.completed <= 0) { s.progress = res.progress; continue; }
    anyCollected = true;
    s.progress = res.progress;
    var f = getFish(s.fishId);
    if (!f) continue;
    // 初始化 storedCount
    if (typeof s.storedCount === 'undefined') s.storedCount = 0;
    // 每完成一轮 +1 storedCount（受生态等级上限约束）
    var spaceLeft = cap - s.storedCount;
    var toAdd = Math.min(res.completed, spaceLeft);
    if (toAdd > 0) {
      s.storedCount += toAdd;
      totalAdded += toAdd;
    }
  }
  if (!anyCollected) {
    showToast('⏳ 所有鱼种均未完成一轮生产');
    return;
  }
  if (totalAdded === 0) {
    showToast('📦 所有鱼种暂存已满（LV'+ecoLevel+' 上限'+cap+'），请及时收获');
  } else {
    showToast('🐟 +'+totalAdded+' 鱼产暂存 · LV'+ecoLevel+' 上限'+cap);
  }
  renderAll();
}

// 一键收获：将暂存鱼产实际入库
function harvestPondStored(pondId) {
  var pond = fishPonds[pondId];
  if (!pond) return;
  var pu = fishPondUnlocks.find(function(p){ return p.id===pondId; });
  var ptName = pu && pu.type==='freshwater' ? '淡水鱼塘' : '海水鱼塘';
  var totalHarvested = 0;
  var summaryParts = [];
  for (var i = 0; i < pond.slots.length; i++) {
    var s = pond.slots[i];
    if (!s || !s.storedCount || s.storedCount <= 0) continue;
    var f = getFish(s.fishId);
    if (!f) continue;
    var ql = rollQuality(playerSkillLevels.fishing||1, 0, null);
    addToWarehouse(f.id, f.name, f.icon, s.storedCount, 'MATERIAL', f.flavor||[], f.basePrice||50, [], 1, ql);
    totalHarvested += s.storedCount;
    summaryParts.push(f.icon+' '+f.name+' ×'+s.storedCount);
    s.storedCount = 0;
  }
  if (totalHarvested === 0) {
    showToast('📦 '+ptName+' 暂无暂存可收获');
    return;
  }
  showToast('🧺 '+ptName+' 收获：'+summaryParts.join(' | '));
  pushLog('鱼塘收获', pondId, ptName, '🐟', totalHarvested);
  renderAll();
}

function addFishToSlot(pondId, slotIndex, fishId) {
  var pond = fishPonds[pondId];
  if (!pond || !pond.type) { showToast('鱼塘未解锁'); return; }
  var pu = fishPondUnlocks.find(function(p){ return p.id===pondId; });
  var maxSlots = (pu&&pu.tier) ? pu.tier : 1;
  if (slotIndex >= maxSlots) { showToast('❌ 该槽位未解锁，请先升级鱼塘'); return; }
  var slot = pond.slots[slotIndex];
  var fish = getFish(fishId);
  if (!fish || fish.type !== pond.type) { showToast('❌ 鱼种与鱼塘水质不匹配'); return; }
  if (slot && slot.fishId !== fishId) { showToast('槽位已被其他鱼种占用，请先取出'); return; }
  // 消耗1条对应鱼获作为鱼苗
  var removed = false;
  for (var wi = 0; wi < warehouseSlots.length; wi++) {
    if (warehouseSlots[wi].itemId === fishId && warehouseSlots[wi].count > 0) {
      removeFromWarehouse(fishId, 1, warehouseSlots[wi].quality);
      removed = true;
      break;
    }
  }
  if (!removed) { showToast('❌ 仓库中没有 '+fish.name+'，请先通过钓鱼获得'); return; }
  if (!slot) { pond.slots[slotIndex] = { fishId: fishId, count: 1, progress: 0, storedCount: 0 }; pond.lastTick = Date.now(); }
  else { slot.count = Math.min(10, slot.count + 1); }
  pond.lastTick = Date.now();
  showToast('🐟 放入 '+fish.name+' ×1 · 鱼塘投苗成功');
  renderAll();
}
function removeFishFromSlot(pondType, slotIndex) {
  var pond = fishPonds[pondType];
  var slot = pond.slots[slotIndex];
  if (!slot || slot.count <= 0) { showToast('槽位为空'); return; }
  var fish = getFish(slot.fishId);
  if (!fish) return;
  // 先收获暂存
  if (slot.storedCount && slot.storedCount > 0) {
    addToWarehouse(fish.id, fish.name, fish.icon, slot.storedCount, 'MATERIAL', fish.flavor||[], fish.basePrice||50, [], 1, 1);
  }
  addToWarehouse(fish.id, fish.name, fish.icon, slot.count, 'MATERIAL', fish.flavor||[], fish.basePrice||50, [], 1, 1);
  pond.slots[slotIndex] = null;
  pond.lastTick = Date.now();
  showToast('🔙 取出 '+fish.name+' ×'+(slot.count+(slot.storedCount||0))+' 已退回仓库');
  renderAll();
}

function unlockFishPond(pondId, chosenType) {

  fishPonds[pondId].slots = [null];
  fishPonds[pondId].lastTick = Date.now();

}
function upgradeFishPond(pondId) {
  var pu = fishPondUnlocks.find(function(p){ return p.id===pondId; });
  if (!pu || !pu.unlocked) { showToast('鱼塘未解锁'); return; }
  var currentEco = pu.ecoLevel || 1;
  if (currentEco >= 3) { showToast('已是最高生态等级 LV3'); return; }
  var cost = currentEco === 1 ? 1200 : 3600;
  var nextEco = currentEco + 1;
  var newCap = getPondStorageCap(nextEco);
  if (gold < cost) { showToast('❌ 金币不足 (需'+cost+')'); return; }
  gold -= cost;
  pu.ecoLevel = nextEco;
  // LV2: 扩展槽位到2; LV3: 保持2槽但大幅提升暂存上限
  if (nextEco === 2 && fishPonds[pondId].slots.length < 2) {
    pu.tier = 2;
    fishPonds[pondId].tier = 2;
    fishPonds[pondId].slots.push(null);
  }
  if (nextEco === 3) {
    pu.tier = 3;
    fishPonds[pondId].tier = 3;
